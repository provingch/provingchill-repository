{% set is_home_page = request.endpoint == "home" %}
{% set is_projects_page = request.endpoint == "projects_page" %}
<div class="wrapper site-nav-wrap">
  <nav class="site-nav" aria-label="Navegacion principal">
    <a class="site-nav-mark" href="{{ url_for('home') }}">
      <span class="site-nav-mark-dot" aria-hidden="true"></span>
      ProvingChill
    </a>
    <div class="site-nav-links">
      <a
        class="site-nav-link{% if is_home_page %} is-active{% endif %}"
        href="{{ '#inicio' if is_home_page else url_for('home', _anchor='inicio') }}"
        data-nav-link="inicio"
      >
        Inicio
      </a>
      <a
        class="site-nav-link{% if is_projects_page %} is-active{% endif %}"
        href="{{ '#proyectos' if is_projects_page else url_for('projects_page') }}"
        data-nav-link="proyectos"
      >
        Proyectos
      </a>
      <span class="site-nav-version">v{{ app_version }}</span>
    </div>
  </nav>
</div>
