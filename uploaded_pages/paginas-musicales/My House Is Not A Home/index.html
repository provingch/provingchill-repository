<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My House Is Not A Home - d4vd</title>
    <link rel="icon" type="image/jpeg" href="media/favicon.jpg">
    <style>
      :root {
        color-scheme: dark;
        --ink: #f5eee0;
        --panel: rgba(8, 12, 22, 0.58);
        --panel-edge: rgba(255, 255, 255, 0.12);
      }

      html,
      body {
        width: 100%;
        height: 100%;
      }

      html {
        -webkit-text-size-adjust: 100%;
      }

      body {
        margin: 0;
        overflow: hidden;
        min-height: 100dvh;
        background: #000;
        color: #fff;
        font-family: "Arial Black", "Impact", sans-serif;
      }

      .scene {
        position: fixed;
        inset: 0;
        z-index: 0;
      }

      #scene-canvas {
        width: 100%;
        height: 100%;
        display: block;
        touch-action: none;
      }

      .black-overlay {
        position: fixed;
        inset: 0;
        z-index: 30;
        background: #000;
        opacity: 1;
        visibility: visible;
        transition: opacity 0.8s ease-out, visibility 0.8s ease-out;
        pointer-events: none;
      }

      .black-overlay.slow-return {
        opacity: 1;
        visibility: visible;
        transition: opacity 2.8s ease-in-out, visibility 2.8s ease-in-out;
      }

      .black-overlay.fade-out {
        opacity: 0;
        visibility: hidden;
      }

      .stage {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.2rem;
        padding: 1.2rem;
        z-index: 102;
        pointer-events: none;
      }

      .button-container {
        position: relative;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.8rem;
      }

      .start-btn {
        pointer-events: auto;
        font-family: "Arial Black", "Impact", sans-serif;
        font-size: 0.95rem;
        border: 1px solid #454545;
        background: #111;
        color: #fff;
        padding: 10px 18px;
        border-radius: 6px;
        touch-action: manipulation;
        cursor: pointer;
      }

      .start-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .button-status {
        position: relative;
        z-index: 10;
        order: 3;
        margin: 0;
        min-height: 1rem;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        font-size: 0.9rem;
        color: #d0d0d0;
        text-align: center;
      }

      .sequence-started .button-container,
      .sequence-started #status {
        display: none !important;
      }

      .lyric-shell {
        position: absolute;
        left: 50%;
        top: 82%;
        width: min(92vw, 48rem);
        transform: translate(-50%, -50%);
        text-align: center;
        pointer-events: none;
        transition:
          left 0.46s cubic-bezier(0.22, 1, 0.36, 1),
          top 0.46s cubic-bezier(0.22, 1, 0.36, 1),
          width 0.46s cubic-bezier(0.22, 1, 0.36, 1),
          transform 0.46s cubic-bezier(0.22, 1, 0.36, 1);
      }

      .lyric {
        margin: 0;
        min-height: 1.1em;
        max-width: 100%;
        font-family: "Baskerville", "Palatino Linotype", "Times New Roman", serif;
        font-size: clamp(1.7rem, 4.8vw, 3.6rem);
        font-weight: 600;
        line-height: 1.02;
        letter-spacing: 0.02em;
        text-transform: none;
        text-wrap: balance;
        overflow-wrap: normal;
        word-break: normal;
        hyphens: none;
        text-shadow:
          0 0 22px rgba(0, 0, 0, 0.92),
          0 4px 32px rgba(0, 0, 0, 0.66);
        transition:
          opacity 0.22s ease,
          color 0.28s ease,
          letter-spacing 0.4s ease,
          transform 0.4s ease,
          text-shadow 0.4s ease;
      }

      .lyric.style-subtitle {
        font-family: "Baskerville", "Palatino Linotype", "Times New Roman", serif;
        font-size: clamp(1.6rem, 4.7vw, 3.6rem);
        font-weight: 600;
        line-height: 1.02;
        letter-spacing: 0.02em;
      }

      .lyric.style-window {
        font-family: "Georgia", "Garamond", "Times New Roman", serif;
        font-size: clamp(2rem, 5.7vw, 4.25rem);
        font-weight: 600;
        line-height: 0.96;
        letter-spacing: 0.03em;
      }

      .lyric.style-door {
        font-family: "Arial Narrow", "Franklin Gothic Medium", "Arial Black", sans-serif;
        font-size: clamp(1.4rem, 4vw, 2.7rem);
        font-weight: 800;
        line-height: 0.95;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .lyric.style-impact {
        font-family: "Arial Narrow", "Franklin Gothic Medium", "Arial Black", sans-serif;
        font-size: clamp(3rem, 8.8vw, 6.8rem);
        font-weight: 900;
        line-height: 0.84;
        letter-spacing: 0.13em;
        text-transform: uppercase;
      }

      .lyric.style-road {
        font-family: "Times New Roman", "Georgia", serif;
        font-size: clamp(1.5rem, 4.3vw, 3rem);
        font-style: italic;
        font-weight: 600;
        line-height: 1.08;
        letter-spacing: 0.01em;
      }

      .lyric.style-whisper {
        font-family: "Trebuchet MS", "Gill Sans", "Segoe UI", sans-serif;
        font-size: clamp(1.25rem, 3.2vw, 2.3rem);
        font-weight: 600;
        line-height: 1.08;
        letter-spacing: 0.05em;
      }

      .lyric.style-note {
        font-family: "Courier New", "Lucida Console", monospace;
        font-size: clamp(1.05rem, 2.8vw, 1.95rem);
        font-weight: 700;
        line-height: 1.12;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .lyric.is-empty {
        opacity: 0;
      }

      @media (max-width: 720px) {
        .button-status {
          font-size: 0.84rem;
        }

        .lyric-shell {
          width: min(92vw, 42rem);
        }

        .lyric {
          font-size: clamp(2.05rem, 7.2vw, 4.4rem);
          line-height: 0.98;
        }

        .lyric.style-subtitle {
          font-size: clamp(1.95rem, 6.9vw, 4.2rem);
        }

        .lyric.style-window {
          font-size: clamp(2.2rem, 8vw, 4.8rem);
        }

        .lyric.style-door {
          font-size: clamp(1.65rem, 5.8vw, 3.2rem);
        }

        .lyric.style-impact {
          font-size: clamp(3.2rem, 12vw, 7rem);
        }

        .lyric.style-road {
          font-size: clamp(1.75rem, 6.5vw, 3.6rem);
        }

        .lyric.style-whisper {
          font-size: clamp(1.45rem, 5.1vw, 2.8rem);
        }

        .lyric.style-note {
          font-size: clamp(1.2rem, 4.4vw, 2.25rem);
        }
      }
    </style>
  </head>
  <body>
    <div class="black-overlay" id="black-overlay"></div>

    <div class="scene" aria-hidden="true">
      <canvas id="scene-canvas"></canvas>
    </div>

    <main class="stage">
      <div class="button-container">
        <button id="start-btn" class="start-btn" disabled>Comenzar secuencia</button>
      </div>

      <section class="lyric-shell">
        <p id="lyric" class="lyric is-empty"></p>
      </section>
      <p id="status" class="button-status">Cargando timestamps...</p>

      <audio id="audio" preload="auto">
        <source src="media/myhouseisnotahome.mp3" type="audio/mpeg">
        Tu navegador no soporta audio HTML5.
      </audio>
    </main>

    <script>
      const sceneCanvas = document.getElementById("scene-canvas");
      const sceneCtx = sceneCanvas.getContext("2d");

      const audio = document.getElementById("audio");
      const startBtn = document.getElementById("start-btn");
      const lyricShell = document.querySelector(".lyric-shell");
      const lyricEl = document.getElementById("lyric");
      const statusText = document.getElementById("status");
      const blackOverlayEl = document.getElementById("black-overlay");

      const LRC_PATH = "media/myhouseisnotahome.lrc";
      const FRAME_PHOTO_PATH = "media/frame-photo.jpg";
      const TRACK_END_FALLBACK = 240.213333;
      const FIRE_ARCS = {
        first: {
          start: 66.65,
          riseEnd: 72.2,
          sustainEnd: 99.87,
          fireFadeEnd: 101.55,
          smokeFadeEnd: 104.4,
          floor: 0.82,
          peak: 0.92
        },
        final: {
          start: 178.5,
          earlyEnd: 186.2,
          midEnd: 198.99,
          collapseStart: 200.31,
          peakEnd: 214.93,
          fadeEnd: 218.2
        }
      };
      const BLAST_CUES = [
        { start: 200.9, peak: 201.45, end: 202.1, power: 0.58 },
        { start: 203.05, peak: 203.72, end: 204.44, power: 0.7 },
        { start: 206.28, peak: 206.92, end: 207.72, power: 0.82 },
        { start: 210.14, peak: 210.76, end: 211.48, power: 0.9 },
        { start: 212.86, peak: 213.52, end: 214.42, power: 1 }
      ];
      const FLASH_BPM = 58;
      const FLASH_BEAT_INTERVAL = 60 / FLASH_BPM;
      const FLASH_SEQUENCES = [
        { start: 32.65, end: 64.53, power: 0.68 },
        { start: 131.49, end: 161.24, power: 0.62 }
      ];

      const sceneState = {
        width: window.innerWidth,
        height: window.innerHeight,
        dpr: 1,
        currentTime: 0,
        pointer: {
          x: 0.5,
          y: 0.5,
          targetX: 0.5,
          targetY: 0.5,
          active: false
        },
        hoveredWindowId: null,
        layout: null,
        stars: [],
        mistBands: [],
        horizonHomes: [],
        treeSeeds: [],
        emberSeeds: [],
        shimmerBands: [],
        framePhoto: null
      };

      let lyricWords = [];
      let lyricDecorations = [];
      let activeWordIndex = -1;
      let lyricLayoutCache = null;
      let rafId = null;
      let firstLyricTime = 0.25;
      let firstTripleDotTime = null;
      let lastTripleDotTime = null;
      let lyricsLoaded = false;

      const framePhotoImage = new Image();
      framePhotoImage.decoding = "async";
      framePhotoImage.addEventListener("load", () => {
        sceneState.framePhoto = framePhotoImage;
        drawScene(audio.currentTime || sceneState.currentTime);
      });
      framePhotoImage.src = FRAME_PHOTO_PATH;

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(start, end, amount) {
        return start + (end - start) * amount;
      }

      function mixHexColor(fromHex, toHex, amount) {
        const t = clamp(amount, 0, 1);
        const from = fromHex.replace("#", "");
        const to = toHex.replace("#", "");
        const fromR = parseInt(from.slice(0, 2), 16);
        const fromG = parseInt(from.slice(2, 4), 16);
        const fromB = parseInt(from.slice(4, 6), 16);
        const toR = parseInt(to.slice(0, 2), 16);
        const toG = parseInt(to.slice(2, 4), 16);
        const toB = parseInt(to.slice(4, 6), 16);
        const r = Math.round(lerp(fromR, toR, t)).toString(16).padStart(2, "0");
        const g = Math.round(lerp(fromG, toG, t)).toString(16).padStart(2, "0");
        const b = Math.round(lerp(fromB, toB, t)).toString(16).padStart(2, "0");
        return `#${r}${g}${b}`;
      }

      function smoothstep(edge0, edge1, value) {
        if (edge0 === edge1) {
          return value < edge0 ? 0 : 1;
        }

        const x = clamp((value - edge0) / (edge1 - edge0), 0, 1);
        return x * x * (3 - 2 * x);
      }

      function randomBetween(min, max) {
        return min + Math.random() * (max - min);
      }

      function parseTimestamp(min, sec, msRaw) {
        const ms = Number((msRaw || "0").padEnd(3, "0"));
        return Number(min) * 60 + Number(sec) + ms / 1000;
      }

      function cleanWord(text) {
        return text.replace(/\s+/g, " ").replace(/\s+([,.;:!?])/g, "$1").trim();
      }

      function normalizeLyricText(text) {
        return cleanWord(String(text || "")).toLowerCase();
      }

      function isTripleDotLyric(text) {
        return typeof text === "string" && text.replace(/\s+/g, "") === "...";
      }

      function isLyricContinuation(previousText, currentText) {
        if (!previousText || !currentText || isTripleDotLyric(previousText) || isTripleDotLyric(currentText)) {
          return false;
        }

        const previous = normalizeLyricText(previousText);
        const current = normalizeLyricText(currentText);
        if (!previous || !current || current === previous) {
          return false;
        }

        return current.startsWith(previous);
      }

      function containsYouWord(text) {
        return /\byou\b/i.test(String(text || ""));
      }

      function setStatus(message, isError = false) {
        statusText.textContent = message;
        statusText.style.opacity = message ? "1" : "0";
        statusText.style.color = isError ? "#ff6a6a" : "#d0d0d0";
      }

      function updateReadyState() {
        if (lyricsLoaded) {
          startBtn.disabled = false;
          setStatus(`Listo. ${lyricWords.length} lineas cargadas.`);
          return;
        }

        startBtn.disabled = true;
        setStatus("Cargando timestamps...");
      }

      function getFireCueIntensity(currentTime, cue) {
        if (!Number.isFinite(currentTime) || currentTime < cue.start || currentTime > cue.end) {
          return 0;
        }

        if (currentTime <= cue.peak) {
          return smoothstep(cue.start, cue.peak, currentTime);
        }

        return 1 - smoothstep(cue.peak, cue.end, currentTime);
      }

      function getTrackEndTime() {
        return Number.isFinite(audio.duration) && audio.duration > 0
          ? audio.duration
          : TRACK_END_FALLBACK;
      }

      function getSustainedFireArcIntensity(currentTime, arc) {
        if (!Number.isFinite(currentTime) || currentTime < arc.start || currentTime > arc.smokeFadeEnd) {
          return 0;
        }

        if (currentTime <= arc.riseEnd) {
          return lerp(0, arc.floor, smoothstep(arc.start, arc.riseEnd, currentTime));
        }

        if (currentTime <= arc.sustainEnd) {
          return lerp(arc.floor, arc.peak, smoothstep(arc.riseEnd, arc.sustainEnd, currentTime));
        }

        if (currentTime <= arc.fireFadeEnd) {
          return lerp(arc.peak, 0.2, smoothstep(arc.sustainEnd, arc.fireFadeEnd, currentTime));
        }

        return lerp(0.2, 0, smoothstep(arc.fireFadeEnd, arc.smokeFadeEnd, currentTime));
      }

      function getEscalatingFireArcIntensity(currentTime, arc) {
        const trackEndTime = getTrackEndTime();
        if (!Number.isFinite(currentTime) || currentTime < arc.start || currentTime > trackEndTime) {
          return 0;
        }

        if (currentTime <= arc.peakEnd) {
          const early = smoothstep(arc.start, arc.midEnd, currentTime);
          const late = smoothstep(arc.midEnd - 2.8, arc.peakEnd, currentTime);
          const collapse = smoothstep(arc.collapseStart, arc.peakEnd, currentTime);
          return clamp(early * 0.42 + late * 0.34 + collapse * 0.24, 0, 1);
        }

        const shutdownStart = Math.max(arc.peakEnd, trackEndTime - 0.45);
        if (currentTime <= shutdownStart) {
          return 1;
        }

        return lerp(1, 0, smoothstep(shutdownStart, trackEndTime, currentTime));
      }

      function getSustainedSmokeArcIntensity(currentTime, arc) {
        if (!Number.isFinite(currentTime) || currentTime < arc.start || currentTime > arc.smokeFadeEnd) {
          return 0;
        }

        if (currentTime <= arc.sustainEnd) {
          return lerp(0, arc.peak, smoothstep(arc.start, arc.sustainEnd, currentTime));
        }

        return lerp(arc.peak * 0.82, 0, smoothstep(arc.sustainEnd, arc.smokeFadeEnd, currentTime));
      }

      function getBlastIntensity(currentTime) {
        let strongest = 0;

        for (const cue of BLAST_CUES) {
          strongest = Math.max(strongest, getFireCueIntensity(currentTime, cue) * cue.power);
        }

        return clamp(strongest, 0, 1);
      }

      function getFinalDestructionProgress(currentTime) {
        return smoothstep(FIRE_ARCS.final.collapseStart, FIRE_ARCS.final.peakEnd, currentTime);
      }

      function getExteriorBlastStrength(currentTime) {
        return clamp(getFinalDestructionProgress(currentTime) * 0.4 + getBlastIntensity(currentTime), 0, 1);
      }

      function getBeatFlashIntensity(currentTime) {
        if (!Number.isFinite(currentTime)) {
          return 0;
        }

        let strongest = 0;

        for (const sequence of FLASH_SEQUENCES) {
          if (currentTime < sequence.start || currentTime > sequence.end) {
            continue;
          }

          const localTime = currentTime - sequence.start;
          const beatPhase = (localTime % FLASH_BEAT_INTERVAL) / FLASH_BEAT_INTERVAL;
          const attack = smoothstep(0, 0.08, beatPhase);
          const hit = 1 - smoothstep(0.08, 0.22, beatPhase);
          const tail = 1 - smoothstep(0.22, 0.52, beatPhase);
          const pulse = clamp(attack * hit * 0.88 + tail * 0.22, 0, 1);
          const intro = smoothstep(sequence.start, Math.min(sequence.end, sequence.start + FLASH_BEAT_INTERVAL * 1.15), currentTime);
          const outro = 1 - smoothstep(Math.max(sequence.start, sequence.end - FLASH_BEAT_INTERVAL * 1.2), sequence.end, currentTime);
          strongest = Math.max(strongest, pulse * intro * outro * sequence.power);
        }

        return clamp(strongest, 0, 1);
      }

      function getSceneFadeReturnStartTime() {
        return Math.max((lastTripleDotTime ?? 0) + 0.2, getTrackEndTime() - 2.8);
      }

      function getHouseFireIntensity(currentTime) {
        const firstArc = getSustainedFireArcIntensity(currentTime, FIRE_ARCS.first);
        const finalArc = getEscalatingFireArcIntensity(currentTime, FIRE_ARCS.final);

        return clamp(Math.max(firstArc, finalArc), 0, 1);
      }

      function getHouseSmokeBaseIntensity(currentTime) {
        const firstArc = getSustainedSmokeArcIntensity(currentTime, FIRE_ARCS.first);
        const finalArc = getEscalatingFireArcIntensity(currentTime, FIRE_ARCS.final);
        return clamp(Math.max(firstArc, finalArc), 0, 1);
      }

      function getHouseGlowIntensity(currentTime) {
        const firstSmoke = getSustainedSmokeArcIntensity(currentTime, FIRE_ARCS.first);
        const firstRise = smoothstep(FIRE_ARCS.first.start - 1.6, FIRE_ARCS.first.riseEnd + 1.2, currentTime);
        const firstRelease = 1 - smoothstep(FIRE_ARCS.first.sustainEnd + 0.4, FIRE_ARCS.first.smokeFadeEnd - 0.25, currentTime);
        const firstGlow = clamp(
          firstSmoke * 0.64 + firstRise * firstRelease * 0.2,
          0,
          0.86
        );

        const finalFire = getEscalatingFireArcIntensity(currentTime, FIRE_ARCS.final);
        const finalRise = smoothstep(FIRE_ARCS.final.start - 1.4, FIRE_ARCS.final.midEnd - 0.9, currentTime);
        const finalCharge = smoothstep(FIRE_ARCS.final.midEnd - 1.6, FIRE_ARCS.final.peakEnd, currentTime);
        const finalGlow = clamp(
          finalFire * 0.72 + finalRise * 0.18 + finalCharge * 0.18,
          0,
          1
        );
        return clamp(Math.max(firstGlow, finalGlow), 0, 1);
      }

      function getSustainedFireArcAlpha(currentTime, arc) {
        if (!Number.isFinite(currentTime) || currentTime < arc.start || currentTime > arc.smokeFadeEnd) {
          return 0;
        }

        if (currentTime <= arc.riseEnd) {
          return lerp(0, 0.86, smoothstep(arc.start, arc.riseEnd, currentTime));
        }

        if (currentTime <= arc.sustainEnd) {
          return lerp(0.86, 1, smoothstep(arc.riseEnd, arc.sustainEnd, currentTime));
        }

        return lerp(1, 0, smoothstep(arc.sustainEnd, arc.smokeFadeEnd, currentTime));
      }

      function getEscalatingFireArcAlpha(currentTime, arc) {
        const trackEndTime = getTrackEndTime();
        if (!Number.isFinite(currentTime) || currentTime < arc.start || currentTime > trackEndTime) {
          return 0;
        }

        if (currentTime <= arc.peakEnd) {
          return lerp(0.12, 1, smoothstep(arc.start - 0.8, arc.midEnd, currentTime));
        }

        const shutdownStart = Math.max(arc.peakEnd, trackEndTime - 0.45);
        if (currentTime <= shutdownStart) {
          return 1;
        }

        return lerp(1, 0, smoothstep(shutdownStart, trackEndTime, currentTime));
      }

      function getHouseFireVisualState(currentTime) {
        const firstIntensity = getSustainedFireArcIntensity(currentTime, FIRE_ARCS.first);
        const finalIntensity = getEscalatingFireArcIntensity(currentTime, FIRE_ARCS.final);
        const firstAlpha = getSustainedFireArcAlpha(currentTime, FIRE_ARCS.first);
        const finalAlpha = getEscalatingFireArcAlpha(currentTime, FIRE_ARCS.final);
        const finalBoost = lerp(1.08, 1.24, smoothstep(FIRE_ARCS.final.start, FIRE_ARCS.final.peakEnd, currentTime));

        let firstBody = firstIntensity * 0.92;
        if (firstAlpha > 0.01 && currentTime > FIRE_ARCS.first.sustainEnd && currentTime <= FIRE_ARCS.first.smokeFadeEnd) {
          firstBody = Math.max(
            firstIntensity * 0.92,
            lerp(
              FIRE_ARCS.first.peak * 0.84,
              FIRE_ARCS.first.floor * 0.6,
              smoothstep(FIRE_ARCS.first.sustainEnd, FIRE_ARCS.first.smokeFadeEnd, currentTime)
            )
          );
        }

        let finalBody = finalIntensity * finalBoost;
        if (finalAlpha > 0.01 && currentTime > FIRE_ARCS.final.peakEnd && currentTime <= getTrackEndTime()) {
          finalBody = 1.24;
        }

        return {
          body: clamp(Math.max(firstBody, finalBody), 0, 1.24),
          alpha: clamp(Math.max(firstAlpha, finalAlpha), 0, 1)
        };
      }

      function getHouseBurnIntensity(currentTime) {
        return clamp(
          Math.max(getHouseFireIntensity(currentTime) * 0.94, getHouseFireVisualState(currentTime).body * 0.84),
          0,
          1
        );
      }

      function getSceneShakeOffset(currentTime) {
        const collapse = getFinalDestructionProgress(currentTime);
        const blast = getBlastIntensity(currentTime);
        const amplitude = collapse * 0.42 + blast * 0.9;
        if (amplitude <= 0.01) {
          return { x: 0, y: 0 };
        }

        const offsetX = sceneState.width * 0.0036 * amplitude * (
          Math.sin(currentTime * 34.8) * 0.62 +
          Math.sin(currentTime * 57.6) * 0.38
        );
        const offsetY = sceneState.height * 0.0032 * amplitude * (
          Math.cos(currentTime * 28.4) * 0.58 +
          Math.sin(currentTime * 49.8) * 0.42
        );

        return { x: offsetX, y: offsetY };
      }

      function getHouseBurnSpread(currentTime) {
        return smoothstep(0.04, 1, getHouseFireIntensity(currentTime));
      }

      function getHouseSmokeIntensity(currentTime) {
        return smoothstep(0.05, 1, getHouseSmokeBaseIntensity(currentTime));
      }

      function getEffectQuality() {
        const pixelLoad = Math.max(1, sceneState.width * sceneState.height * Math.max(1, sceneState.dpr));
        return clamp(840000 / pixelLoad, 0.38, 1);
      }

      function getSceneRevealStartTime() {
        return Number.isFinite(firstLyricTime) ? Math.max(0, firstLyricTime) : 0.25;
      }

      function getSceneRevealProgress(currentTime) {
        const safeTime = Number.isFinite(currentTime) ? currentTime : 0;
        const revealStart = getSceneRevealStartTime();
        return smoothstep(revealStart, revealStart + 1.15, safeTime);
      }

      function roundedRectPath(x, y, width, height, radius) {
        const safeRadius = Math.min(radius, width / 2, height / 2);
        sceneCtx.moveTo(x + safeRadius, y);
        sceneCtx.arcTo(x + width, y, x + width, y + height, safeRadius);
        sceneCtx.arcTo(x + width, y + height, x, y + height, safeRadius);
        sceneCtx.arcTo(x, y + height, x, y, safeRadius);
        sceneCtx.arcTo(x, y, x + width, y, safeRadius);
      }

      function fillRoundedRect(x, y, width, height, radius) {
        sceneCtx.beginPath();
        roundedRectPath(x, y, width, height, radius);
        sceneCtx.fill();
      }

      function strokeRoundedRect(x, y, width, height, radius) {
        sceneCtx.beginPath();
        roundedRectPath(x, y, width, height, radius);
        sceneCtx.stroke();
      }

      function drawEllipticalGlow(cx, cy, radiusX, radiusY, stops, composite = "screen") {
        if (radiusX <= 0 || radiusY <= 0) {
          return;
        }

        sceneCtx.save();
        sceneCtx.globalCompositeOperation = composite;
        sceneCtx.translate(cx, cy);
        sceneCtx.scale(1, radiusY / radiusX);

        const gradient = sceneCtx.createRadialGradient(0, 0, 0, 0, 0, radiusX);
        for (const stop of stops) {
          gradient.addColorStop(stop.offset, stop.color);
        }

        sceneCtx.fillStyle = gradient;
        sceneCtx.beginPath();
        sceneCtx.arc(0, 0, radiusX, 0, Math.PI * 2);
        sceneCtx.fill();
        sceneCtx.restore();
      }

      function seedAtmosphere() {
        sceneState.stars = Array.from({ length: 42 }, () => ({
          x: randomBetween(0.04, 0.96),
          y: randomBetween(0.06, 0.94),
          r: randomBetween(0.0008, 0.0024),
          alpha: randomBetween(0.08, 0.28),
          speed: randomBetween(0.18, 0.7),
          phase: randomBetween(0, Math.PI * 2)
        }));

        sceneState.mistBands = Array.from({ length: 4 }, () => ({
          x: randomBetween(0.08, 0.42),
          width: randomBetween(0.08, 0.2),
          opacity: randomBetween(0.02, 0.07),
          tilt: randomBetween(-0.18, 0.08),
          speed: randomBetween(0.12, 0.4),
          phase: randomBetween(0, Math.PI * 2)
        }));

        sceneState.horizonHomes = Array.from({ length: 7 }, () => ({
          x: randomBetween(0.08, 0.92),
          y: randomBetween(0.1, 0.48),
          width: randomBetween(0.04, 0.08),
          height: randomBetween(0.02, 0.06),
          tilt: randomBetween(-0.08, 0.08),
          alpha: randomBetween(0.06, 0.16)
        }));

        sceneState.treeSeeds = Array.from({ length: 12 }, (_, index) => ({
          lane: index / 11,
          offset: randomBetween(-0.04, 0.04),
          alpha: randomBetween(0.05, 0.12)
        }));

        sceneState.emberSeeds = Array.from({ length: 18 }, () => ({
          x: randomBetween(0.6, 0.86),
          y: randomBetween(0.14, 0.62),
          size: randomBetween(0.0012, 0.0042),
          speed: randomBetween(0.14, 0.42),
          sway: randomBetween(0.006, 0.02),
          phase: randomBetween(0, Math.PI * 2)
        }));

        sceneState.shimmerBands = Array.from({ length: 10 }, () => ({
          x: randomBetween(0.06, 0.96),
          width: randomBetween(0.02, 0.06),
          height: randomBetween(0.08, 0.24),
          opacity: randomBetween(0.03, 0.12),
          speed: randomBetween(0.6, 1.6),
          phase: randomBetween(0, Math.PI * 2),
          warm: Math.random() > 0.45
        }));
      }

      function getHouseLayout() {

        const roomHeight = clamp(height * 0.9, 420, 940);
        const roomX = width * 0.5 - roomWidth / 2 + parallaxX * 14;
        const roomY = height * 0.03 + parallaxY * 8;
        const floorY = roomY + roomHeight * 0.66;
        const ceilingBandH = roomHeight * 0.14;
        const roomBottom = roomY + roomHeight;

        const window = {
          id: "living-window",
          x: roomX + roomWidth * 0.07,
          y: roomY + roomHeight * 0.16,

        };
        const hallDoor = {

          h: roomHeight * 0.46
        };
        const diningArch = {
          id: "dining-arch",
          x: roomX + roomWidth * 0.79,

          w: roomWidth * 0.14,

        };
        const sofa = {
          x: roomX + roomWidth * 0.12,
          y: floorY + roomHeight * 0.04,
          w: roomWidth * 0.3,
          h: roomHeight * 0.18
        };
        const coffee = {
          x: roomX + roomWidth * 0.27,
          y: floorY + roomHeight * 0.17,
          w: roomWidth * 0.18,
          h: roomHeight * 0.06
        };
        const rug = {
          x: roomX + roomWidth * 0.18,
          y: floorY + roomHeight * 0.08,
          w: roomWidth * 0.42,
          h: roomHeight * 0.22
        };
        const shelf = {
          x: roomX + roomWidth * 0.06,
          y: roomY + roomHeight * 0.48,
          w: roomWidth * 0.12,
          h: roomHeight * 0.22
        };
        const plant = {
          x: roomX + roomWidth * 0.74,
          y: floorY + roomHeight * 0.03,
          w: roomWidth * 0.07,

        };
        const frames = [
          {
            id: "frame-left",

          },
          {

          },
          {

          }

        return {
          width: roomWidth,
          height: roomHeight,
          x: roomX,

          bottom: roomBottom,
          floorY,
          ceilingBandH,
          window,
          hallDoor,
          diningArch,

      function updateHoveredWindowFromPointer() {
        sceneState.hoveredWindowId = null;
      }

      function drawInteriorEnvelope(layout, currentTime, burn) {
        const width = sceneState.width;
        const height = sceneState.height;
        const reveal = getSceneRevealProgress(currentTime);
        const glow = getHouseGlowIntensity(currentTime);
        const sideDepth = layout.width * 0.12;
        const ceilingLift = layout.height * 0.09;
        const floorDrop = layout.height * 0.14;

        const wallGradient = sceneCtx.createLinearGradient(0, layout.y, 0, layout.floorY);
        wallGradient.addColorStop(0, "#0d1117");
        wallGradient.addColorStop(0.48, "#171c23");
        wallGradient.addColorStop(1, mixHexColor("#20252d", "#26201c", glow));
        sceneCtx.fillStyle = wallGradient;
        sceneCtx.fillRect(0, 0, width, height);

        const leftWall = sceneCtx.createLinearGradient(layout.x - sideDepth, layout.y, layout.x, layout.floorY);
        leftWall.addColorStop(0, "#1b2027");
        leftWall.addColorStop(1, mixHexColor("#2b3139", "#28221e", glow));
        sceneCtx.fillStyle = leftWall;
        sceneCtx.beginPath();
        sceneCtx.moveTo(layout.x, layout.y);
        sceneCtx.lineTo(layout.x - sideDepth, layout.y - ceilingLift);
        sceneCtx.lineTo(layout.x - sideDepth, layout.floorY + floorDrop);
        sceneCtx.lineTo(layout.x, layout.floorY);
        sceneCtx.closePath();
        sceneCtx.fill();

        const rightWall = sceneCtx.createLinearGradient(layout.x + layout.width, layout.y, layout.x + layout.width + sideDepth, layout.floorY);
        rightWall.addColorStop(0, "#262b32");
        rightWall.addColorStop(1, mixHexColor("#313740", "#312925", glow));
        sceneCtx.fillStyle = rightWall;
        sceneCtx.beginPath();
        sceneCtx.moveTo(layout.x + layout.width, layout.y);
        sceneCtx.lineTo(layout.x + layout.width + sideDepth, layout.y - ceilingLift);
        sceneCtx.lineTo(layout.x + layout.width + sideDepth, layout.floorY + floorDrop);
        sceneCtx.lineTo(layout.x + layout.width, layout.floorY);
        sceneCtx.closePath();
        sceneCtx.fill();

        const ceilingPlane = sceneCtx.createLinearGradient(0, layout.y - ceilingLift, 0, layout.y + layout.ceilingBandH);
        ceilingPlane.addColorStop(0, "#8c9098");
        ceilingPlane.addColorStop(1, "#646973");
        sceneCtx.fillStyle = ceilingPlane;
        sceneCtx.beginPath();
        sceneCtx.moveTo(layout.x - sideDepth, layout.y - ceilingLift);
        sceneCtx.lineTo(layout.x + layout.width + sideDepth, layout.y - ceilingLift);
        sceneCtx.lineTo(layout.x + layout.width, layout.y);
        sceneCtx.lineTo(layout.x, layout.y);
        sceneCtx.closePath();
        sceneCtx.fill();

        const roomGradient = sceneCtx.createLinearGradient(0, layout.y, 0, layout.floorY);
        roomGradient.addColorStop(0, mixHexColor("#1a2028", "#22201f", glow));
        roomGradient.addColorStop(0.56, mixHexColor("#252b33", "#2d2825", glow));
        roomGradient.addColorStop(1, mixHexColor("#31363d", "#3a312c", glow));
        sceneCtx.fillStyle = roomGradient;
        sceneCtx.fillRect(layout.x, layout.y, layout.width, layout.floorY - layout.y);

        const ceiling = sceneCtx.createLinearGradient(0, layout.y, 0, layout.y + layout.ceilingBandH);
        ceiling.addColorStop(0, "#b0b3b8");
        ceiling.addColorStop(1, "#767a82");
        sceneCtx.fillStyle = ceiling;
        sceneCtx.fillRect(layout.x, layout.y, layout.width, layout.ceilingBandH);

        sceneCtx.fillStyle = "#c7c9cd";
        sceneCtx.fillRect(layout.x, layout.floorY - layout.height * 0.016, layout.width, layout.height * 0.016);

        sceneCtx.strokeStyle = "rgba(255, 255, 255, 0.08)";
        sceneCtx.lineWidth = 1.2;
        sceneCtx.beginPath();
        sceneCtx.moveTo(layout.x, layout.y);
        sceneCtx.lineTo(layout.x - sideDepth, layout.y - ceilingLift);
        sceneCtx.lineTo(layout.x + layout.width + sideDepth, layout.y - ceilingLift);
        sceneCtx.lineTo(layout.x + layout.width, layout.y);
        sceneCtx.stroke();
        sceneCtx.beginPath();
        sceneCtx.moveTo(layout.x, layout.floorY);
        sceneCtx.lineTo(layout.x - sideDepth, layout.floorY + floorDrop);
        sceneCtx.moveTo(layout.x + layout.width, layout.floorY);
        sceneCtx.lineTo(layout.x + layout.width + sideDepth, layout.floorY + floorDrop);
        sceneCtx.stroke();

        const panelCount = 5;
        for (let panel = 0; panel < panelCount; panel += 1) {
          const panelX = layout.x + layout.width * (panel / panelCount);
          const panelW = layout.width / panelCount;
          sceneCtx.fillStyle = panel % 2 === 0
            ? "rgba(255, 255, 255, 0.018)"
            : "rgba(255, 255, 255, 0.008)";
          sceneCtx.fillRect(panelX, layout.y + layout.ceilingBandH, panelW, layout.floorY - layout.y - layout.ceilingBandH);
        }

        sceneCtx.strokeStyle = "rgba(255, 255, 255, 0.05)";
        sceneCtx.lineWidth = 1;
        for (let seam = 1; seam < panelCount; seam += 1) {
          const x = layout.x + layout.width * (seam / panelCount);
          sceneCtx.beginPath();
          sceneCtx.moveTo(x, layout.y + layout.ceilingBandH);
          sceneCtx.lineTo(x, layout.floorY);
          sceneCtx.stroke();
        }

        for (const stain of sceneState.horizonHomes) {
          sceneCtx.save();
          sceneCtx.translate(layout.x + layout.width * stain.x, layout.y + layout.height * stain.y);
          sceneCtx.rotate(stain.tilt);
          sceneCtx.fillStyle = `rgba(255, 255, 255, ${(stain.alpha * 0.28).toFixed(3)})`;
          sceneCtx.fillRect(-layout.width * stain.width * 0.5, -layout.height * stain.height * 0.5, layout.width * stain.width, layout.height * stain.height);
          sceneCtx.fillStyle = `rgba(0, 0, 0, ${(stain.alpha * 0.16).toFixed(3)})`;
          sceneCtx.fillRect(-layout.width * stain.width * 0.24, -layout.height * stain.height * 0.24, layout.width * stain.width * 0.7, layout.height * stain.height * 0.7);
          sceneCtx.restore();
        }

        sceneCtx.strokeStyle = "rgba(255, 255, 255, 0.06)";
        for (const crack of sceneState.treeSeeds.slice(0, 5)) {
          const startX = layout.x + layout.width * (0.12 + crack.lane * 0.72);
          const startY = layout.y + layout.height * (0.24 + crack.alpha * 0.6);
          sceneCtx.beginPath();
          sceneCtx.moveTo(startX, startY);
          sceneCtx.lineTo(startX + layout.width * crack.offset * 0.5, startY + layout.height * 0.06);
          sceneCtx.lineTo(startX - layout.width * crack.offset * 0.2, startY + layout.height * 0.14);
          sceneCtx.stroke();
        }

        drawEllipticalGlow(
          layout.window.x + layout.window.w * 0.62,
          layout.window.y + layout.window.h * 0.34,
          layout.width * 0.2,
          layout.height * 0.16,
          [
            { offset: 0, color: "rgba(196, 205, 220, 0.16)" },
            { offset: 1, color: "rgba(196, 205, 220, 0)" }
          ]
        );

        if (reveal > 0) {
          drawEllipticalGlow(
            layout.x + layout.width * 0.38,
            layout.y + layout.height * 0.34,
            layout.width * 0.34,
            layout.height * 0.24,
            [
              { offset: 0, color: `rgba(226, 230, 236, ${(0.03 + reveal * 0.08).toFixed(3)})` },
              { offset: 1, color: "rgba(226, 230, 236, 0)" }
            ]
          );
        }

        if (glow > 0.01) {
          const fireStrength = glow;
          drawEllipticalGlow(
            layout.x + layout.width * 0.5,
            layout.y + layout.height * 0.46,
            layout.width * 0.76,
            layout.height * 0.42,
            [
              { offset: 0, color: `rgba(255, 170, 82, ${(0.04 + fireStrength * 0.08).toFixed(3)})` },
              { offset: 0.52, color: `rgba(255, 86, 28, ${(0.06 + fireStrength * 0.12).toFixed(3)})` },
              { offset: 1, color: "rgba(118, 18, 8, 0)" }
            ]
          );
          drawEllipticalGlow(
            layout.x + layout.width * 0.18,
            layout.y + layout.height * 0.44,
            layout.width * 0.26,
            layout.height * 0.24,
            [
              { offset: 0, color: `rgba(255, 182, 96, ${(0.03 + fireStrength * 0.08).toFixed(3)})` },
              { offset: 0.56, color: `rgba(234, 72, 20, ${(0.04 + fireStrength * 0.08).toFixed(3)})` },
              { offset: 1, color: "rgba(110, 16, 8, 0)" }
            ]
          );
          drawEllipticalGlow(
            layout.x + layout.width * 0.82,
            layout.y + layout.height * 0.4,
            layout.width * 0.24,
            layout.height * 0.22,
            [
              { offset: 0, color: `rgba(255, 182, 96, ${(0.03 + fireStrength * 0.08).toFixed(3)})` },
              { offset: 0.56, color: `rgba(234, 72, 20, ${(0.04 + fireStrength * 0.08).toFixed(3)})` },
              { offset: 1, color: "rgba(110, 16, 8, 0)" }
            ]
          );
        }
      }

      function drawFloor(layout, currentTime, burn) {
        const glow = getHouseGlowIntensity(currentTime);
        const floorGradient = sceneCtx.createLinearGradient(0, layout.floorY, 0, sceneState.height);
        floorGradient.addColorStop(0, "#4b4f55");
        floorGradient.addColorStop(0.42, mixHexColor("#34383d", "#4a433f", glow));
        floorGradient.addColorStop(1, "#17181b");
        sceneCtx.fillStyle = floorGradient;
        sceneCtx.beginPath();
        sceneCtx.moveTo(layout.x, layout.floorY);
        sceneCtx.lineTo(layout.x + layout.width, layout.floorY);
        sceneCtx.lineTo(sceneState.width, sceneState.height);
        sceneCtx.lineTo(0, sceneState.height);
        sceneCtx.closePath();
        sceneCtx.fill();

        sceneCtx.strokeStyle = "rgba(255, 255, 255, 0.07)";
        sceneCtx.lineWidth = 1;
        for (const plank of sceneState.treeSeeds) {
          const startX = layout.x + layout.width * (plank.lane + plank.offset * 0.5);
          const endX = startX + (plank.lane - 0.5) * layout.width * 0.42 + plank.offset * layout.width;
          sceneCtx.beginPath();
          sceneCtx.moveTo(startX, layout.floorY);
          sceneCtx.lineTo(endX, sceneState.height);
          sceneCtx.strokeStyle = `rgba(255, 255, 255, ${(plank.alpha * 0.8).toFixed(3)})`;
          sceneCtx.stroke();
        }

        if (glow > 0.01) {
          drawEllipticalGlow(
            layout.x + layout.width * 0.52,
            layout.floorY + (sceneState.height - layout.floorY) * 0.38,
            layout.width * 0.48,
            (sceneState.height - layout.floorY) * 0.44,
            [
              { offset: 0, color: `rgba(210, 198, 186, ${(0.03 + glow * 0.07).toFixed(3)})` },
              { offset: 1, color: "rgba(210, 198, 186, 0)" }
            ]
          );
        }
      }

      function drawRug(layout) {
        const rug = layout.rug;
        const rugGradient = sceneCtx.createLinearGradient(0, rug.y, 0, rug.y + rug.h);
        rugGradient.addColorStop(0, "#50545c");
        rugGradient.addColorStop(1, "#23262c");
        sceneCtx.fillStyle = rugGradient;
        fillRoundedRect(rug.x, rug.y, rug.w, rug.h, rug.h * 0.18);

        sceneCtx.strokeStyle = "rgba(255, 255, 255, 0.14)";
        sceneCtx.lineWidth = 1.5;
        strokeRoundedRect(rug.x + rug.w * 0.03, rug.y + rug.h * 0.08, rug.w * 0.94, rug.h * 0.84, rug.h * 0.14);
      }

      function drawOutsideWindow(layout, currentTime) {
        const window = layout.window;
        const exteriorBlast = getExteriorBlastStrength(currentTime);
        const collapse = getFinalDestructionProgress(currentTime);
        const framePad = layout.width * 0.012;
        const sillH = framePad * 0.95;
        sceneCtx.fillStyle = "rgba(18, 22, 28, 0.34)";
        sceneCtx.fillRect(window.x - framePad * 1.25, window.y - framePad, window.w + framePad * 2.5, window.h + framePad * 2.2);
        sceneCtx.fillStyle = "#d5d8dd";
        sceneCtx.fillRect(window.x - framePad, window.y - framePad, window.w + framePad * 2, window.h + framePad * 2);
        sceneCtx.fillStyle = "#bcc0c6";
        sceneCtx.fillRect(window.x - framePad * 1.15, window.y + window.h + framePad * 0.28, window.w + framePad * 2.3, sillH);
        sceneCtx.fillStyle = "rgba(16, 18, 22, 0.3)";
        sceneCtx.fillRect(window.x - framePad * 0.9, window.y + window.h + framePad * 0.28 + sillH, window.w + framePad * 1.8, framePad * 0.45);

        sceneCtx.save();
        sceneCtx.beginPath();
        sceneCtx.rect(window.x, window.y, window.w, window.h);
        sceneCtx.clip();

        const glass = sceneCtx.createLinearGradient(window.x, window.y, window.x + window.w, window.y + window.h);
        glass.addColorStop(0, "#a4a9b0");
        glass.addColorStop(0.52, "#7f858d");
        glass.addColorStop(1, "#5c626a");
        sceneCtx.fillStyle = glass;
        sceneCtx.fillRect(window.x, window.y, window.w, window.h);
        sceneCtx.fillStyle = "rgba(18, 22, 28, 0.18)";
        sceneCtx.fillRect(window.x, window.y, window.w, framePad * 0.75);
        sceneCtx.fillRect(window.x, window.y, framePad * 0.7, window.h);
        sceneCtx.fillRect(window.x + window.w - framePad * 0.7, window.y, framePad * 0.7, window.h);

        if (exteriorBlast > 0.02) {
          drawEllipticalGlow(
            window.x + window.w * 0.34,
            window.y + window.h * (0.36 - collapse * 0.04),
            window.w * (0.18 + exteriorBlast * 0.12),
            window.h * (0.2 + exteriorBlast * 0.12),
            [
              { offset: 0, color: `rgba(255, 214, 132, ${(0.1 + exteriorBlast * 0.24).toFixed(3)})` },
              { offset: 0.52, color: `rgba(255, 126, 42, ${(0.08 + exteriorBlast * 0.24).toFixed(3)})` },
              { offset: 1, color: "rgba(110, 18, 8, 0)" }
            ]
          );
          drawEllipticalGlow(
            window.x + window.w * 0.72,
            window.y + window.h * (0.54 + collapse * 0.06),
            window.w * (0.16 + exteriorBlast * 0.14),
            window.h * (0.18 + exteriorBlast * 0.14),
            [
              { offset: 0, color: `rgba(255, 208, 118, ${(0.08 + exteriorBlast * 0.18).toFixed(3)})` },
              { offset: 0.56, color: `rgba(244, 88, 24, ${(0.06 + exteriorBlast * 0.18).toFixed(3)})` },
              { offset: 1, color: "rgba(108, 16, 8, 0)" }
            ]
          );

          const streakCount = Math.max(2, Math.round(2 + exteriorBlast * 3));
          sceneCtx.strokeStyle = `rgba(255, 198, 118, ${(0.08 + exteriorBlast * 0.18).toFixed(3)})`;
          sceneCtx.lineWidth = Math.max(1, layout.width * 0.0014);
          for (let streak = 0; streak < streakCount; streak += 1) {
            const seed = 31.7 + streak * 1.19;
            const x = window.x + window.w * (0.12 + seededUnit(seed) * 0.76);
            const y = window.y + window.h * (0.08 + seededUnit(seed + 0.8) * 0.72);
            const dx = window.w * (0.04 + exteriorBlast * 0.08) * (seededUnit(seed + 1.6) - 0.5);
            const dy = window.h * (0.08 + exteriorBlast * 0.14) * (0.5 + seededUnit(seed + 2.4));
            sceneCtx.beginPath();
            sceneCtx.moveTo(x, y);
            sceneCtx.lineTo(x + dx, y - dy);
            sceneCtx.stroke();
          }
        }

        drawEllipticalGlow(
          window.x + window.w * 0.46,
          window.y + window.h * 0.36,
          window.w * 0.42,
          window.h * 0.34,
          [
            { offset: 0, color: "rgba(236, 239, 243, 0.14)" },
            { offset: 1, color: "rgba(236, 239, 243, 0)" }
          ]
        );

        sceneCtx.fillStyle = "rgba(42, 46, 52, 0.84)";
        for (let slat = 0; slat < 7; slat += 1) {
          const slatY = window.y + window.h * (0.08 + slat * 0.115);
          sceneCtx.fillRect(window.x + window.w * 0.06, slatY, window.w * 0.88, window.h * 0.045);
        }

        sceneCtx.fillStyle = "rgba(68, 72, 78, 0.92)";
        sceneCtx.beginPath();
        sceneCtx.moveTo(window.x, window.y);
        sceneCtx.lineTo(window.x + window.w * 0.18, window.y);
        sceneCtx.lineTo(window.x + window.w * 0.14, window.y + window.h);
        sceneCtx.lineTo(window.x, window.y + window.h);
        sceneCtx.closePath();
        sceneCtx.fill();
        sceneCtx.beginPath();
        sceneCtx.moveTo(window.x + window.w, window.y);
        sceneCtx.lineTo(window.x + window.w * 0.82, window.y);
        sceneCtx.lineTo(window.x + window.w * 0.86, window.y + window.h);
        sceneCtx.lineTo(window.x + window.w, window.y + window.h);
        sceneCtx.closePath();
        sceneCtx.fill();

        sceneCtx.strokeStyle = "rgba(255, 255, 255, 0.08)";
        sceneCtx.lineWidth = 1;
        sceneCtx.beginPath();
        sceneCtx.moveTo(window.x + window.w * 0.18, window.y + window.h * 0.18);
        sceneCtx.lineTo(window.x + window.w * 0.78, window.y + window.h * 0.34);
        sceneCtx.stroke();

        if (collapse > 0.08) {
          sceneCtx.strokeStyle = `rgba(230, 232, 236, ${(0.06 + collapse * 0.12).toFixed(3)})`;
          sceneCtx.lineWidth = 1;
          sceneCtx.beginPath();
          sceneCtx.moveTo(window.x + window.w * 0.52, window.y + window.h * 0.12);
          sceneCtx.lineTo(window.x + window.w * 0.44, window.y + window.h * 0.34);
          sceneCtx.lineTo(window.x + window.w * 0.62, window.y + window.h * 0.54);
          sceneCtx.lineTo(window.x + window.w * 0.48, window.y + window.h * 0.86);
          sceneCtx.stroke();

          sceneCtx.beginPath();
          sceneCtx.moveTo(window.x + window.w * 0.64, window.y + window.h * 0.22);
          sceneCtx.lineTo(window.x + window.w * 0.54, window.y + window.h * 0.4);
          sceneCtx.lineTo(window.x + window.w * 0.76, window.y + window.h * 0.68);
          sceneCtx.stroke();
        }
        sceneCtx.restore();

        sceneCtx.strokeStyle = "rgba(14, 18, 24, 0.44)";
        sceneCtx.lineWidth = 1;
        sceneCtx.strokeRect(window.x, window.y, window.w, window.h);
        sceneCtx.strokeStyle = "#e4e6eb";
        sceneCtx.lineWidth = Math.max(2, window.w * 0.045);
        sceneCtx.beginPath();
        sceneCtx.moveTo(window.x + window.w * 0.5, window.y);
        sceneCtx.lineTo(window.x + window.w * 0.5, window.y + window.h);
        sceneCtx.moveTo(window.x, window.y + window.h * 0.5);
        sceneCtx.lineTo(window.x + window.w, window.y + window.h * 0.5);
        sceneCtx.stroke();
      }

      function drawFamilyFrames(layout) {
        const photo = sceneState.framePhoto;

        for (let index = 0; index < layout.frames.length; index += 1) {
          const frame = layout.frames[index];
          sceneCtx.save();
          sceneCtx.translate(frame.x + frame.w * 0.5, frame.y + frame.h * 0.5);
          sceneCtx.rotate(frame.tilt);
          sceneCtx.fillStyle = "rgba(14, 16, 20, 0.28)";
          fillRoundedRect(-frame.w * 0.5 + frame.w * 0.05, -frame.h * 0.5 + frame.h * 0.06, frame.w, frame.h, layout.width * 0.004);
          sceneCtx.fillStyle = "#9c9fa4";
          fillRoundedRect(-frame.w * 0.5, -frame.h * 0.5, frame.w, frame.h, layout.width * 0.004);

          if (photo && photo.complete && photo.naturalWidth > 0 && photo.naturalHeight > 0) {
            const innerX = -frame.w * 0.38;
            const innerY = -frame.h * 0.38;
            const innerW = frame.w * 0.76;
            const innerH = frame.h * 0.76;
            const cropSeed = 3.7 + index * 2.13;
            const sourceW = photo.naturalWidth * 0.48;
            const sourceH = photo.naturalHeight * 0.48;
            const sourceX = (photo.naturalWidth - sourceW) * seededUnit(cropSeed);
            const sourceY = (photo.naturalHeight - sourceH) * seededUnit(cropSeed + 0.81);

            sceneCtx.save();
            sceneCtx.beginPath();
            roundedRectPath(innerX, innerY, innerW, innerH, layout.width * 0.003);
            sceneCtx.clip();
            sceneCtx.drawImage(photo, sourceX, sourceY, sourceW, sourceH, innerX, innerY, innerW, innerH);
            const wash = sceneCtx.createLinearGradient(innerX, innerY, innerX + innerW, innerY + innerH);
            wash.addColorStop(0, "rgba(18, 22, 30, 0.12)");
            wash.addColorStop(0.58, "rgba(18, 22, 30, 0)");
            wash.addColorStop(1, "rgba(18, 22, 30, 0.2)");
            sceneCtx.fillStyle = wash;
            sceneCtx.fillRect(innerX, innerY, innerW, innerH);
            sceneCtx.restore();

            sceneCtx.strokeStyle = "rgba(236, 239, 244, 0.18)";
            sceneCtx.lineWidth = 1;
            sceneCtx.beginPath();
            sceneCtx.moveTo(innerX + innerW * 0.14, innerY + innerH * 0.12);
            sceneCtx.lineTo(innerX + innerW * 0.34, innerY + innerH * 0.12);
            sceneCtx.lineTo(innerX + innerW * 0.18, innerY + innerH * 0.82);
            sceneCtx.stroke();
          } else {
            sceneCtx.fillStyle = "#1b1f25";
            fillRoundedRect(-frame.w * 0.38, -frame.h * 0.38, frame.w * 0.76, frame.h * 0.76, layout.width * 0.003);
            sceneCtx.fillStyle = "rgba(214, 218, 224, 0.12)";
            sceneCtx.fillRect(-frame.w * 0.22, -frame.h * 0.24, frame.w * 0.18, frame.h * 0.34);
            sceneCtx.fillRect(frame.w * 0.02, -frame.h * 0.18, frame.w * 0.14, frame.h * 0.28);
            sceneCtx.fillRect(-frame.w * 0.1, frame.h * 0.08, frame.w * 0.34, frame.h * 0.08);
          }
          sceneCtx.fillStyle = "#b8bcc2";
          sceneCtx.beginPath();
          sceneCtx.arc(0, -frame.h * 0.57, Math.max(1.2, layout.width * 0.0022), 0, Math.PI * 2);
          sceneCtx.fill();
          sceneCtx.restore();
        }
      }
