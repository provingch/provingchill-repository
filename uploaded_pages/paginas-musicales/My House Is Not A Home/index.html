      function drawPlant(layout, currentTime) {
        const wobble = Math.sin(currentTime * 0.8) * layout.width * 0.004;
        sceneCtx.fillStyle = "#2a2d31";
        fillRoundedRect(layout.plant.x, layout.plant.y + layout.plant.h * 0.68, layout.plant.w, layout.plant.h * 0.3, layout.width * 0.004);
        sceneCtx.strokeStyle = "rgba(168, 172, 180, 0.75)";
        sceneCtx.lineWidth = 1.6;
        for (let branch = 0; branch < 5; branch += 1) {
          const stemX = layout.plant.x + layout.plant.w * (0.2 + branch * 0.15);
          const stemBaseY = layout.plant.y + layout.plant.h * 0.72;
          sceneCtx.beginPath();
          sceneCtx.moveTo(stemX, stemBaseY);
          sceneCtx.lineTo(stemX + wobble * (branch - 2), layout.plant.y + layout.plant.h * (0.16 + branch * 0.06));
          sceneCtx.lineTo(stemX + wobble * (branch - 1.5) + layout.plant.w * 0.08 * (branch % 2 === 0 ? 1 : -1), layout.plant.y + layout.plant.h * (0.08 + branch * 0.05));
          sceneCtx.stroke();
        }
      }

      function drawFlameShape(cx, baseY, width, height, alpha, lean = 0, asymmetry = 0.5, tipCurl = 0) {
        const tipX = cx + width * lean;
        const leftSpread = width * (0.66 + (1 - asymmetry) * 0.42);
        const rightSpread = width * (0.66 + asymmetry * 0.42);
        const shoulderY = baseY - height * 0.18;
        const waistY = baseY - height * (0.52 + tipCurl * 0.08);
        const flameGradient = sceneCtx.createLinearGradient(0, baseY - height, 0, baseY);
        flameGradient.addColorStop(0, `rgba(255, 248, 220, ${(alpha * 0.9).toFixed(3)})`);
        flameGradient.addColorStop(0.22, `rgba(255, 214, 112, ${(alpha * 0.95).toFixed(3)})`);
        flameGradient.addColorStop(0.56, `rgba(255, 128, 34, ${(alpha * 0.88).toFixed(3)})`);
        flameGradient.addColorStop(0.84, `rgba(196, 42, 12, ${(alpha * 0.62).toFixed(3)})`);
        flameGradient.addColorStop(1, "rgba(66, 10, 4, 0)");
        sceneCtx.fillStyle = flameGradient;

        sceneCtx.beginPath();
        sceneCtx.moveTo(cx - width * 0.18, baseY);
        sceneCtx.bezierCurveTo(
          cx - leftSpread,
          shoulderY,
          cx - width * (0.54 + (1 - asymmetry) * 0.18),
          waistY,
          tipX,
          baseY - height
        );
        sceneCtx.bezierCurveTo(
          tipX + width * (0.16 + tipCurl * 0.18),
          baseY - height * 0.84,
          cx + width * (0.46 + asymmetry * 0.34),
          baseY - height * 0.24,
          cx + width * 0.12,
          baseY
        );
        sceneCtx.quadraticCurveTo(cx, baseY - height * 0.04, cx - width * 0.18, baseY);
        sceneCtx.fill();

        const coreWidth = width * 0.52;
        const coreHeight = height * 0.62;
        const coreBaseY = baseY - height * 0.02;
        const coreGradient = sceneCtx.createLinearGradient(0, coreBaseY - coreHeight, 0, coreBaseY);
        coreGradient.addColorStop(0, `rgba(255, 255, 246, ${(alpha * 0.82).toFixed(3)})`);
        coreGradient.addColorStop(0.36, `rgba(255, 230, 152, ${(alpha * 0.78).toFixed(3)})`);
        coreGradient.addColorStop(1, "rgba(255, 176, 58, 0)");
        sceneCtx.fillStyle = coreGradient;
        sceneCtx.beginPath();
        sceneCtx.moveTo(cx - coreWidth * 0.1, coreBaseY);
        sceneCtx.bezierCurveTo(
          cx - coreWidth * (0.64 + (1 - asymmetry) * 0.18),
          coreBaseY - coreHeight * 0.18,
          cx - coreWidth * 0.34,
          coreBaseY - coreHeight * 0.8,
          cx + coreWidth * lean * 0.44,
          coreBaseY - coreHeight
        );
        sceneCtx.bezierCurveTo(
          cx + coreWidth * (0.22 + tipCurl * 0.08),
          coreBaseY - coreHeight * 0.84,
          cx + coreWidth * (0.58 + asymmetry * 0.18),
          coreBaseY - coreHeight * 0.22,
          cx + coreWidth * 0.08,
          coreBaseY
        );
        sceneCtx.quadraticCurveTo(cx, coreBaseY - coreHeight * 0.04, cx - coreWidth * 0.1, coreBaseY);
        sceneCtx.fill();

        sceneCtx.fillStyle = `rgba(255, 118, 24, ${(alpha * 0.22).toFixed(3)})`;
        sceneCtx.beginPath();
        sceneCtx.moveTo(cx + width * 0.04, baseY);
        sceneCtx.quadraticCurveTo(
          cx + width * (0.5 + asymmetry * 0.18),
          baseY - height * 0.26,
          cx + width * (0.2 + tipCurl * 0.08),
          baseY - height * 0.64
        );
        sceneCtx.quadraticCurveTo(
          cx - width * 0.02,
          baseY - height * 0.34,
          cx + width * 0.04,
          baseY
        );
        sceneCtx.fill();
      }

      function drawFlameField(x, baseY, width, maxHeight, intensity, alpha, currentTime, seed) {
        if (intensity <= 0.01 || alpha <= 0.01) {
          return;
        }

        const quality = getEffectQuality();
        const flameCount = Math.max(5, Math.round((width / 28 + intensity * 3.2) * (0.72 + quality * 0.28)));
        drawEllipticalGlow(
          x + width * 0.5,
          baseY - maxHeight * 0.08,
          width * (0.54 + intensity * 0.2),
          maxHeight * (0.36 + intensity * 0.16),
          [
            { offset: 0, color: `rgba(255, 176, 78, ${((0.05 + intensity * 0.16) * alpha).toFixed(3)})` },
            { offset: 0.52, color: `rgba(245, 72, 18, ${((0.04 + intensity * 0.12) * alpha).toFixed(3)})` },
            { offset: 1, color: "rgba(88, 12, 4, 0)" }
          ]
        );
        drawEllipticalGlow(
          x + width * 0.5,
          baseY + maxHeight * 0.04,
          width * (0.48 + intensity * 0.14),
          maxHeight * (0.16 + intensity * 0.08),
          [
            { offset: 0, color: `rgba(255, 118, 18, ${((0.14 + intensity * 0.16) * alpha).toFixed(3)})` },
            { offset: 0.65, color: `rgba(164, 28, 8, ${((0.08 + intensity * 0.08) * alpha).toFixed(3)})` },
            { offset: 1, color: "rgba(42, 8, 4, 0)" }
          ]
        );

        const sheetCount = Math.max(3, Math.round(flameCount * (0.24 + quality * 0.14)));
        for (let index = 0; index < sheetCount; index += 1) {
          const seedValue = seed * 8.7 + index * 0.73;
          const ratio = sheetCount === 1 ? 0.5 : index / (sheetCount - 1);
          const cx = x + width * ratio + Math.sin(currentTime * (0.62 + seededUnit(seedValue + 0.8) * 0.35) + seedValue) * width * 0.012;
          const flameWidth = width / sheetCount * (0.82 + seededUnit(seedValue + 1.7) * 0.64);
          const flameHeight = maxHeight * (0.16 + intensity * 0.18) * (0.78 + 0.22 * (0.5 + 0.5 * Math.sin(currentTime * 2.2 + seedValue * 0.6)));
          const lean = (seededUnit(seedValue + 2.4) - 0.5) * 0.74;
          const asymmetry = seededUnit(seedValue + 3.3);
          const tipCurl = seededUnit(seedValue + 4.1) - 0.5;
          drawFlameShape(
            cx,
            baseY + maxHeight * (seededUnit(seedValue + 4.9) * 0.05),
            flameWidth,
            flameHeight,
            (0.3 + intensity * 0.18) * alpha,
            lean,
            asymmetry,
            tipCurl
          );
        }

        const frontRowCount = Math.max(3, Math.round(flameCount * (0.22 + quality * 0.08)));
        for (let index = 0; index < frontRowCount; index += 1) {
          const seedValue = seed * 11.9 + index * 0.91;
          const ratio = frontRowCount === 1 ? 0.5 : index / (frontRowCount - 1);
          const driftSpeed = 0.84 + seededUnit(seedValue + 0.4) * 0.68;
          const cx = x + width * ratio + Math.sin(currentTime * driftSpeed + seedValue) * width * (0.016 + intensity * 0.012);
          const flameWidth = width / flameCount * (0.44 + intensity * 0.28 + seededUnit(seedValue + 2.1) * 0.18);
          const flameHeight = maxHeight * (0.22 + intensity * 0.22) * (0.62 + 0.38 * (0.5 + 0.5 * Math.sin(currentTime * (3 + seededUnit(seedValue + 1.2) * 1.2) + seedValue * 0.72)));
          const flicker = 0.5 + 0.5 * Math.sin(currentTime * (4.2 + seededUnit(seedValue + 3.6) * 1.2) + seedValue * 1.1);
          const lean = (seededUnit(seedValue + 4.5) - 0.5) * (0.7 + flicker * 0.26);
          const asymmetry = seededUnit(seedValue + 5.4);
          const tipCurl = seededUnit(seedValue + 6.1) - 0.5;
          const baseLift = maxHeight * (seededUnit(seedValue + 7.3) * 0.04 - 0.01);

          drawEllipticalGlow(
            cx,
            baseY - flameHeight * 0.2,
            flameWidth * (1.3 + intensity * 0.32),
            flameHeight * (0.42 + intensity * 0.1),
            [
              { offset: 0, color: `rgba(255, 202, 102, ${((0.08 + intensity * 0.1) * alpha).toFixed(3)})` },
              { offset: 0.58, color: `rgba(255, 94, 22, ${((0.04 + intensity * 0.08) * alpha).toFixed(3)})` },
              { offset: 1, color: "rgba(104, 18, 8, 0)" }
            ]
          );
          drawFlameShape(
            cx,
            baseY + baseLift,
            flameWidth,
            flameHeight,
            (0.42 + intensity * 0.24) * alpha,
            lean,
            asymmetry,
            tipCurl
          );
          drawFlameShape(
            cx + flameWidth * (0.12 + lean * 0.16) * (flicker - 0.45),
            baseY + baseLift * 0.4,
            flameWidth * (0.5 + seededUnit(seedValue + 8.4) * 0.14),
            flameHeight * (0.48 + flicker * 0.14),
            (0.28 + intensity * 0.18) * alpha,
            lean * 1.16,
            seededUnit(seedValue + 9.2),
            tipCurl * 0.7
          );
        }
      }

      function drawHallway(layout, currentTime, burn) {
        const hall = layout.hallDoor;
        const glow = getHouseGlowIntensity(currentTime);
        const fireVisual = getHouseFireVisualState(currentTime);
        const framePad = layout.width * 0.012;
        sceneCtx.fillStyle = "rgba(18, 22, 28, 0.34)";
        sceneCtx.fillRect(hall.x - framePad * 1.25, hall.y - framePad, hall.w + framePad * 2.5, hall.h + framePad * 2.1);
        sceneCtx.fillStyle = "#d5d7dc";
        sceneCtx.fillRect(hall.x - framePad, hall.y - framePad, hall.w + framePad * 2, hall.h + framePad * 2);
        sceneCtx.fillStyle = "#bcc0c6";
        sceneCtx.fillRect(hall.x - framePad * 0.4, hall.y + hall.h - framePad * 0.1, hall.w + framePad * 0.8, framePad * 0.95);
        sceneCtx.fillStyle = "rgba(18, 20, 24, 0.28)";
        sceneCtx.fillRect(hall.x - framePad * 0.2, hall.y + hall.h + framePad * 0.82, hall.w + framePad * 0.4, framePad * 0.36);

        const door = {
          x: hall.x + hall.w * 0.08,
          y: hall.y + hall.h * 0.03,
          w: hall.w * 0.84,
          h: hall.h * 0.94
        };
        sceneCtx.fillStyle = "rgba(14, 18, 24, 0.22)";
        sceneCtx.fillRect(door.x - framePad * 0.4, door.y, door.w + framePad * 0.8, door.h);
        const doorGradient = sceneCtx.createLinearGradient(door.x, door.y, door.x + door.w, door.y + door.h);
        doorGradient.addColorStop(0, mixHexColor("#40454d", "#4a433e", glow));
        doorGradient.addColorStop(1, mixHexColor("#232830", "#2f2a27", glow));
        sceneCtx.fillStyle = doorGradient;
        fillRoundedRect(door.x, door.y, door.w, door.h, layout.width * 0.008);

        sceneCtx.strokeStyle = "rgba(255, 255, 255, 0.08)";
        sceneCtx.lineWidth = 1.2;
        strokeRoundedRect(door.x + door.w * 0.08, door.y + door.h * 0.08, door.w * 0.84, door.h * 0.34, layout.width * 0.006);
        strokeRoundedRect(door.x + door.w * 0.08, door.y + door.h * 0.5, door.w * 0.84, door.h * 0.34, layout.width * 0.006);

        sceneCtx.fillStyle = "#d6d9de";
        sceneCtx.beginPath();
        sceneCtx.arc(door.x + door.w * 0.82, door.y + door.h * 0.52, hall.w * 0.035, 0, Math.PI * 2);
        sceneCtx.fill();

        if (glow > 0.01) {
          const fireStrength = clamp(fireVisual.body * 0.72 + glow * 0.28, 0, 1);
          const fireAlpha = clamp(fireVisual.alpha * 0.82 + glow * 0.18, 0, 1);
          drawEllipticalGlow(
            door.x + door.w * 0.5,
            door.y + door.h * 0.52,
            door.w * 0.98,
            door.h * 0.92,
            [
              { offset: 0, color: `rgba(255, 184, 92, ${((0.04 + fireStrength * 0.1) * fireAlpha).toFixed(3)})` },
              { offset: 0.5, color: `rgba(245, 88, 26, ${((0.05 + fireStrength * 0.12) * fireAlpha).toFixed(3)})` },
              { offset: 1, color: "rgba(116, 18, 8, 0)" }
            ],
            "screen"
          );
          sceneCtx.fillStyle = `rgba(255, 170, 86, ${((0.05 + fireStrength * 0.16) * fireAlpha).toFixed(3)})`;
          sceneCtx.fillRect(door.x + door.w * 0.03, door.y + door.h * 0.968, door.w * 0.94, hall.h * 0.018);
          sceneCtx.fillStyle = `rgba(255, 104, 32, ${((0.05 + fireStrength * 0.13) * fireAlpha).toFixed(3)})`;
          sceneCtx.fillRect(door.x + door.w * 0.018, door.y + door.h * 0.06, hall.w * 0.016, door.h * 0.88);
          sceneCtx.fillRect(door.x + door.w * 0.966, door.y + door.h * 0.06, hall.w * 0.016, door.h * 0.88);
          sceneCtx.fillRect(door.x + door.w * 0.08, door.y + door.h * 0.02, door.w * 0.84, hall.h * 0.012);
          drawFlameField(
            door.x + door.w * 0.1,
            door.y + door.h * 0.985,
            door.w * 0.8,
            hall.h * 0.18,
            fireStrength * 0.5,
            fireAlpha,
            currentTime,
            3.1
          );
        }

        sceneCtx.strokeStyle = "rgba(24, 28, 34, 0.32)";
        sceneCtx.lineWidth = 1.5;
        strokeRoundedRect(hall.x, hall.y, hall.w, hall.h, layout.width * 0.01);
      }

      function drawDiningNook(layout, currentTime, burn) {
        const arch = layout.diningArch;
        const glow = getHouseGlowIntensity(currentTime);
        sceneCtx.fillStyle = "#d5d7dc";
        fillRoundedRect(arch.x - layout.width * 0.006, arch.y - layout.width * 0.006, arch.w + layout.width * 0.012, arch.h + layout.width * 0.012, layout.width * 0.01);
        sceneCtx.save();
        sceneCtx.beginPath();
        roundedRectPath(arch.x, arch.y, arch.w, arch.h, layout.width * 0.01);
        sceneCtx.clip();

        const roomGrad = sceneCtx.createLinearGradient(0, arch.y, 0, arch.y + arch.h);
        roomGrad.addColorStop(0, "#22272e");
        roomGrad.addColorStop(1, mixHexColor("#1b2026", "#322d29", glow));
        sceneCtx.fillStyle = roomGrad;
        sceneCtx.fillRect(arch.x, arch.y, arch.w, arch.h);

        drawEllipticalGlow(
          arch.x + arch.w * 0.54,
          arch.y + arch.h * 0.22,
          arch.w * 0.22,
          arch.h * 0.16,
          [
            { offset: 0, color: `rgba(220, 224, 230, ${(0.08 + glow * 0.04).toFixed(3)})` },
            { offset: 1, color: "rgba(220, 224, 230, 0)" }
          ]
        );

        sceneCtx.fillStyle = "#41454b";
        fillRoundedRect(arch.x + arch.w * 0.18, arch.y + arch.h * 0.66, arch.w * 0.54, arch.h * 0.08, arch.h * 0.05);
        sceneCtx.fillRect(arch.x + arch.w * 0.24, arch.y + arch.h * 0.74, arch.w * 0.04, arch.h * 0.18);
        sceneCtx.fillRect(arch.x + arch.w * 0.62, arch.y + arch.h * 0.74, arch.w * 0.04, arch.h * 0.18);
        sceneCtx.fillRect(arch.x + arch.w * 0.24, arch.y + arch.h * 0.58, arch.w * 0.1, arch.h * 0.06);
        sceneCtx.fillRect(arch.x + arch.w * 0.56, arch.y + arch.h * 0.58, arch.w * 0.1, arch.h * 0.06);
        sceneCtx.restore();
      }

      function drawInteriorParticles(layout, currentTime, burn) {
        for (const band of sceneState.mistBands) {
          const shaftX = layout.window.x + layout.window.w * band.x;
          const shaftWidth = layout.width * band.width;
          const drift = Math.sin(currentTime * band.speed + band.phase) * layout.width * 0.015;
          sceneCtx.save();
          sceneCtx.translate(shaftX + drift, layout.window.y + layout.window.h * 0.14);
          sceneCtx.rotate(band.tilt);
          const shaft = sceneCtx.createLinearGradient(0, 0, 0, layout.height * 0.62);
          shaft.addColorStop(0, `rgba(210, 216, 226, ${(band.opacity + burn * 0.01).toFixed(3)})`);
          shaft.addColorStop(1, "rgba(210, 216, 226, 0)");
          sceneCtx.fillStyle = shaft;
          sceneCtx.fillRect(-shaftWidth * 0.5, 0, shaftWidth, layout.height * 0.62);
          sceneCtx.restore();
        }

        for (const mote of sceneState.stars) {
          const alpha = mote.alpha * (0.55 + 0.45 * (0.5 + 0.5 * Math.sin(currentTime * mote.speed + mote.phase)));
          const x = sceneState.width * mote.x + Math.sin(currentTime * 0.18 + mote.phase) * layout.width * 0.01;
          const y = sceneState.height * mote.y + Math.cos(currentTime * 0.15 + mote.phase) * layout.height * 0.008;
          sceneCtx.fillStyle = `rgba(226, 230, 236, ${alpha.toFixed(3)})`;
          sceneCtx.beginPath();
          sceneCtx.arc(x, y, Math.max(0.7, sceneState.width * mote.r), 0, Math.PI * 2);
          sceneCtx.fill();
        }
      }

      function drawRoomBurn(layout, currentTime, burn) {
        const fireVisual = getHouseFireVisualState(currentTime);
        const fireStrength = fireVisual.body;
        const fireAlpha = fireVisual.alpha;
        const glowStrength = getHouseGlowIntensity(currentTime);
        if (Math.max(fireAlpha, glowStrength) <= 0.01) {
          return;
        }

        const collapse = getFinalDestructionProgress(currentTime);
        const blast = getBlastIntensity(currentTime);
        drawEllipticalGlow(
          layout.x + layout.width * 0.5,
          layout.y + layout.height * 0.44,
          layout.width * 0.96,
          layout.height * 0.6,
          [
            { offset: 0, color: `rgba(255, 170, 82, ${(0.05 + glowStrength * 0.14).toFixed(3)})` },
            { offset: 0.58, color: `rgba(238, 70, 18, ${(0.06 + glowStrength * 0.14).toFixed(3)})` },
            { offset: 1, color: "rgba(96, 14, 6, 0)" }
          ]
        );
        drawEllipticalGlow(
          layout.x + layout.width * 0.18,
          layout.floorY + (sceneState.height - layout.floorY) * 0.18,
          layout.width * 0.22,
          layout.height * 0.18,
          [
            { offset: 0, color: `rgba(255, 190, 96, ${(0.04 + glowStrength * 0.1).toFixed(3)})` },
            { offset: 0.55, color: `rgba(240, 78, 20, ${(0.04 + glowStrength * 0.08).toFixed(3)})` },
            { offset: 1, color: "rgba(94, 14, 6, 0)" }
          ]
        );
        drawEllipticalGlow(
          layout.x + layout.width * 0.82,
          layout.floorY + (sceneState.height - layout.floorY) * 0.14,
          layout.width * 0.22,
          layout.height * 0.16,
          [
            { offset: 0, color: `rgba(255, 190, 96, ${(0.04 + glowStrength * 0.1).toFixed(3)})` },
            { offset: 0.55, color: `rgba(240, 78, 20, ${(0.04 + glowStrength * 0.08).toFixed(3)})` },
            { offset: 1, color: "rgba(94, 14, 6, 0)" }
          ]
        );
        drawFlameField(
          layout.sofa.x + layout.sofa.w * 0.1,
          layout.sofa.y + layout.sofa.h * 0.38,
          layout.sofa.w * 0.8,
          layout.sofa.h * 0.46,
          fireStrength * 0.76,
          fireAlpha,
          currentTime,
          1.2
        );
        drawFlameField(
          layout.coffee.x + layout.coffee.w * 0.16,
          layout.coffee.y + layout.coffee.h * 0.26,
          layout.coffee.w * 0.68,
          layout.coffee.h * 2.2,
          fireStrength * 0.44,
          fireAlpha * 0.9,
          currentTime,
          2.1
        );
        drawFlameField(
          layout.shelf.x + layout.shelf.w * 0.12,
          layout.shelf.y + layout.shelf.h * 0.14,
          layout.shelf.w * 0.72,
          layout.shelf.h * 0.36,
          fireStrength * 0.42,
          fireAlpha * 0.88,
          currentTime,
          2.9
        );
        drawFlameField(
          layout.rug.x + layout.rug.w * 0.08,
          layout.rug.y + layout.rug.h * 0.7,
          layout.rug.w * 0.84,
          layout.rug.h * 0.5,
          fireStrength * 0.58,
          fireAlpha,
          currentTime,
          3.6
        );
        drawFlameField(
          layout.hallDoor.x + layout.hallDoor.w * 0.08,
          layout.hallDoor.y + layout.hallDoor.h * 0.985,
          layout.hallDoor.w * 0.84,
          layout.hallDoor.h * 0.16,
          fireStrength * 0.42,
          fireAlpha * 0.84,
          currentTime,
          4.2
        );
        drawFlameField(
          layout.diningArch.x + layout.diningArch.w * 0.1,
          layout.diningArch.y + layout.diningArch.h * 0.985,
          layout.diningArch.w * 0.8,
          layout.diningArch.h * 0.18,
          fireStrength * 0.64,
          fireAlpha,
          currentTime,
          5.1
        );
        if (collapse > 0.04) {
          drawEllipticalGlow(
            layout.x + layout.width * 0.58,
            layout.y + layout.height * 0.2,
            layout.width * (0.18 + collapse * 0.12),
            layout.height * (0.12 + collapse * 0.08),
            [
              { offset: 0, color: `rgba(255, 188, 104, ${(0.05 + collapse * 0.1 + blast * 0.12).toFixed(3)})` },
              { offset: 0.54, color: `rgba(244, 84, 24, ${(0.06 + collapse * 0.12 + blast * 0.1).toFixed(3)})` },
              { offset: 1, color: "rgba(110, 18, 8, 0)" }
            ]
          );
        }
      }

      function drawSmoke(layout, currentTime, burn) {
        if (burn <= 0.02) {
          return;
        }

        const quality = getEffectQuality();
        const smokeStrength = getHouseSmokeIntensity(currentTime);
        const emitters = [
          { x: layout.sofa.x + layout.sofa.w * 0.22, y: layout.sofa.y + layout.sofa.h * 0.34 },
          { x: layout.sofa.x + layout.sofa.w * 0.72, y: layout.sofa.y + layout.sofa.h * 0.32 },
          { x: layout.coffee.x + layout.coffee.w * 0.52, y: layout.coffee.y + layout.coffee.h * 0.16 },
          { x: layout.shelf.x + layout.shelf.w * 0.46, y: layout.shelf.y + layout.shelf.h * 0.12 },
          { x: layout.hallDoor.x + layout.hallDoor.w * 0.5, y: layout.hallDoor.y + layout.hallDoor.h * 0.98 },
          { x: layout.diningArch.x + layout.diningArch.w * 0.5, y: layout.diningArch.y + layout.diningArch.h * 0.98 }
        ];

        const bankCount = Math.max(2, Math.round(2 + quality * 2));
        for (let bank = 0; bank < bankCount; bank += 1) {
          const drift = Math.sin(currentTime * 0.18 + bank) * layout.width * 0.03;
          drawEllipticalGlow(
            layout.x + layout.width * (0.1 + bank * (0.8 / Math.max(1, bankCount - 1))) + drift,
            layout.y + layout.height * (0.08 + (bank % 2) * 0.03),
            layout.width * (0.26 + (1 - quality) * 0.04),
            layout.height * 0.18,
            [
              { offset: 0, color: `rgba(18, 18, 20, ${(0.12 + smokeStrength * 0.12).toFixed(3)})` },
              { offset: 1, color: "rgba(18, 18, 20, 0)" }
            ],
            "source-over"
          );
        }

        const plumeCount = Math.max(3, Math.round(2 + quality * 2));
        for (const emitter of emitters) {
          for (let plume = 0; plume < plumeCount; plume += 1) {
            const progress = (currentTime * 0.038 + plume * 0.13 + emitter.x * 0.0008) % 1;
            drawEllipticalGlow(
              emitter.x + Math.sin(currentTime * 0.28 + plume * 0.6) * layout.width * 0.014,
              emitter.y - progress * layout.height * 0.52,
              layout.width * (0.12 + plume * 0.045),
              layout.height * (0.09 + plume * 0.032),
              [
                { offset: 0, color: `rgba(18, 18, 20, ${(0.22 * smokeStrength * (1 - progress)).toFixed(3)})` },
                { offset: 1, color: "rgba(18, 18, 20, 0)" }
              ],
              "source-over"
            );
          }
        }

        const emberStride = quality < 0.86 ? 2 : 1;
        for (let emberIndex = 0; emberIndex < sceneState.emberSeeds.length; emberIndex += emberStride) {
          const ember = sceneState.emberSeeds[emberIndex];
          const progress = (currentTime * ember.speed * 0.55 + ember.phase) % 1;
          const lane = 0.08 + seededUnit(ember.phase * 9.7) * 0.84;
          const x = layout.x + layout.width * lane + Math.sin(currentTime * 2.4 + ember.phase) * layout.width * ember.sway;
          const y = sceneState.height - layout.height * 0.08 - progress * layout.height * 0.62;
          const alpha = (1 - progress) * burn * 0.84;
          drawEllipticalGlow(
            x,
            y,
            Math.max(2, layout.width * ember.size * 3.4),
            Math.max(2, layout.width * ember.size * 2.2),
            [
              { offset: 0, color: `rgba(255, 220, 146, ${(alpha * 0.8).toFixed(3)})` },
              { offset: 0.5, color: `rgba(255, 126, 44, ${(alpha * 0.7).toFixed(3)})` },
              { offset: 1, color: "rgba(110, 18, 8, 0)" }
            ]
          );
          sceneCtx.fillStyle = `rgba(255, 196, 108, ${alpha.toFixed(3)})`;
          sceneCtx.beginPath();
          sceneCtx.arc(x, y, Math.max(1, layout.width * ember.size), 0, Math.PI * 2);
          sceneCtx.fill();
        }
      }

      function drawCollapseDamage(layout, currentTime) {
        const collapse = getFinalDestructionProgress(currentTime);
        const blast = getBlastIntensity(currentTime);
        if (collapse <= 0.04) {
          return;
        }

        sceneCtx.save();
        sceneCtx.strokeStyle = `rgba(18, 18, 20, ${(0.1 + collapse * 0.18).toFixed(3)})`;
        sceneCtx.lineWidth = 1.2 + collapse * 1.2;

        sceneCtx.beginPath();
        sceneCtx.moveTo(layout.x + layout.width * 0.61, layout.y + layout.height * 0.1);
        sceneCtx.lineTo(layout.x + layout.width * 0.56, layout.y + layout.height * 0.22);
        sceneCtx.lineTo(layout.x + layout.width * 0.64, layout.y + layout.height * 0.34);
        sceneCtx.lineTo(layout.x + layout.width * 0.59, layout.y + layout.height * 0.47);
        sceneCtx.stroke();

        sceneCtx.beginPath();
        sceneCtx.moveTo(layout.x + layout.width * 0.18, layout.y + layout.height * 0.14);
        sceneCtx.lineTo(layout.x + layout.width * 0.23, layout.y + layout.height * 0.28);
        sceneCtx.lineTo(layout.x + layout.width * 0.16, layout.y + layout.height * 0.4);
        sceneCtx.stroke();

        sceneCtx.strokeStyle = `rgba(244, 240, 232, ${(0.03 + collapse * 0.08 + blast * 0.04).toFixed(3)})`;
        sceneCtx.lineWidth = 0.8;
        sceneCtx.beginPath();
        sceneCtx.moveTo(layout.x + layout.width * 0.612, layout.y + layout.height * 0.1);
        sceneCtx.lineTo(layout.x + layout.width * 0.566, layout.y + layout.height * 0.22);
        sceneCtx.lineTo(layout.x + layout.width * 0.646, layout.y + layout.height * 0.34);
        sceneCtx.stroke();
        sceneCtx.restore();
      }

      function drawCollapseDebris(layout, currentTime) {
        const collapse = getFinalDestructionProgress(currentTime);
        const blast = getBlastIntensity(currentTime);
        if (collapse <= 0.04) {
          return;
        }

        sceneCtx.save();
        sceneCtx.beginPath();
        sceneCtx.rect(layout.x, layout.y - layout.height * 0.1, layout.width, sceneState.height - layout.y + layout.height * 0.1);
        sceneCtx.clip();

        for (let plume = 0; plume < 2; plume += 1) {
          const seed = 8.7 + plume * 1.2;
          const x = layout.x + layout.width * (0.14 + plume * 0.23) + Math.sin(currentTime * 0.42 + seed) * layout.width * 0.012;
          const y = layout.y + layout.height * (0.02 + (plume % 2) * 0.04);
          drawEllipticalGlow(
            x,
            y,
            layout.width * (0.08 + collapse * 0.04),
            layout.height * (0.05 + collapse * 0.04),
            [
              { offset: 0, color: `rgba(86, 86, 90, ${(0.05 + collapse * 0.08 + blast * 0.06).toFixed(3)})` },
              { offset: 1, color: "rgba(86, 86, 90, 0)" }
            ],
            "source-over"
          );
        }

        const dustCount = 6;
        for (let index = 0; index < dustCount; index += 1) {
          const seed = 21.3 + index * 0.87;
          const progress = (currentTime * (0.18 + seededUnit(seed + 0.4) * 0.08) + seededUnit(seed + 1.1)) % 1;
          const x = layout.x + layout.width * (0.08 + seededUnit(seed + 1.8) * 0.84) + Math.sin(currentTime * 1.2 + seed) * layout.width * 0.012 * collapse;
          const y = layout.y + layout.height * 0.02 + progress * layout.height * 0.74;
          const size = layout.width * (0.0012 + seededUnit(seed + 2.6) * 0.0024) * (0.8 + collapse * 0.8);
          const alpha = (1 - progress) * (0.12 + collapse * 0.22 + blast * 0.18);
          drawEllipticalGlow(
            x,
            y,
            Math.max(3, size * 8),
            Math.max(2, size * 5),
            [
              { offset: 0, color: `rgba(122, 122, 128, ${alpha.toFixed(3)})` },
              { offset: 1, color: "rgba(122, 122, 128, 0)" }
            ],
            "source-over"
          );
          sceneCtx.fillStyle = `rgba(174, 174, 180, ${(alpha * 0.5).toFixed(3)})`;
          sceneCtx.fillRect(x - size * 0.5, y - size * 0.5, size, size * (0.8 + seededUnit(seed + 3.4) * 0.6));
        }

        sceneCtx.restore();
      }

      function drawFloorSheen(layout, currentTime, burn) {
        for (const band of sceneState.shimmerBands) {
          const centerX = layout.x + layout.width * band.x + Math.sin(currentTime * band.speed + band.phase) * layout.width * 0.004;
          const bandWidth = layout.width * band.width;
          const bandHeight = (sceneState.height - layout.floorY) * band.height;
          const y = layout.floorY + (sceneState.height - layout.floorY - bandHeight) * (0.18 + 0.7 * band.x);
          const alpha = band.opacity + burn * 0.05;
          const color = burn > 0.02
            ? band.warm
              ? `rgba(255, 144, 58, ${alpha.toFixed(3)})`
              : `rgba(255, 196, 112, ${(alpha * 0.82).toFixed(3)})`
            : `rgba(176, 186, 202, ${(alpha * 0.82).toFixed(3)})`;

          drawEllipticalGlow(
            centerX,
            y,
            bandWidth,
            bandHeight,
            [
              { offset: 0, color },
              { offset: 1, color: color.replace(/[\d.]+\)$/u, "0)") }
            ]
          );
        }
      }

      function drawForegroundVeil(currentTime) {
        const width = sceneState.width;
        const height = sceneState.height;
        const burn = getHouseBurnIntensity(currentTime);
        const reveal = getSceneRevealProgress(currentTime);
        const shade = sceneCtx.createLinearGradient(0, 0, 0, height);
        shade.addColorStop(0, `rgba(0, 0, 0, ${lerp(0.66, 0.42, reveal).toFixed(3)})`);
        shade.addColorStop(0.28, `rgba(0, 0, 0, ${lerp(0.2, 0.06, reveal).toFixed(3)})`);
        shade.addColorStop(0.7, `rgba(0, 0, 0, ${lerp(0.28, 0.12, reveal).toFixed(3)})`);
        shade.addColorStop(1, `rgba(0, 0, 0, ${(lerp(0.72, 0.48, reveal) + burn * 0.08).toFixed(3)})`);
        sceneCtx.fillStyle = shade;
        sceneCtx.fillRect(0, 0, width, height);
      }

      function drawBeatFlashOverlay(layout, currentTime) {
        const flash = getBeatFlashIntensity(currentTime);
        if (flash <= 0.01) {
          return;
        }

        sceneCtx.save();
        sceneCtx.globalCompositeOperation = "screen";
        sceneCtx.fillStyle = `rgba(246, 242, 234, ${(0.012 + flash * 0.09).toFixed(3)})`;
        sceneCtx.fillRect(0, 0, sceneState.width, sceneState.height);
        sceneCtx.restore();

        drawEllipticalGlow(
          layout.x + layout.width * 0.5,
          layout.y + layout.height * 0.42,
          layout.width * (0.72 + flash * 0.08),
          layout.height * (0.46 + flash * 0.06),
          [
            { offset: 0, color: `rgba(250, 248, 244, ${(0.05 + flash * 0.18).toFixed(3)})` },
            { offset: 0.48, color: `rgba(236, 230, 220, ${(0.03 + flash * 0.12).toFixed(3)})` },
            { offset: 1, color: "rgba(72, 66, 60, 0)" }
          ],
          "screen"
        );
        drawEllipticalGlow(
          layout.window.x + layout.window.w * 0.48,
          layout.window.y + layout.window.h * 0.38,
          layout.window.w * (0.54 + flash * 0.08),
          layout.window.h * (0.44 + flash * 0.06),
          [
            { offset: 0, color: `rgba(248, 246, 242, ${(0.04 + flash * 0.18).toFixed(3)})` },
            { offset: 0.54, color: `rgba(232, 228, 220, ${(0.03 + flash * 0.12).toFixed(3)})` },
            { offset: 1, color: "rgba(76, 72, 66, 0)" }
          ],
          "screen"
        );
        drawEllipticalGlow(
          layout.hallDoor.x + layout.hallDoor.w * 0.5,
          layout.hallDoor.y + layout.hallDoor.h * 0.48,
          layout.hallDoor.w * (0.64 + flash * 0.12),
          layout.hallDoor.h * (0.62 + flash * 0.08),
          [
            { offset: 0, color: `rgba(250, 248, 244, ${(0.03 + flash * 0.14).toFixed(3)})` },
            { offset: 0.56, color: `rgba(228, 224, 216, ${(0.02 + flash * 0.1).toFixed(3)})` },
            { offset: 1, color: "rgba(68, 64, 58, 0)" }
          ],
          "screen"
        );
      }

      function drawHouseScene(currentTime) {
        sceneState.pointer.x = lerp(sceneState.pointer.x, sceneState.pointer.targetX, 0.08);
        sceneState.pointer.y = lerp(sceneState.pointer.y, sceneState.pointer.targetY, 0.08);

        const layout = getHouseLayout();
        const burn = getHouseBurnIntensity(currentTime);
        const shake = getSceneShakeOffset(currentTime);
        sceneState.layout = layout;
        updateHoveredWindowFromPointer();

        sceneCtx.save();
        sceneCtx.translate(shake.x, shake.y);
        drawInteriorEnvelope(layout, currentTime, burn);
        drawFloor(layout, currentTime, burn);
        drawRug(layout);
        drawOutsideWindow(layout, currentTime);
        drawHallway(layout, currentTime, burn);
        drawDiningNook(layout, currentTime, burn);
        drawShelf(layout);
        drawFamilyFrames(layout);
        drawCollapseDamage(layout, currentTime);
        drawSofa(layout, currentTime);
        drawCoffeeTable(layout, currentTime);
        drawPlant(layout, currentTime);
        drawRoomBurn(layout, currentTime, burn);
        drawInteriorParticles(layout, currentTime, burn);
        drawSmoke(layout, currentTime, burn);
        drawCollapseDebris(layout, currentTime);
        drawFloorSheen(layout, currentTime, burn);
        drawForegroundVeil(currentTime);
        drawBeatFlashOverlay(layout, currentTime);
        sceneCtx.restore();
      }

      function drawScene(currentTime = sceneState.currentTime) {
        sceneState.currentTime = Number.isFinite(currentTime) ? currentTime : 0;
        sceneCtx.clearRect(0, 0, sceneState.width, sceneState.height);
        drawHouseScene(sceneState.currentTime);
        if (activeWordIndex >= 0 && lyricWords[activeWordIndex]) {
          const activeText = lyricWords[activeWordIndex].text;
          const visibleText = isTripleDotLyric(activeText) ? "" : activeText;
          applyLyricPresentation(sceneState.currentTime, visibleText, activeWordIndex);
        }
      }

      function resizeScene() {
        const viewportWidth = window.visualViewport ? window.visualViewport.width : window.innerWidth;
        const viewportHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;

        sceneState.width = Math.max(1, Math.floor(viewportWidth));
        sceneState.height = Math.max(1, Math.floor(viewportHeight));
        lyricLayoutCache = null;
        const nativeDpr = window.devicePixelRatio || 1;
        const dprCap = sceneState.width >= 1600 || sceneState.height >= 900 ? 1 : 1.15;
        sceneState.dpr = Math.min(nativeDpr, dprCap);

        sceneCanvas.width = Math.floor(sceneState.width * sceneState.dpr);
        sceneCanvas.height = Math.floor(sceneState.height * sceneState.dpr);
        sceneCanvas.style.width = `${sceneState.width}px`;
        sceneCanvas.style.height = `${sceneState.height}px`;
        sceneCtx.setTransform(sceneState.dpr, 0, 0, sceneState.dpr, 0, 0);
        sceneCtx.imageSmoothingEnabled = true;

        drawScene(sceneState.currentTime);
      }

      function getBurnLyricColor(currentTime, text) {
        const burn = getHouseBurnIntensity(currentTime);
        if (!burn) {
          return "#fff8ef";
        }

        const safeTime = Number.isFinite(currentTime) ? currentTime : 0;
        const isYouWord = containsYouWord(text);
        const hue = isYouWord
          ? 6 + 6 * (0.5 + 0.5 * Math.sin(safeTime * 1.8))
          : 18 + 10 * (0.5 + 0.5 * Math.sin(safeTime * 2.3));
        const saturation = isYouWord ? 94 : 88;
        const lightness = isYouWord
          ? 63 + 7 * (0.5 + 0.5 * Math.sin(safeTime * 3))
          : 60 + 8 * (0.5 + 0.5 * Math.sin(safeTime * 2.6));
        return `hsl(${hue.toFixed(1)}, ${saturation}%, ${lightness.toFixed(1)}%)`;
      }

      function seededUnit(seed) {
        const value = Math.sin(seed * 12.9898 + 78.233) * 43758.5453;
        return value - Math.floor(value);
      }

      function pickSeeded(pool, seed) {
        return pool[Math.floor(seededUnit(seed) * pool.length) % pool.length];
      }

      function pickAlternativeSeeded(pool, current, seed, blocked = []) {
        const blockedValues = new Set([current, ...blocked].filter(Boolean));
        const filtered = pool.filter((item) => !blockedValues.has(item));
        if (filtered.length) {
          return pickSeeded(filtered, seed);
        }

        const fallback = pool.filter((item) => item !== current);
        return fallback.length ? pickSeeded(fallback, seed + 0.37) : current;
      }

      function getLyricDecorationPools(word) {
        const burn = getHouseBurnIntensity(word.time);
        const quietAnchors = ["subtitle", "sofa", "coffee", "frames", "window", "rug", "floorLeft", "shelf", "plant"];
        const tenseAnchors = ["hall", "window", "dining", "frames", "ceiling", "floorRight", "plant", "shelf"];
        const burnAnchors = ["hall", "window", "dining", "ceiling", "rug", "floorRight"];
        const quietStyles = ["subtitle", "whisper", "window", "road", "note"];
        const tenseStyles = ["subtitle", "window", "door", "whisper", "road", "note"];
        const burnStyles = ["impact", "door", "window"];
        const quietTones = ["soft", "warm", "ghost", "cold"];
        const burnTones = ["burn", "warm", "ghost"];

        return {
          burn,
          anchorPool: burn > 0.08
            ? burnAnchors
            : word.time < 60
              ? quietAnchors
              : tenseAnchors,
          stylePool: burn > 0.08
            ? burnStyles
            : word.time < 60
              ? quietStyles
              : tenseStyles,
          tonePool: burn > 0.08 ? burnTones : quietTones
        };
      }

      function getDecorationDifferenceScore(current, previous) {
        let score = 0;
        if (current.anchor !== previous.anchor) {
          score += 1;
        }
        if (current.style !== previous.style) {
          score += 1;
        }
        if (current.tone !== previous.tone) {
          score += 1;
        }
        return score;
      }

      function getPhraseLead(text) {
        return normalizeLyricText(text).split(" ")[0] || "";
      }

      function getPhraseTransitionStrength(previousWord, currentWord) {
        if (!previousWord || !currentWord) {
          return 0;
        }

        let strength = 0;
        const gap = currentWord.time - previousWord.time;
        const lead = getPhraseLead(currentWord.text);
        if (gap > 1.05) {
          strength += 1;
        }
        if (/^(but|never|guess|sorry|see|when|where|you|it's|this|tell)$/i.test(lead)) {
          strength += 1;
        }
        if (/[?!]$/.test(String(previousWord.text || ""))) {
          strength += 1;
        }
        if (getHouseBurnIntensity(currentWord.time) > 0.08 || getHouseBurnIntensity(previousWord.time) > 0.08) {
          strength += 1;
        }
        return strength;
      }

      function finalizeDecorationShape(decoration) {
        if (decoration.style === "impact") {
          decoration.rotate = 0;
          decoration.nudgeX *= 0.4;
        }
        return decoration;
      }

      function ensureDecorationContrast(word, index, decoration, previousDecoration, previousWord) {
        if (!previousDecoration) {
          return decoration;
        }

        const transitionStrength = getPhraseTransitionStrength(previousWord, word);
        const desiredDifference = transitionStrength >= 2 ? 2 : 1;
        if (getDecorationDifferenceScore(decoration, previousDecoration) >= desiredDifference) {
          return decoration;
        }

        const { anchorPool, stylePool, tonePool } = getLyricDecorationPools(word);
        const next = { ...decoration };
        const seed = index * 11.73 + word.time * 1.91 + word.text.length * 0.67;

        if (next.locked) {
          if (transitionStrength >= 1 && next.tone === previousDecoration.tone && tonePool.length > 1) {
            next.tone = pickAlternativeSeeded(tonePool, next.tone, seed + 1.1, [previousDecoration.tone]);
          }
          next.nudgeX = clamp(next.nudgeX + (seededUnit(seed + 2.2) - 0.5) * 0.14, -0.18, 0.18);
          next.nudgeY = clamp(next.nudgeY + (seededUnit(seed + 3.3) - 0.5) * 0.14, -0.18, 0.18);
          if (next.style !== "impact") {
            next.rotate = (seededUnit(seed + 4.4) - 0.5) * 8;
          }
          return finalizeDecorationShape(next);
        }

        if (next.style === previousDecoration.style || transitionStrength >= 2) {
          next.style = pickAlternativeSeeded(stylePool, next.style, seed + 1.5, [previousDecoration.style]);
        }
        if (next.anchor === previousDecoration.anchor || getDecorationDifferenceScore(next, previousDecoration) < desiredDifference) {
          next.anchor = pickAlternativeSeeded(anchorPool, next.anchor, seed + 2.5, [previousDecoration.anchor]);
        }
        if ((transitionStrength >= 2 || getDecorationDifferenceScore(next, previousDecoration) < desiredDifference) && next.tone === previousDecoration.tone) {
          next.tone = pickAlternativeSeeded(tonePool, next.tone, seed + 3.5, [previousDecoration.tone]);
        }
        if (getDecorationDifferenceScore(next, previousDecoration) < desiredDifference) {
          next.nudgeX = clamp(next.nudgeX + (seededUnit(seed + 4.5) - 0.5) * 0.18, -0.2, 0.2);
          next.nudgeY = clamp(next.nudgeY + (seededUnit(seed + 5.5) - 0.5) * 0.18, -0.2, 0.2);
        }

        return finalizeDecorationShape(next);
      }

      function createLyricDecoration(word, index) {
        const lower = String(word.text || "").toLowerCase();
        const { burn, anchorPool, stylePool, tonePool } = getLyricDecorationPools(word);
        const seed = index * 17.17 + word.time * 3.13 + word.text.length * 1.91;

        let decoration = {
          anchor: pickSeeded(anchorPool, seed + 1),
          style: pickSeeded(stylePool, seed + 2),
          tone: pickSeeded(tonePool, seed + 3),
          nudgeX: (seededUnit(seed + 4) - 0.5) * 0.08,
          nudgeY: (seededUnit(seed + 5) - 0.5) * 0.08,
          rotate: (seededUnit(seed + 6) - 0.5) * 5,
          locked: false
        };

        if (lower === "hello") {
          decoration = { anchor: "ceiling", style: "whisper", tone: "ghost", nudgeX: -0.12, nudgeY: -0.02, rotate: -2, locked: true };
        } else if (lower.includes("door")) {
          decoration = { anchor: "hall", style: "door", tone: "cold", nudgeX: 0, nudgeY: -0.08, rotate: 0, locked: true };
        } else if (lower.includes("friend")) {
          decoration = { anchor: "sofa", style: "subtitle", tone: "soft", nudgeX: 0, nudgeY: -0.06, rotate: -1, locked: true };
        } else if (lower.includes("bed")) {
          decoration = { anchor: "hall", style: "window", tone: "soft", nudgeX: -0.02, nudgeY: -0.1, rotate: -3, locked: true };
        } else if (lower.includes("tell my mother")) {
          decoration = { anchor: "frames", style: "whisper", tone: "soft", nudgeX: -0.05, nudgeY: -0.01, rotate: -3, locked: true };
        } else if (lower.includes("tell my father")) {
          decoration = { anchor: "shelf", style: "note", tone: "cold", nudgeX: 0.04, nudgeY: -0.03, rotate: 2, locked: true };
        } else if (lower.includes("tell my sister")) {
          decoration = { anchor: "window", style: "whisper", tone: "ghost", nudgeX: 0.06, nudgeY: -0.02, rotate: -1, locked: true };
        } else if (lower.includes("mother") || lower.includes("father") || lower.includes("sister")) {
          decoration = { anchor: "frames", style: "whisper", tone: "soft", nudgeX: 0, nudgeY: 0, rotate: -2, locked: true };
        } else if (lower.includes("therapist") || lower.includes("getting sober")) {
          decoration = { anchor: "dining", style: "whisper", tone: "ghost", nudgeX: 0.04, nudgeY: -0.02, rotate: 2, locked: true };
        } else if (lower.includes("looking out for yourself")) {
          decoration = { anchor: "window", style: "door", tone: burn > 0.08 ? "burn" : "cold", nudgeX: 0, nudgeY: 0, rotate: 0, locked: true };
        } else if (lower.includes("watch your mouth") || lower.includes("call my bluff")) {
          decoration = { anchor: "hall", style: "door", tone: "burn", nudgeX: -0.02, nudgeY: -0.06, rotate: 0, locked: true };
        } else if (lower.includes("call me")) {
          decoration = { anchor: "coffee", style: "note", tone: "soft", nudgeX: 0.02, nudgeY: -0.08, rotate: -2, locked: true };
        } else if (lower.includes("grass") || lower.includes("spacious")) {
          decoration = { anchor: "window", style: "road", tone: "ghost", nudgeX: 0, nudgeY: 0.02, rotate: -3, locked: true };
        } else if (lower.includes("someone else") || lower.includes("cry over")) {
          decoration = { anchor: "rug", style: "road", tone: "soft", nudgeX: 0, nudgeY: 0, rotate: -1, locked: true };
        } else if (lower.includes("overshared") || lower.includes("isn't fair") || lower.includes("aware of it now")) {
          decoration = { anchor: "floorRight", style: "whisper", tone: "ghost", nudgeX: 0.03, nudgeY: -0.04, rotate: 2, locked: true };
        } else if (/^but you\b/i.test(word.text)) {
          decoration = { anchor: "hall", style: "impact", tone: "burn", nudgeX: 0, nudgeY: -0.02, rotate: 0, locked: true };
        } else if (lower.includes("never really cared") || lower.includes("turned out")) {
          decoration = { anchor: "hall", style: "window", tone: burn > 0.08 ? "burn" : "warm", nudgeX: 0, nudgeY: 0.02, rotate: 0, locked: true };
        }

        return finalizeDecorationShape(decoration);
      }

      function buildLyricDecorations() {
        lyricDecorations = new Array(lyricWords.length);

        let groupStart = 0;
        let previousRepresentativeWord = null;
        let previousDecoration = null;
        while (groupStart < lyricWords.length) {
          let groupEnd = groupStart;

          while (
            groupEnd + 1 < lyricWords.length &&
            isLyricContinuation(lyricWords[groupEnd].text, lyricWords[groupEnd + 1].text)
          ) {
            groupEnd += 1;
          }

          const representativeWord = lyricWords[groupEnd];
          const decoration = ensureDecorationContrast(
            representativeWord,
            groupEnd,
            createLyricDecoration(representativeWord, groupEnd),
            previousDecoration,
            previousRepresentativeWord
          );

          for (let index = groupStart; index <= groupEnd; index += 1) {
            lyricDecorations[index] = decoration;
          }

          previousRepresentativeWord = representativeWord;
          previousDecoration = decoration;
          groupStart = groupEnd + 1;
        }
      }

      function getLyricAnchorMap(layout) {
        const room = layout || sceneState.layout || getHouseLayout();
        return {
          subtitle: {
            x: sceneState.width * 0.5,
            y: room.floorY + (sceneState.height - room.floorY) * 0.28,
            width: Math.min(sceneState.width * 0.68, room.width * 0.62),
            align: "center"
          },
          rug: {
            x: room.rug.x + room.rug.w * 0.5,
            y: room.rug.y + room.rug.h * 0.5,
            width: room.rug.w * 0.94,
            align: "center"
          },
          sofa: {
            x: room.sofa.x + room.sofa.w * 0.48,
            y: room.sofa.y - room.height * 0.08,
            width: room.sofa.w * 1.02,
            align: "center"
          },
          coffee: {
            x: room.coffee.x + room.coffee.w * 0.5,
            y: room.coffee.y + room.coffee.h * 0.16,
            width: room.coffee.w * 1.12,
            align: "center"
          },
          window: {
            x: room.window.x + room.window.w * 0.5,
            y: room.window.y + room.window.h * 0.48,
            width: room.window.w * 1.1,
            align: "center"
          },
          hall: {
            x: room.hallDoor.x + room.hallDoor.w * 0.5,
            y: room.hallDoor.y + room.hallDoor.h * 0.46,
            width: room.hallDoor.w * 1.3,
            align: "center"
          },
          dining: {
            x: room.diningArch.x + room.diningArch.w * 0.54,
            y: room.diningArch.y + room.diningArch.h * 0.42,
            width: room.diningArch.w * 1.28,
            align: "center"
          },
          frames: {
            x: room.frames[1].x + room.frames[1].w * 0.5,
            y: room.frames[1].y + room.frames[1].h * 0.5,
            width: room.width * 0.34,
            align: "center"
          },
          shelf: {
            x: room.shelf.x + room.shelf.w * 0.5,
            y: room.shelf.y + room.shelf.h * 0.44,
            width: room.shelf.w * 1.15,
            align: "center"
          },
          plant: {
            x: room.plant.x + room.plant.w * 0.5,
            y: room.plant.y + room.plant.h * 0.22,
            width: room.width * 0.18,
            align: "center"
          },
          ceiling: {
            x: sceneState.width * 0.5,
            y: room.y + room.ceilingBandH * 0.7,
            width: room.width * 0.44,
            align: "center"
          },
          floorLeft: {
            x: room.x + room.width * 0.12,
            y: room.floorY + (sceneState.height - room.floorY) * 0.22,
            width: room.width * 0.26,
            align: "left"
          },
          floorRight: {
            x: room.x + room.width * 0.9,
            y: room.floorY + (sceneState.height - room.floorY) * 0.28,
            width: room.width * 0.24,
            align: "right"
          }
        };
      }

      function getLyricPresentation(currentTime, text, index = activeWordIndex) {
        const burn = getHouseBurnIntensity(currentTime);
        const decoration = lyricDecorations[index] || {
          anchor: "subtitle",
          style: "subtitle",
          tone: burn > 0.05 ? "warm" : "soft",
          nudgeX: 0,
          nudgeY: 0,
          rotate: 0
        };

        if (!text) {
          return decoration;
        }

        if (burn > 0.08 && decoration.tone !== "ghost" && decoration.style !== "whisper") {
          return {
            ...decoration,
            tone: decoration.style === "impact" ? "burn" : decoration.tone
          };
        }

        return decoration;
      }

      function getLyricDisplayColor(currentTime, text, presentation) {
        if (presentation.tone === "burn") {
          return getBurnLyricColor(currentTime, text);
        }

        if (presentation.tone === "ghost") {
          return "#ced8ea";
        }

        if (presentation.tone === "cold") {
          return "#e4e8f0";
        }

        if (presentation.tone === "warm") {
          return "#fff1db";
        }

        return "#f7efe0";
      }

      function shouldUseMultilineLyric(text, presentation) {
        return Boolean((text || "").trim());
      }

      function getLyricShellWidth(anchor, presentation, text) {
        const multilineMode = shouldUseMultilineLyric(text, presentation);
        const mobileViewport = sceneState.width <= 720;
        const safeMarginX = Math.max(18, sceneState.width * 0.03);
        const textFactor = clamp((text || "").length / (presentation.style === "impact" ? 18 : 26), 0, 1);
        const extraWidth = sceneState.width * (
          multilineMode
            ? (presentation.style === "impact"
              ? (mobileViewport ? 0.18 : 0.12)
              : (mobileViewport ? 0.12 : 0.08))
            : presentation.style === "impact"
              ? 0.26
              : presentation.style === "door"
                ? 0.18
                : 0.22
        ) * textFactor;
        const desiredWidth = Math.min(
          sceneState.width * (
            multilineMode
              ? (presentation.style === "impact"
                ? (mobileViewport ? 0.9 : 0.82)
                : (mobileViewport ? 0.84 : 0.72))
              : presentation.style === "impact"
                ? 0.94
                : 0.88
          ),
          Math.max(
            multilineMode
              ? sceneState.width * (
                presentation.style === "impact"
                  ? (mobileViewport ? 0.72 : 0.62)
                  : (mobileViewport ? 0.62 : 0.52)
              )
              : anchor.width,
            anchor.width + extraWidth
          )
        );

        if (multilineMode) {
          return clamp(desiredWidth, 220, sceneState.width - safeMarginX * 2);
        }

        if (anchor.align === "left") {
          return clamp(desiredWidth, 140, sceneState.width - anchor.x - safeMarginX);
        }

        if (anchor.align === "right") {
          return clamp(desiredWidth, 140, anchor.x - safeMarginX);
        }

        return clamp(
          desiredWidth,
          140,
          Math.min(anchor.x - safeMarginX, sceneState.width - anchor.x - safeMarginX) * 2
        );
      }

      function fitLyricIntoViewport(text, anchor, presentation, multilineMode = false) {
        lyricEl.style.fontSize = "";
        lyricEl.style.lineHeight = "";

        if (!text) {
          return anchor.y + presentation.nudgeY * sceneState.height;
        }

        const computed = getComputedStyle(lyricEl);
        const mobileViewport = sceneState.width <= 720;
        let fontSize = parseFloat(computed.fontSize);
        const computedLineHeight = parseFloat(computed.lineHeight);
        const lineHeightRatio = Number.isFinite(computedLineHeight)
          ? computedLineHeight / Math.max(fontSize, 1)
          : 1;
        const minFontSize = multilineMode
          ? presentation.style === "impact"
            ? (mobileViewport ? 24 : 15)
            : presentation.style === "window"
              ? (mobileViewport ? 18 : 14)
              : presentation.style === "door"
                ? (mobileViewport ? 16 : 12)
                : (mobileViewport ? 15 : 11)
          : presentation.style === "impact"
            ? 20
            : presentation.style === "window"
              ? 18
              : presentation.style === "door"
                ? 15
                : 14;
        const safeMarginY = Math.max(20, sceneState.height * (multilineMode ? (mobileViewport ? 0.045 : 0.06) : 0.04));
        const centerY = anchor.y + presentation.nudgeY * sceneState.height;
        const topLimit = multilineMode
          ? sceneState.height * (mobileViewport ? 0.24 : 0.28)
          : safeMarginY;
        const bottomLimit = multilineMode
          ? sceneState.height * (mobileViewport ? 0.78 : 0.74)
          : sceneState.height - safeMarginY;
        const maxHeight = Math.max(48, (bottomLimit - topLimit) * (multilineMode ? 0.8 : 1));

        for (let attempt = 0; attempt < 7; attempt += 1) {
          const rect = lyricEl.getBoundingClientRect();
          const widthRatio = rect.width > 0 ? lyricShell.clientWidth / rect.width : 1;
          const heightRatio = rect.height > 0 ? maxHeight / rect.height : 1;

          if (widthRatio >= 0.995 && heightRatio >= 0.995) {
            break;
          }

          const shrink = Math.min(widthRatio, heightRatio, 0.94);
          const nextFontSize = Math.max(
            minFontSize,
            shrink < 0.995 ? fontSize * shrink : fontSize - 1
          );

          if (nextFontSize >= fontSize - 0.2) {
            if (fontSize <= minFontSize) {
              break;
            }
            fontSize = Math.max(minFontSize, fontSize - 1);
          } else {
            fontSize = nextFontSize;
          }

          lyricEl.style.fontSize = `${fontSize.toFixed(2)}px`;
          lyricEl.style.lineHeight = lineHeightRatio.toFixed(3);
        }

        const finalRect = lyricEl.getBoundingClientRect();
        return clamp(
          centerY,
          topLimit + finalRect.height / 2,
          bottomLimit - finalRect.height / 2
        );
      }

      function getLyricMotionTransform(currentTime, presentation, index = activeWordIndex) {
        const burn = getHouseBurnIntensity(currentTime);
        const blast = getBlastIntensity(currentTime);
        const motion = Math.max(0, burn - 0.06) + blast * 0.35;
        const baseRotate = presentation.rotate || 0;

        if (motion <= 0.01) {
          return presentation.style === "impact"
            ? "translateY(-2px)"
            : `rotate(${baseRotate.toFixed(2)}deg)`;
        }

        const swayX = Math.sin(currentTime * 2.8 + index * 0.37) * sceneState.width * 0.0022 * motion;
        const swayY = Math.cos(currentTime * 3.9 + index * 0.29) * sceneState.height * 0.002 * motion;
        const pulse = 1 + (presentation.style === "impact" ? 0.028 : 0.014) * motion * (0.5 + 0.5 * Math.sin(currentTime * 6.4 + index));
        const rotate = baseRotate + Math.sin(currentTime * 3.1 + index * 0.21) * motion * (presentation.style === "impact" ? 2.2 : 1.2);
        const skew = Math.sin(currentTime * 4.7 + index * 0.18) * motion * 1.4;

        return `translate(${swayX.toFixed(2)}px, ${(-2 + swayY).toFixed(2)}px) rotate(${rotate.toFixed(2)}deg) skewX(${skew.toFixed(2)}deg) scale(${pulse.toFixed(3)})`;
      }

      function applyLyricPresentation(currentTime, text, index = activeWordIndex) {
        if (!lyricShell) {
          return;
        }

        const anchors = getLyricAnchorMap(sceneState.layout);
        const presentation = getLyricPresentation(currentTime, text, index);
        const anchor = anchors[presentation.anchor] || anchors.subtitle;
        const multilineMode = shouldUseMultilineLyric(text, presentation);
        const width = Math.min(getLyricShellWidth(anchor, presentation, text), sceneState.width * 0.94);
        const effectiveAlign = multilineMode ? "center" : anchor.align;
        const safeMarginX = Math.max(18, sceneState.width * 0.03);
        const effectiveX = multilineMode
          ? clamp(anchor.x, width / 2 + safeMarginX, sceneState.width - width / 2 - safeMarginX)
          : anchor.x;
        const translateX = effectiveAlign === "left" ? "0%" : effectiveAlign === "right" ? "-100%" : "-50%";
        const isImpact = presentation.style === "impact";
        const shadow = presentation.tone === "burn"
          ? "0 0 22px rgba(0, 0, 0, 0.95), 0 0 34px rgba(105, 28, 10, 0.44)"
          : presentation.tone === "ghost"
            ? "0 0 20px rgba(0, 0, 0, 0.92), 0 0 18px rgba(67, 88, 128, 0.22)"
            : "0 0 18px rgba(0, 0, 0, 0.94), 0 4px 28px rgba(0, 0, 0, 0.62)";
        const layoutKey = [
          index,
          text,
          presentation.anchor,
          presentation.style,
          effectiveAlign,
          multilineMode ? "multi" : "single",
          sceneState.width,
          sceneState.height
        ].join("|");

        lyricEl.classList.remove(
          "style-subtitle",
          "style-window",
          "style-door",
          "style-impact",
          "style-road",
          "style-whisper",
          "style-note"
        );
        lyricEl.classList.add(`style-${presentation.style}`);
        lyricEl.style.color = getLyricDisplayColor(currentTime, text, presentation);
        lyricEl.style.textShadow = shadow;
        lyricEl.style.textWrap = multilineMode ? "pretty" : "balance";
        lyricEl.style.overflowWrap = multilineMode ? "normal" : "break-word";
        lyricEl.style.wordBreak = "normal";
        lyricEl.style.hyphens = "none";

        if (!lyricLayoutCache || lyricLayoutCache.key !== layoutKey) {
          lyricShell.style.left = `${Math.round(effectiveX + presentation.nudgeX * sceneState.width)}px`;
          lyricShell.style.top = `${Math.round(anchor.y + presentation.nudgeY * sceneState.height)}px`;
          lyricShell.style.width = `${Math.round(width)}px`;
          lyricShell.style.textAlign = effectiveAlign;
          lyricShell.style.transform = `translate(${translateX}, -50%)`;
          lyricEl.style.transform = "none";
          const fittedTop = fitLyricIntoViewport(text, { ...anchor, x: effectiveX }, presentation, multilineMode);
          lyricLayoutCache = {
            key: layoutKey,
            left: Math.round(effectiveX + presentation.nudgeX * sceneState.width),
            top: Math.round(fittedTop),
            width: Math.round(width),
            align: effectiveAlign,
            translateX,
            fontSize: lyricEl.style.fontSize,
            lineHeight: lyricEl.style.lineHeight
          };
        }

        lyricShell.style.left = `${lyricLayoutCache.left}px`;
        lyricShell.style.top = `${lyricLayoutCache.top}px`;
        lyricShell.style.width = `${lyricLayoutCache.width}px`;
        lyricShell.style.textAlign = lyricLayoutCache.align;
        lyricShell.style.transform = `translate(${lyricLayoutCache.translateX}, -50%)`;
        lyricEl.style.fontSize = lyricLayoutCache.fontSize;
        lyricEl.style.lineHeight = lyricLayoutCache.lineHeight;
        lyricEl.style.transform = getLyricMotionTransform(currentTime, presentation, index);
      }

      function updateTripleDotMarkers() {
        firstTripleDotTime = null;
        lastTripleDotTime = null;

        for (const word of lyricWords) {
          if (!isTripleDotLyric(word.text)) {
            continue;
          }

          if (firstTripleDotTime === null) {
            firstTripleDotTime = word.time;
          }
          lastTripleDotTime = word.time;
        }
      }

      function syncBlackOverlayForTime(currentTime) {
        if (!blackOverlayEl) {
          return;
        }

        const safeTime = Number.isFinite(currentTime) ? currentTime : 0;
        const revealStart = getSceneRevealStartTime();

        if (safeTime < revealStart) {
          blackOverlayEl.classList.remove("slow-return");
          blackOverlayEl.classList.remove("fade-out");
          return;
        }

        if (firstTripleDotTime === null) {
          blackOverlayEl.classList.remove("slow-return");
          blackOverlayEl.classList.add("fade-out");
          return;
        }

        const returnStart = getSceneFadeReturnStartTime();

        if (safeTime >= returnStart) {
          blackOverlayEl.classList.add("slow-return");
          blackOverlayEl.classList.remove("fade-out");
          return;
        }

        blackOverlayEl.classList.remove("slow-return");
        blackOverlayEl.classList.add("fade-out");
      }

      function parseLrc(rawText) {
        const cleaned = rawText
          .replace(/\r/g, "")
          .replace(/\\\[/g, "[")
          .replace(/\\\]/g, "]")
          .replace(/\u00a0/g, " ");

        const tokenPattern = /\[(\d{2}):(\d{2})(?:\.(\d{1,3}))?\]([^\[]*)/g;
        const words = [];
        let match = tokenPattern.exec(cleaned);

        while (match) {
          const text = cleanWord(match[4]);
          if (text) {
            words.push({
              time: parseTimestamp(match[1], match[2], match[3]),
              text
            });
          }
          match = tokenPattern.exec(cleaned);
        }

        return words.sort((a, b) => a.time - b.time);
      }

      function findWordIndex(currentTime) {
        let low = 0;
        let high = lyricWords.length - 1;
        let result = -1;

        while (low <= high) {
          const mid = Math.floor((low + high) / 2);
          if (lyricWords[mid].time <= currentTime) {
            result = mid;
            low = mid + 1;
          } else {
            high = mid - 1;
          }
        }

        return result;
      }

      function updateLyrics(currentTime, force = false) {
        if (!lyricWords.length) {
          return;
        }

        const nextIndex = findWordIndex(currentTime);
        if (!force && nextIndex === activeWordIndex) {
          if (nextIndex >= 0) {
            const currentWord = lyricWords[nextIndex].text;
            const visibleCurrentWord = isTripleDotLyric(currentWord) ? "" : currentWord;
            if (visibleCurrentWord) {
              applyLyricPresentation(currentTime, visibleCurrentWord, nextIndex);
              lyricEl.style.color = getLyricDisplayColor(
                currentTime,
                visibleCurrentWord,
                getLyricPresentation(currentTime, visibleCurrentWord, nextIndex)
              );
            }
          }
          syncBlackOverlayForTime(currentTime);
          return;
        }

        activeWordIndex = nextIndex;

        if (nextIndex < 0) {
          lyricEl.textContent = "";
          lyricEl.classList.add("is-empty");
          lyricEl.style.color = "#fff8ef";
          applyLyricPresentation(currentTime, "", nextIndex);
          syncBlackOverlayForTime(currentTime);
          return;
        }

        const word = lyricWords[nextIndex].text;
        const visibleWord = isTripleDotLyric(word) ? "" : word;
        lyricEl.textContent = visibleWord;
        lyricEl.classList.toggle("is-empty", !visibleWord);
        if (visibleWord) {
          applyLyricPresentation(currentTime, visibleWord, nextIndex);
        } else {
          applyLyricPresentation(currentTime, "", nextIndex);
          lyricEl.style.color = "#fff8ef";
        }
        syncBlackOverlayForTime(currentTime);
      }

      function stopSyncLoop() {
        if (rafId !== null) {
          cancelAnimationFrame(rafId);
          rafId = null;
        }
      }

      function syncLoop() {
        updateLyrics(audio.currentTime);
        drawScene(audio.currentTime);
        rafId = requestAnimationFrame(syncLoop);
      }

      function startSyncLoop() {
        if (rafId === null) {
          rafId = requestAnimationFrame(syncLoop);
        }
      }

      async function startSequenceFromBeginning() {
        if (!lyricWords.length) {
          return;
        }

        stopSyncLoop();
        audio.currentTime = 0;
        activeWordIndex = -1;
        lyricEl.textContent = "";
        lyricEl.classList.add("is-empty");
        lyricEl.style.color = "#fff8ef";
        syncBlackOverlayForTime(0);
        drawScene(0);
        updateLyrics(0, true);

        try {
          await audio.play();
          startBtn.hidden = true;
          setStatus("");
          document.body.classList.add("sequence-started");
        } catch (error) {
          setStatus("No se pudo iniciar. Presiona de nuevo.", true);
          console.error(error);
        }
      }

      async function loadLyrics() {
        try {
          const response = await fetch(encodeURI(LRC_PATH));
          if (!response.ok) {
            throw new Error(`No se pudo cargar ${LRC_PATH}`);
          }

          const rawLrc = await response.text();
          lyricWords = parseLrc(rawLrc);

          if (!lyricWords.length) {
            throw new Error("El archivo LRC no tiene timestamps validos.");
          }

          firstLyricTime = lyricWords[0].time;
          buildLyricDecorations();
          lyricsLoaded = true;
          updateTripleDotMarkers();
          updateReadyState();
        } catch (error) {
          lyricEl.textContent = "Error";
          lyricEl.classList.remove("is-empty");
          startBtn.disabled = true;
          setStatus("No se pudo cargar el LRC. Usa un servidor local.", true);
          console.error(error);
        }
      }

      function handlePointerPosition(clientX, clientY) {
        sceneState.pointer.active = true;
        sceneState.pointer.targetX = clamp(clientX / sceneState.width, 0, 1);
        sceneState.pointer.targetY = clamp(clientY / sceneState.height, 0, 1);
        updateHoveredWindowFromPointer();
        drawScene(audio.currentTime || sceneState.currentTime);
      }

      sceneCanvas.addEventListener("pointermove", (event) => {
        handlePointerPosition(event.clientX, event.clientY);
      });

      sceneCanvas.addEventListener("pointerleave", () => {
        sceneState.pointer.active = false;
        sceneState.pointer.targetX = 0.5;
        sceneState.pointer.targetY = 0.5;
        sceneState.hoveredWindowId = null;
        drawScene(audio.currentTime || sceneState.currentTime);
      });

      startBtn.addEventListener("click", async () => {
        await startSequenceFromBeginning();
      });

      audio.addEventListener("play", () => {
        startSyncLoop();
      });

      audio.addEventListener("pause", () => {
        stopSyncLoop();
      });

      audio.addEventListener("ended", () => {
        stopSyncLoop();
        lyricEl.textContent = "";
        lyricEl.classList.add("is-empty");
        lyricEl.style.color = "#fff8ef";
        setStatus("");
        drawScene(audio.currentTime || 0);
      });

      audio.addEventListener("timeupdate", () => {
        updateLyrics(audio.currentTime);
        drawScene(audio.currentTime);
      });

      window.addEventListener("resize", resizeScene);
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", resizeScene);
      }

      seedAtmosphere();
      resizeScene();
      updateReadyState();
      loadLyrics();
    </script>
  </body>
</html>
