<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/jpeg" href="media/favicon.jpg">
    <title>Golden Hour - JVKE</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
      }

      body {
        margin: 0;
        overflow: hidden;
        font-family: "Arial Black", "Impact", sans-serif;
        background: #000;
        color: #fff;
        --shake-x: 0px;
        --shake-y: 0px;
        --beam-main-scale-x: 0.006;
        --beam-core-scale-x: 0.004;
        --golden-opacity: 0;
        --golden-core-opacity: 0;
        --golden-blur: 58px;
        --golden-fill-opacity: 0;
        --lyric-color: #fff;
        --night-haze: 0;
        --star-intensity: 0.74;
        --gold-stars-opacity: 0;
        --moon-gold-progress: 0;
        --intro-reveal: 0;
        --safe-reflect: 0;
        --moon-hit-nudge: 0px;
        --void-progress: 0;
      }

      .scene {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        overflow: hidden;
        transform: translate3d(var(--shake-x), var(--shake-y), 0);
        opacity: calc(1 - (var(--void-progress) * 0.94));
        transition: transform 75ms linear, opacity 180ms linear;
      }

      .night-sky,
      .stars,
      .stars-gold,
      .night-haze,
      .moon,
      .hill-back,
      .hill-mid,
      .tree-line,
      .fog-band {
        position: absolute;
      }

      .night-sky {
        inset: 0;
        z-index: 0;
        background:
          linear-gradient(
            180deg,
            #01030d 0%,
            #05091f 40%,
            #10193b 72%,
            #171123 100%
          );
      }

      .stars {
        inset: -15%;
        z-index: 1;
        opacity: var(--star-intensity);
        background:
          radial-gradient(circle at 8% 14%, rgba(255, 255, 255, 0.84) 0.08vmin, transparent 0.19vmin),
          radial-gradient(circle at 16% 28%, rgba(255, 255, 255, 0.8) 0.08vmin, transparent 0.18vmin),
          radial-gradient(circle at 25% 12%, rgba(255, 255, 255, 0.76) 0.07vmin, transparent 0.17vmin),
          radial-gradient(circle at 38% 22%, rgba(255, 255, 255, 0.74) 0.07vmin, transparent 0.16vmin),
          radial-gradient(circle at 52% 9%, rgba(255, 255, 255, 0.8) 0.08vmin, transparent 0.18vmin),
          radial-gradient(circle at 64% 19%, rgba(255, 255, 255, 0.76) 0.07vmin, transparent 0.17vmin),
          radial-gradient(circle at 76% 7%, rgba(255, 255, 255, 0.86) 0.09vmin, transparent 0.2vmin),
          radial-gradient(circle at 88% 24%, rgba(255, 255, 255, 0.74) 0.07vmin, transparent 0.17vmin),
          radial-gradient(circle at 94% 12%, rgba(255, 255, 255, 0.72) 0.06vmin, transparent 0.16vmin),
          radial-gradient(circle at 10% 38%, rgba(255, 255, 255, 0.72) 0.06vmin, transparent 0.15vmin),
          radial-gradient(circle at 30% 44%, rgba(255, 255, 255, 0.74) 0.07vmin, transparent 0.16vmin),
          radial-gradient(circle at 50% 34%, rgba(255, 255, 255, 0.8) 0.08vmin, transparent 0.18vmin),
          radial-gradient(circle at 67% 41%, rgba(255, 255, 255, 0.75) 0.07vmin, transparent 0.17vmin),
          radial-gradient(circle at 82% 36%, rgba(255, 255, 255, 0.78) 0.08vmin, transparent 0.18vmin);
        animation: twinkle 5.8s ease-in-out infinite alternate;
      }

      .stars-gold {
        inset: -15%;
        z-index: 3;
        opacity: var(--gold-stars-opacity);
        overflow: hidden;
        background:
          radial-gradient(
            ellipse at 50% 30%,
            rgba(255, 212, 118, 0.48) 0%,
            rgba(255, 196, 92, 0.2) 34%,
            rgba(0, 0, 0, 0) 74%
          ),
          radial-gradient(
            ellipse at 20% 38%,
            rgba(255, 226, 156, 0.22) 0%,
            rgba(255, 205, 112, 0.08) 36%,
            rgba(0, 0, 0, 0) 76%
          ),
          radial-gradient(
            ellipse at 80% 34%,
            rgba(255, 228, 160, 0.22) 0%,
            rgba(255, 204, 110, 0.08) 38%,
            rgba(0, 0, 0, 0) 78%
          );
        mix-blend-mode: screen;
        filter:
          blur(0.85vmin)
          drop-shadow(0 0 1.2vmin rgba(255, 212, 120, 0.52))
          saturate(1.22);
        animation: sky-glow-breathe 3.4s ease-in-out infinite alternate;
      }

      .night-haze {
        inset: 0;
        z-index: 2;
        opacity: var(--night-haze);
        background:
          radial-gradient(
            ellipse at 50% 76%,
            rgba(255, 218, 124, 0.78) 0%,
            rgba(255, 184, 70, 0.56) 34%,
            rgba(255, 127, 34, 0.24) 58%,
            rgba(0, 0, 0, 0) 74%
          );
        transition: opacity 90ms linear;
      }

      .moon {
        top: 10vh;
        right: 9vw;
        z-index: 3;
        width: 10vmin;
        aspect-ratio: 1;
        border-radius: 50%;
        overflow: hidden;
        transform: translateY(var(--moon-hit-nudge));
        background:
          radial-gradient(
            circle at 38% 34%,
            rgba(255, 252, 236, 0.95) 0%,
            rgba(233, 240, 255, 0.82) 46%,
            rgba(156, 173, 220, 0.44) 78%,
            rgba(0, 0, 0, 0) 100%
          );
        box-shadow:
          0 0 2.1vmin rgba(235, 244, 255, 0.28),
          0 0 5.1vmin rgba(124, 146, 210, 0.22);
        transition: transform 90ms linear;
      }

      .moon::before {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        width: 280%;
        height: 280%;
        transform: translate(-50%, -50%);
        opacity: calc(var(--moon-gold-progress) * 0.94);
        mix-blend-mode: screen;
        background:
          radial-gradient(
            circle at 50% 50%,
            rgba(255, 242, 196, 0.86) 0%,
            rgba(255, 192, 90, 0.48) 22%,
            rgba(0, 0, 0, 0) 48%
          ),
          linear-gradient(
            90deg,
            rgba(0, 0, 0, 0) 0%,
            rgba(255, 232, 162, 0.5) 48%,
            rgba(255, 232, 162, 0.5) 52%,
            rgba(0, 0, 0, 0) 100%
          ),
          linear-gradient(
            180deg,
            rgba(0, 0, 0, 0) 0%,
            rgba(255, 215, 126, 0.46) 48%,
            rgba(255, 215, 126, 0.46) 52%,
            rgba(0, 0, 0, 0) 100%
          );
        filter: blur(0.18vmin);
        animation: moon-flare-pulse 1.5s ease-in-out infinite alternate;
      }

      .moon::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50%;
        opacity: var(--moon-gold-progress);
        mix-blend-mode: screen;
        background:
          radial-gradient(
            circle at 37% 33%,
            rgba(255, 250, 214, 0.98) 0%,
            rgba(255, 227, 140, 0.9) 44%,
            rgba(255, 176, 80, 0.62) 76%,
            rgba(0, 0, 0, 0) 100%
          );
        box-shadow:
          0 0 3.2vmin rgba(255, 216, 126, 0.54),
          0 0 8.2vmin rgba(255, 181, 74, 0.46);
      }

      .hill-back {
        left: -8vw;
        right: -8vw;
        bottom: 9vh;
        z-index: 3;
        height: 36vh;
        background:
          linear-gradient(
            180deg,
            rgba(17, 24, 48, 0.84) 0%,
            rgba(10, 13, 26, 0.98) 100%
          );
        clip-path: polygon(
          0 100%,
          8% 68%,
          17% 56%,
          29% 64%,
          38% 50%,
          47% 60%,
          58% 46%,
          71% 62%,
          83% 54%,
          92% 69%,
          100% 100%
        );
      }

      .hill-mid {
        left: -10vw;
        right: -10vw;
        bottom: 5.2vh;
        z-index: 4;
        height: 30vh;
        background:
          linear-gradient(
            180deg,
            rgba(10, 14, 24, 0.9) 0%,
            rgba(3, 5, 10, 1) 100%
          );
        clip-path: polygon(
          0 100%,
          6% 76%,
          14% 72%,
          22% 64%,
          33% 74%,
          44% 60%,
          55% 70%,
          66% 58%,
          76% 74%,
          88% 66%,
          100% 100%
        );
      }

      .tree-line {
        left: -4vw;
        right: -4vw;
        bottom: 10.8vh;
        z-index: 5;
        height: 12vh;
        background:
          repeating-linear-gradient(
            90deg,
            rgba(2, 3, 6, 0.98) 0,
            rgba(2, 3, 6, 0.98) 0.6vmin,
            rgba(0, 0, 0, 0) 0.6vmin,
            rgba(0, 0, 0, 0) 1.5vmin
          );
        clip-path: polygon(
          0 100%,
          2% 76%,
          5% 100%,
          8% 68%,
          11% 100%,
          16% 62%,
          20% 100%,
          25% 70%,
          30% 100%,
          36% 64%,
          42% 100%,
          49% 66%,
          55% 100%,
          61% 72%,
          67% 100%,
          74% 62%,
          80% 100%,
          86% 68%,
          92% 100%,
          96% 74%,
          100% 100%
        );
        opacity: 0.88;
      }

      .fog-band {
        left: 0;
        right: 0;
        bottom: 10vh;
        z-index: 5;
        height: 9vh;
        background:
          linear-gradient(
            180deg,
            rgba(113, 132, 191, 0) 0%,
            rgba(80, 95, 146, 0.2) 50%,
            rgba(36, 44, 70, 0.34) 100%
          );
      }

      .safe-foreground {
        position: fixed;
        left: -12vw;
        right: -12vw;
        bottom: 0.2vh;
        height: 15.2vh;
        z-index: 5;
        pointer-events: none;
        overflow: visible;
        opacity: calc(1 - (var(--void-progress) * 0.96));
        transform:
          translate3d(
            calc(var(--shake-x) * 0.7),
            calc(var(--shake-y) * 0.95),
            0
          );
        transition: transform 75ms linear, opacity 180ms linear;
      }

      .safe-foreground::after {
        content: "";
        position: absolute;
        left: -8%;
        right: -8%;
        bottom: 0.8vh;
        height: 3.8vh;
        opacity: calc(var(--safe-reflect) * 0.54);
        background:
          linear-gradient(
            90deg,
            rgba(0, 0, 0, 0) 0%,
            rgba(255, 216, 132, 0.08) 35%,
            rgba(255, 242, 193, 0.24) 50%,
            rgba(255, 216, 132, 0.08) 65%,
            rgba(0, 0, 0, 0) 100%
          );
        filter: blur(0.55vmin);
        transition: opacity 120ms linear;
      }

      .safe-ground {
        position: absolute;
        left: -2%;
        right: -2%;
        bottom: -3.4vh;
        z-index: 1;
        height: 15.6vh;
        filter:
          brightness(calc((1 - (var(--void-progress) * 0.76)) + (var(--safe-reflect) * 0.12)));
        background:
          linear-gradient(
            180deg,
            rgba(33, 37, 46, 0.99) 0%,
            rgba(20, 23, 30, 1) 36%,
            rgba(10, 12, 16, 1) 100%
          ),
          linear-gradient(
            90deg,
            rgba(128, 140, 163, 0.14) 0%,
            rgba(0, 0, 0, 0) 28%,
            rgba(0, 0, 0, 0) 72%,
            rgba(128, 140, 163, 0.12) 100%
          );
        border-top: 2px solid rgba(84, 94, 112, 0.78);
        transition: filter 140ms linear;
      }

      .safe-ground::before {
        content: "";
        position: absolute;
        left: -2%;
        right: -2%;
        top: -8%;
        height: 36%;
        opacity: calc(var(--safe-reflect) * 0.42);
        background:
          linear-gradient(
            180deg,
            rgba(255, 232, 166, 0.22) 0%,
            rgba(255, 186, 88, 0.08) 52%,
            rgba(0, 0, 0, 0) 100%
          );
        filter: blur(0.42vmin);
        transition: opacity 120ms linear;
      }

      .safe-ground::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        top: -0.35rem;
        height: 0.36rem;
        background:
          linear-gradient(
            180deg,
            rgba(86, 98, 118, 0.7) 0%,
            rgba(58, 67, 82, 0.92) 100%
          );
        opacity: 0.88;
      }

      .bench {
        position: absolute;
        left: 50%;
        bottom: 8.6vh;
        z-index: 3;
        width: clamp(10rem, 28vw, 20rem);
        height: 0.58rem;
        transform: translateX(-50%);
        background: rgba(20, 24, 31, 0.99);
        border: 1px solid rgba(56, 66, 82, 0.92);
        border-radius: 1px;
        filter:
          brightness(calc((1 - (var(--void-progress) * 0.82)) + (var(--safe-reflect) * 0.08)));
        box-shadow:
          0 0 calc(var(--safe-reflect) * 0.52rem) rgba(255, 199, 100, 0.24);
        transition: filter 120ms linear, box-shadow 120ms linear;
      }

      .bench-silhouette {
        position: absolute;
        left: 50%;
        bottom: 1.2vh;
        z-index: 2;
        height: clamp(7rem, 17vh, 13.2rem);
        width: auto;
        display: block;
        object-fit: contain;
        transform: translateX(-50%) scale(2);
        transform-origin: 50% 100%;
        opacity: calc(0.92 - (var(--void-progress) * 0.86));
        mix-blend-mode: multiply;
        filter:
          brightness(calc((1 - (var(--void-progress) * 0.78)) + (var(--safe-reflect) * 0.08)))
          contrast(1.04);
        pointer-events: none;
        user-select: none;
      }

      .floating-trees-layer {
        position: fixed;
        inset: 0;
        z-index: 4;
        pointer-events: none;
        overflow: hidden;
        transform:
          translate3d(
            calc(var(--shake-x) * 0.95),
            calc(var(--shake-y) * 1.1),
            0
          );
        transition: transform 72ms linear;
      }

      .floating-tree {
        position: absolute;
        left: 0;
        top: 0;
        width: var(--tree-w, 1.7vmin);
        height: var(--tree-h, 6.6vmin);
        opacity: 0;
        transform-origin: 50% 92%;
        will-change: transform, opacity;
        filter:
          drop-shadow(0 0 calc(0.2vmin + (var(--safe-reflect) * 0.75vmin)) rgba(255, 201, 108, 0.28));
      }

      .floating-tree::before {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        bottom: 14%;
        background:
          linear-gradient(
            180deg,
            rgba(9, 13, 22, 0.98) 0%,
            rgba(1, 2, 4, 1) 100%
          );
        clip-path: polygon(
          50% 0,
          88% 34%,
          71% 34%,
          98% 62%,
          65% 62%,
          80% 100%,
          20% 100%,
          35% 62%,
          2% 62%,
          29% 34%,
          12% 34%
        );
      }

      .floating-tree::after {
        content: "";
        position: absolute;
        left: 42%;
        right: 42%;
        top: 72%;
        bottom: 0;
        background: rgba(3, 3, 4, 0.98);
        border-radius: 0.08vmin;
      }

      .surge-debris-layer {
        position: fixed;
        inset: 0;
        z-index: 5;
        pointer-events: none;
        overflow: hidden;
        transform:
          translate3d(
            calc(var(--shake-x) * 0.55),
            calc(var(--shake-y) * 0.8),
            0
          );
      }

      .surge-debris {
        position: absolute;
        left: 0;
        top: 0;
        width: var(--debris-w, 2.2vmin);
        height: var(--debris-h, 1.6vmin);
        opacity: 0;
        transform-origin: 50% 50%;
        border-radius: 0.14vmin;
        background:
          linear-gradient(
            145deg,
            rgba(82, 66, 50, 0.98) 0%,
            rgba(53, 42, 33, 0.99) 58%,
            rgba(31, 24, 18, 1) 100%
          );
        box-shadow:
          inset 0 0 0.2vmin rgba(204, 165, 120, 0.18),
          0 0 0.38vmin rgba(0, 0, 0, 0.56),
          0 0 calc(var(--safe-reflect) * 0.6vmin) rgba(255, 201, 108, 0.2);
        will-change: transform, opacity;
      }

      .petal-layer {
        position: fixed;
        inset: 0;
        z-index: 4;
        pointer-events: none;
        overflow: hidden;
        transform:
          translate3d(
            calc(var(--shake-x) * 0.25),
            calc(var(--shake-y) * 0.35),
            0
          );
      }

      .gold-petal {
        position: absolute;
        left: 0;
        top: 0;
        width: var(--petal-w, 1vmin);
        height: var(--petal-h, 1.55vmin);
        opacity: 0;
        border-radius: 70% 30% 70% 35%;
        transform-origin: 50% 58%;
        background:
          linear-gradient(
            145deg,
            rgba(255, 236, 174, 0.95) 0%,
            rgba(255, 201, 102, 0.9) 52%,
            rgba(207, 132, 48, 0.84) 100%
          );
        box-shadow:
          0 0 0.42vmin rgba(255, 214, 126, 0.42),
          inset 0 0 0.16vmin rgba(255, 245, 214, 0.56);
        will-change: transform, opacity;
      }

      .ground-smoke-layer {
        position: fixed;
        inset: 0;
        z-index: 4;
        pointer-events: none;
        overflow: hidden;
        transform:
          translate3d(
            calc(var(--shake-x) * 0.35),
            calc(var(--shake-y) * 0.45),
            0
          );
      }

      .ground-smoke {
        position: absolute;
        left: 0;
        top: 0;
        width: var(--smoke-w, 2.8vmin);
        height: var(--smoke-h, 2.8vmin);
        opacity: 0;
        border-radius: 50%;
        background:
          radial-gradient(
            circle at 45% 45%,
            rgba(255, 255, 255, 0.95) 0%,
            rgba(244, 248, 255, 0.52) 45%,
            rgba(244, 248, 255, 0.12) 70%,
            rgba(244, 248, 255, 0) 100%
          );
        filter: blur(0.22vmin);
        mix-blend-mode: screen;
        will-change: transform, opacity;
      }

      .bench::before {
        content: "";
        position: absolute;
        left: 0.18rem;
        right: 0.18rem;
        bottom: 0.58rem;
        height: 0.84rem;
        background: rgba(24, 29, 37, 0.99);
        border: 1px solid rgba(56, 66, 82, 0.92);
        border-bottom: none;
      }

      .bench::after {
        content: "";
        position: absolute;
        left: 0.85rem;
        bottom: -1.42rem;
        width: 0.32rem;
        height: 1.42rem;
        background: rgba(18, 22, 28, 0.99);
        box-shadow:
          calc((clamp(10rem, 28vw, 20rem)) - 2.5rem) 0 0 rgba(18, 22, 28, 0.99);
      }

      .dust-layer {
        position: fixed;
        inset: 0;
        z-index: 5;
        pointer-events: none;
        overflow: hidden;
      }

      .rubble-layer {
        position: fixed;
        inset: 0;
        z-index: 5;
        pointer-events: none;
        overflow: hidden;
      }

      .rubble {
        position: absolute;
        left: 0;
        top: 0;
        opacity: 0;
        width: 1.65vmin;
        height: 1.3vmin;
        background:
          linear-gradient(
            145deg,
            rgba(148, 156, 176, 0.96) 0%,
            rgba(86, 93, 109, 0.99) 58%,
            rgba(42, 48, 58, 1) 100%
          );
        border-radius: 0.12vmin;
        box-shadow:
          inset 0 0 0.24vmin rgba(226, 234, 255, 0.34),
          0 0 0.45vmin rgba(0, 0, 0, 0.72);
        will-change: transform, opacity;
      }

      .void-overlay {
        position: fixed;
        inset: 0;
        z-index: 4;
        pointer-events: none;
        opacity: var(--void-progress);
        background: rgba(0, 0, 0, 1);
        transition: opacity 140ms linear;
      }

      .dust {
        position: absolute;
        left: 0;
        top: 0;
        width: 0.58vmin;
        height: 0.58vmin;
        border-radius: 50%;
        opacity: 0;
        background: rgba(118, 76, 36, 0.86);
        box-shadow:
          0 0 0.45vmin rgba(255, 193, 105, 0.22),
          0 0 0.14vmin rgba(68, 40, 18, 0.78);
        will-change: transform, opacity;
      }

      .stage {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        padding: 1.2rem;
        z-index: 12;
        transform: translate3d(var(--shake-x), var(--shake-y), 0);
        transition: transform 75ms linear;
      }

      .golden-fill,
      .golden-beacon,
      .golden-core {
        position: fixed;
        pointer-events: none;
      }

      .golden-fill {
        inset: 0;
        z-index: 1;
        opacity: var(--golden-fill-opacity);
        background:
          linear-gradient(
            90deg,
            rgba(255, 205, 92, 0.52) 0%,
            rgba(255, 227, 154, 0.62) 50%,
            rgba(255, 205, 92, 0.52) 100%
          ),
          radial-gradient(
            circle at 50% 50%,
            rgba(255, 248, 214, 0.76) 0%,
            rgba(255, 219, 126, 0.66) 34%,
            rgba(255, 171, 70, 0.52) 70%,
            rgba(176, 88, 24, 0.34) 100%
          );
        transition: opacity 120ms linear;
      }

      .golden-beacon,
      .golden-core {
        z-index: 2;
        will-change: transform, opacity, filter;
      }

      .golden-beacon {
        top: 50%;
        left: 50%;
        width: 100vw;
        height: 260vmax;
        margin-left: -50vw;
        margin-top: -130vmax;
        border-radius: 999px;
        transform-origin: 50% 50%;
        transform:
          translate3d(var(--shake-x), var(--shake-y), 0)
          scaleX(var(--beam-main-scale-x))
          scaleY(1);
        opacity: var(--golden-opacity);
        filter: blur(var(--golden-blur)) saturate(1.16);
        box-shadow:
          0 0 0.2vmin rgba(255, 243, 205, 0.7),
          0 0 3.2vmin rgba(255, 205, 96, 0.42);
        background:
          linear-gradient(
            90deg,
            rgba(0, 0, 0, 0) 0%,
            rgba(255, 175, 52, 0.14) 23%,
            rgba(255, 206, 109, 0.56) 41%,
            rgba(255, 247, 210, 1) 50%,
            rgba(255, 206, 109, 0.56) 59%,
            rgba(255, 175, 52, 0.14) 77%,
            rgba(0, 0, 0, 0) 100%
          );
        mix-blend-mode: screen;
        transition: opacity 130ms linear, transform 90ms linear, filter 140ms linear;
      }

      .golden-core {
        top: 50%;
        left: 50%;
        width: 100vw;
        height: 220vmax;
        margin-left: -50vw;
        margin-top: -110vmax;
        border-radius: 999px;
        transform:
          translate3d(var(--shake-x), var(--shake-y), 0)

        opacity: var(--golden-core-opacity);
        background:
          linear-gradient(
            90deg,
            rgba(0, 0, 0, 0) 0%,
            rgba(255, 210, 124, 0.22) 32%,
            rgba(255, 247, 210, 0.84) 50%,
            rgba(255, 210, 124, 0.22) 68%,
            rgba(0, 0, 0, 0) 100%
          );

        transition: opacity 140ms linear, transform 90ms linear;
      }

      .lyric {
        margin: 0;

        min-height: 1.1em;

      .lyric.is-empty {

      }

      .status {

        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        font-size: 0.9rem;
        color: #d0d0d0;
      }

      .start-sequence-btn {
        font: inherit;
        font-size: 0.95rem;
        border: 1px solid #fff;
        background: #000;
        color: #fff;
        padding: 10px 16px;

      }

      .start-sequence-btn:disabled {
        opacity: 0.45;

      .debug-panel {
        display: none !important;
        width: min(95vw, 980px);
        border: 1px solid #2d2d2d;
        border-radius: 10px;

      .debug-times {

      .debug-block {

      }

      .debug-label {
        display: block;
        font-size: 0.74rem;

      }

      .debug-value {
        display: block;

        color: #fff;
      }

      .debug-controls {
        display: flex;
        flex-wrap: wrap;
        gap: 0.55rem;
        align-items: center;

      .debug-btn,
      .debug-select,
      .debug-input {

        background: #111;

        padding: 0.35rem 0.55rem;

      .debug-btn {
        cursor: pointer;

      .debug-btn:disabled,
      .debug-select:disabled,
      .debug-input:disabled {

        cursor: not-allowed;
      }

      .debug-inline {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
      }

      .debug-lines {

      .debug-line {

      @media (min-width: 1024px) {
        .lyric {
          font-size: clamp(1.45rem, 4.8vw, 5.35rem);

        .bench-silhouette {

      @media (max-width: 760px) {
        .moon {

        }

        .bench-silhouette {
          bottom: 3vh;
          height: clamp(5.8rem, 18.2vw, 8.8rem);

      @keyframes twinkle {
        from {
          transform: scale(1) translateX(0);
          opacity: var(--star-intensity);

      @keyframes sky-glow-breathe {

          transform: scale(1) translateX(0);
          opacity: calc(var(--gold-stars-opacity) * 0.88);
        }
        to {
          transform: scale(1.025) translateX(-0.22%);
          opacity: calc(var(--gold-stars-opacity) * 1);
        }
      }

      @keyframes moon-flare-pulse {
        from {
          transform: translate(-50%, -50%) scale(0.94);
          opacity: calc(var(--moon-gold-progress) * 0.7);
        }
        to {
          transform: translate(-50%, -50%) scale(1.08);
          opacity: calc(var(--moon-gold-progress) * 1);
        }
      }

      .intro-overlay {
        position: fixed;
        inset: 0;
        z-index: 8;
        pointer-events: none;
        opacity: calc(1 - var(--intro-reveal));
        background: #000;
        transition: opacity 130ms linear;
      }

      audio {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="scene" aria-hidden="true">
      <div class="night-sky"></div>
      <div class="stars"></div>
      <div class="stars-gold"></div>
      <div class="night-haze"></div>
      <div class="moon"></div>
      <div class="hill-back"></div>
      <div class="hill-mid"></div>
      <div class="tree-line"></div>
      <div class="fog-band"></div>
    </div>

    <div id="dust-layer" class="dust-layer" aria-hidden="true"></div>
    <div id="rubble-layer" class="rubble-layer" aria-hidden="true"></div>
    <div id="floating-trees-layer" class="floating-trees-layer" aria-hidden="true"></div>
    <div id="surge-debris-layer" class="surge-debris-layer" aria-hidden="true"></div>
    <div id="petal-layer" class="petal-layer" aria-hidden="true"></div>
    <div id="ground-smoke-layer" class="ground-smoke-layer" aria-hidden="true"></div>

    <div class="safe-foreground" aria-hidden="true">
      <div class="safe-ground"></div>
      <img class="bench-silhouette" src="media/silueta.png" alt="" aria-hidden="true">
      <div class="bench"></div>
    </div>

    <div id="golden-fill" class="golden-fill" aria-hidden="true"></div>
    <div id="golden-beacon" class="golden-beacon" aria-hidden="true"></div>
    <div id="golden-core" class="golden-core" aria-hidden="true"></div>
    <div class="void-overlay" aria-hidden="true"></div>
    <div class="intro-overlay" aria-hidden="true"></div>

    <main class="stage" aria-live="polite">
      <button id="start-sequence-btn" class="start-sequence-btn" type="button" disabled>Comenzar secuencia</button>
      <p id="lyric" class="lyric is-empty"></p>
      <p id="status" class="status">Cargando timestamps...</p>
    </main>

    <audio id="audio" preload="auto"></audio>

    <script>
      (() => {
        "use strict";

        const AUDIO_PATH = "media/goldenhour.mp3";
        const LRC_PATH = "media/Unknown Title - Unknown Artist.lrc";
        const SEEK_STEP_SECONDS = 1;

        const audio = document.getElementById("audio");
        const lyricEl = document.getElementById("lyric");
        const statusText = document.getElementById("status");
        const dustLayer = document.getElementById("dust-layer");
        const rubbleLayer = document.getElementById("rubble-layer");
        const floatingTreesLayer = document.getElementById("floating-trees-layer");
        const surgeDebrisLayer = document.getElementById("surge-debris-layer");
        const petalLayer = document.getElementById("petal-layer");
        const groundSmokeLayer = document.getElementById("ground-smoke-layer");
        const startSequenceBtn = document.getElementById("start-sequence-btn");
        const rootStyle = document.body.style;

        const clockAudioEl = document.getElementById("clock-audio");
        const clockSyncEl = document.getElementById("clock-sync");
        const playPauseBtn = document.getElementById("play-pause-btn");
        const restartBtn = document.getElementById("restart-btn");
        const backBtn = document.getElementById("back-btn");
        const forwardBtn = document.getElementById("forward-btn");
        const speedSelect = document.getElementById("speed-select");
        const offsetInput = document.getElementById("offset-input");
        const debugCurrentEl = document.getElementById("debug-current");
        const debugNextEl = document.getElementById("debug-next");

        const debugControls = [
          playPauseBtn,
          restartBtn,
          backBtn,
          forwardBtn,
          speedSelect,
          offsetInput
        ].filter(Boolean);

        let lyricSegments = [];
        let activeSegmentIndex = -1;
        let rafId = null;
        let isReady = false;
        let hasSequenceStarted = false;
        let debugOffsetMs = 0;
        const baseEffectTimings = {
          start: 48.35,
          burst: 63.63,
          fadeEnd: 74.56
        };
        const baseBurstOffset = baseEffectTimings.burst - baseEffectTimings.start;
        const baseFadeOffset = baseEffectTimings.fadeEnd - baseEffectTimings.start;
        let effectWindows = [baseEffectTimings];
        let activeEffectWindowIndex = -1;
        const BLACKOUT_START = 185.4;
        const BLACKOUT_DURATION = 9.5;
        const RUBBLE_PARTICLE_COUNT = 72;
        const SECOND_BEAM_INDEX = 1;
        const DUST_PARTICLE_COUNT = 220;
        const FLOATING_TREE_COUNT = 72;
        const SURGE_DEBRIS_COUNT = 68;
        const GOLD_PETAL_COUNT = 160;
        const GROUND_SMOKE_PARTICLE_COUNT = 56;
        const TREE_TAIL_DURATION = 16;
        const FX_PARTICLE_UPDATE_INTERVAL_MS = 16;
        const PETAL_UPDATE_INTERVAL_MS = 16;
        const dustParticles = [];
        const rubbleParticles = [];
        const floatingTrees = [];
        const surgeDebris = [];
        const goldPetals = [];
        const groundSmokeParticles = [];
        let loveSkyWindows = [];
        let effectVerseStepTimes = [];
        let loveSkyStepTimes = [];
        let groundSmokeWindows = [];
        let petalWindow = null;
        let firstLyricStartTime = 17.66;
        let lastFxParticleUpdateMs = -Infinity;
        let lastPetalUpdateMs = -Infinity;

        function parseTimestamp(min, sec, fracRaw) {
          const frac = (fracRaw || "0").padEnd(3, "0").slice(0, 3);
          return Number(min) * 60 + Number(sec) + Number(frac) / 1000;
        }

        function cleanLyric(text) {
          return text
            .replace(/\s+/g, " ")
            .replace(/\s+([,.;:!?])/g, "$1")
            .trim();
        }

        function parseLrc(rawText) {
          const entries = [];
          const lines = rawText
            .replace(/\r/g, "")
            .replace(/\u00a0/g, " ")
            .split("\n");

          for (const line of lines) {
            const tags = [...line.matchAll(/\[(\d{2}):(\d{2})(?:\.(\d{1,3}))?\]/g)];
            if (!tags.length) {
              continue;
            }

            const text = cleanLyric(line.replace(/\[[^\]]+\]/g, " "));
            if (!text) {
              continue;
            }

            for (const tag of tags) {
              const time = parseTimestamp(tag[1], tag[2], tag[3]);
              if (Number.isFinite(time)) {
                entries.push({ time, text });
              }
            }
          }

          return entries.sort((a, b) => a.time - b.time);
        }

        function normalizeLyricText(text) {
          return text.trim().toLowerCase();
        }

        function normalizeLyricToken(text) {
          return normalizeLyricText(text).replace(/[^a-z0-9]+/g, "");
        }

        function isDotsOnly(text) {
          return /^\.+$/.test((text || "").trim());
        }

        function buildEffectWindows(segments) {
          const windows = [];

          for (let i = 0; i < segments.length; i += 1) {
            const current = segments[i];
            if (normalizeLyricText(current.text) !== "shine") {
              continue;
            }

            const start = current.time;
            const searchLimit = start + 40;
            let burst = null;
            let fadeEnd = null;

            for (let j = i + 1; j < segments.length; j += 1) {
              const candidate = segments[j];
              if (candidate.time > searchLimit) {
                break;
              }

              const text = normalizeLyricText(candidate.text);
              if (burst === null && text === "time") {
                burst = candidate.time;
                continue;
              }

              if (burst !== null && (text === "(oh)" || text === "oh")) {
                fadeEnd = candidate.time;
                break;
              }
            }

            const safeBurst = Number.isFinite(burst) ? burst : (start + baseBurstOffset);
            const safeFadeEnd = Number.isFinite(fadeEnd) ? fadeEnd : (start + baseFadeOffset);
            if (safeFadeEnd <= safeBurst) {
              continue;
            }

            windows.push({
              start,
              burst: safeBurst,
              fadeEnd: safeFadeEnd
            });
          }

          return windows.length ? windows : [{ ...baseEffectTimings }];
        }

        function buildLoveSkyWindows(segments) {
          if (!segments.length) {
            return [];
          }

          const windows = [];
          for (let i = 0; i < segments.length; i += 1) {
            const token = normalizeLyricToken(segments[i].text);
            const nextToken = i + 1 < segments.length
              ? normalizeLyricToken(segments[i + 1].text)
              : "";
            const prevToken = i > 0
              ? normalizeLyricToken(segments[i - 1].text)
              : "";
            let startIndex = -1;

            if (
              token.includes("iwasallalone") ||
              (token === "iwas" && nextToken.includes("allalone")) ||
              (token.includes("allalone") && prevToken.includes("iwas"))
            ) {
              startIndex = (token.includes("allalone") && prevToken.includes("iwas")) ? (i - 1) : i;
            } else if (i + 3 < segments.length) {
              const a = token;
              const b = normalizeLyricToken(segments[i + 1].text);
              const c = normalizeLyricToken(segments[i + 2].text);
              const d = normalizeLyricToken(segments[i + 3].text);
              if (a === "i" && b === "was" && c === "all" && d === "alone") {
                startIndex = i;
              }
            }

            if (startIndex < 0) {
              continue;
            }

            const startTime = segments[startIndex].time;
            let lifeIndex = -1;
            for (let j = startIndex; j < segments.length; j += 1) {
              if ((segments[j].time - startTime) > 50) {
                break;
              }
              if (normalizeLyricToken(segments[j].text) === "life") {
                lifeIndex = j;
                break;
              }
            }

            const searchFrom = lifeIndex >= 0 ? lifeIndex + 1 : (startIndex + 1);
            let endIndex = -1;
            let seeIndex = -1;
            for (let j = searchFrom; j < segments.length; j += 1) {
              if ((segments[j].time - startTime) > 65) {
                break;
              }
              const look = normalizeLyricToken(segments[j].text);
              if (seeIndex < 0 && (look === "see" || look.startsWith("see"))) {
                seeIndex = j;
                continue;
              }
              if (seeIndex >= 0 && (look === "you" || look.startsWith("you"))) {
                endIndex = j;
                break;
              }
            }

            if (endIndex < 0 && seeIndex >= 0) {
              endIndex = seeIndex;
            }

            if (endIndex < 0) {
              continue;
            }

            const endTime = segments[endIndex].time;
            if (!Number.isFinite(startTime) || !Number.isFinite(endTime) || endTime <= startTime) {
              continue;
            }

            windows.push({
              start: startTime,
              end: endTime
            });
            i = endIndex;
          }

          return windows;
        }

        function buildPetalWindow(segments) {
          for (const segment of segments) {
            if (!isDotsOnly(segment.text)) {
              continue;
            }

            const start = segment.time;
            const end = BLACKOUT_START + BLACKOUT_DURATION;
            if (Number.isFinite(start) && Number.isFinite(end) && end > start) {
              return { start, end };
            }
          }
          return null;
        }

        function buildGroundSmokeWindows(segments) {
          if (!segments.length) {
            return [];
          }

          const windows = [];
          for (let i = 0; i + 2 < segments.length; i += 1) {
            const a = normalizeLyricToken(segments[i].text);
            const b = normalizeLyricToken(segments[i + 1].text);
            const c = normalizeLyricToken(segments[i + 2].text);
            if (!(a === "for" && b === "the" && c.startsWith("love"))) {
              continue;
            }

            const start = segments[i].time;
            let end = null;
            for (let j = i + 3; j < segments.length; j += 1) {
              if ((segments[j].time - start) > 24) {
                break;
              }
              const token = normalizeLyricToken(segments[j].text);
              if (token === "light" || token.startsWith("light")) {
                end = segments[j].time;
                i = j;
                break;
              }
            }

            if (Number.isFinite(start) && Number.isFinite(end) && end > start) {
              windows.push({ start, end });
            }
          }

          return windows;
        }

        function buildWindowStepTimes(segments, windows, endKey) {
          if (!windows.length) {
            return [];
          }

          return windows.map((window) => {
            const start = window.start;
            const end = window[endKey];
            if (!Number.isFinite(start) || !Number.isFinite(end) || end <= start) {
              return [];
            }

            const times = [];
            for (const segment of segments) {
              if (
                Number.isFinite(segment.time) &&
                segment.time >= start - 0.05 &&
                segment.time <= end + 0.05 &&
                !isDotsOnly(segment.text)
              ) {
                times.push(segment.time);
              }
            }

            if (!times.length) {
              return [start, end];
            }

            if (times[0] > start + 0.08) {
              times.unshift(start);
            }
            if (times[times.length - 1] < end - 0.08) {
              times.push(end);
            }

            return times;
          });
        }

        function getWindowVerseProgress(stepTimes, windowStart, windowEnd, effectiveTime, activeIndex) {
          const fallback = clamp01((effectiveTime - windowStart) / Math.max(0.001, windowEnd - windowStart));
          if (!stepTimes || stepTimes.length < 2) {
            return fallback;
          }

          let markerTime = effectiveTime;
          if (activeIndex >= 0 && activeIndex < lyricSegments.length) {
            const lineTime = lyricSegments[activeIndex].time;
            if (Number.isFinite(lineTime)) {
              markerTime = lineTime;
            }
          }

          let stepIndex = 0;
          for (let i = stepTimes.length - 1; i >= 0; i -= 1) {
            if (markerTime >= stepTimes[i] - 0.001) {
              stepIndex = i;
              break;
            }
          }

          const stepSpan = 1 / Math.max(1, stepTimes.length - 1);
          const nextIndex = Math.min(stepTimes.length - 1, stepIndex + 1);
          const stepStart = stepTimes[stepIndex];
          const stepEnd = stepTimes[nextIndex];
          const intra = nextIndex === stepIndex
            ? 1
            : clamp01((effectiveTime - stepStart) / Math.max(0.001, stepEnd - stepStart));
          const progress = (stepIndex * stepSpan) + (stepSpan * intra);
          return clamp01(progress);
        }

        function updateLoveSkyEffect(effectiveTime, activeIndex) {
          if (!loveSkyWindows.length || !Number.isFinite(effectiveTime)) {
            rootStyle.setProperty("--gold-stars-opacity", "0");
            rootStyle.setProperty("--moon-gold-progress", "0");
            return;
          }

          let activeWindow = null;
          let activeWindowIndex = -1;
          for (let i = 0; i < loveSkyWindows.length; i += 1) {
            const window = loveSkyWindows[i];
            if (
              Number.isFinite(window.start) &&
              Number.isFinite(window.end) &&
              effectiveTime >= window.start - 0.2 &&
              effectiveTime <= window.end + 1.45
            ) {
              activeWindow = window;
              activeWindowIndex = i;
              break;
            }
          }

          if (!activeWindow) {
            rootStyle.setProperty("--gold-stars-opacity", "0");
            rootStyle.setProperty("--moon-gold-progress", "0");
            return;
          }

          const { start, end } = activeWindow;
          const verseProgress = getWindowVerseProgress(
            loveSkyStepTimes[activeWindowIndex],
            start,
            end,
            effectiveTime,
            activeIndex
          );
          const verseCurve = easeOutQuad(verseProgress);
          const intro = clamp01((effectiveTime - (start - 0.18)) / 1.12);
          const outro = 1 - clamp01((effectiveTime - end) / 1.38);
          const noiseA = Math.sin((effectiveTime * 2.73) + 0.31);
          const noiseB = Math.sin((effectiveTime * 4.89) + 2.14);
          const noiseC = Math.cos((effectiveTime * 1.47) + 1.06);
          const randomLike = clamp01(0.5 + (noiseA * 0.25) + (noiseB * 0.18) + (noiseC * 0.12));
          const flicker = 0.86 + (randomLike * 0.34);
          const envelope = intro * outro;
          const starsFloor = 0.12 * envelope;
          const moonFloor = 0.1 * envelope;
          const starsGold = Math.max(
            starsFloor,
            clamp01((0.22 + (verseCurve * 0.7)) * flicker * envelope)
          );
          const moonGold = Math.max(
            moonFloor,
            clamp01((0.18 + (verseCurve * 0.74)) * (0.9 + (randomLike * 0.12)) * envelope)
          );

          rootStyle.setProperty("--gold-stars-opacity", starsGold.toFixed(3));
          rootStyle.setProperty("--moon-gold-progress", moonGold.toFixed(3));
        }

        function updateIntroReveal(effectiveTime) {
          const target = Number.isFinite(firstLyricStartTime) ? Math.max(2.5, firstLyricStartTime) : 17.66;
          const reveal = clamp01(effectiveTime / target);
          rootStyle.setProperty("--intro-reveal", reveal.toFixed(3));
        }

        function setStatus(message, isError = false) {
          statusText.textContent = message;
          statusText.style.color = isError ? "#ff6a6a" : "#d0d0d0";
        }

        function updateStartButton() {
          if (!startSequenceBtn) {
            return;
          }

          startSequenceBtn.textContent = "Comenzar secuencia";
          startSequenceBtn.disabled = !isReady || hasSequenceStarted;
          startSequenceBtn.hidden = hasSequenceStarted;
        }

        function pad2(value) {
          return String(value).padStart(2, "0");
        }

        function pad3(value) {
          return String(value).padStart(3, "0");
        }

        function formatTime(seconds) {
          if (!Number.isFinite(seconds) || seconds < 0) {
            return "00:00.000";
          }
          const totalMs = Math.max(0, Math.round(seconds * 1000));
          const minutes = Math.floor(totalMs / 60000);
          const secs = Math.floor((totalMs % 60000) / 1000);
          const millis = totalMs % 1000;
          return `${pad2(minutes)}:${pad2(secs)}.${pad3(millis)}`;
        }

        function formatLrcTag(seconds) {
          if (!Number.isFinite(seconds) || seconds < 0) {
            return "[00:00.00]";
          }
          const totalCs = Math.max(0, Math.round(seconds * 100));
          const minutes = Math.floor(totalCs / 6000);
          const secs = Math.floor((totalCs % 6000) / 100);
          const centis = totalCs % 100;
          return `[${pad2(minutes)}:${pad2(secs)}.${pad2(centis)}]`;
        }

        function clamp01(value) {
          if (!Number.isFinite(value)) {
            return 0;
          }
          return Math.min(1, Math.max(0, value));
        }

        function lerp(from, to, progress) {
          return from + (to - from) * progress;
        }

        function easeOutQuad(value) {
          return 1 - (1 - value) * (1 - value);
        }

        function easeInCubic(value) {
          return value * value * value;
        }

        function easeInOutCubic(value) {
          if (value < 0.5) {
            return 4 * value * value * value;
          }
          const inverse = -2 * value + 2;
          return 1 - ((inverse * inverse * inverse) / 2);

          const fragment = document.createDocumentFragment();
          const columns = 19;

          for (let i = 0; i < RUBBLE_PARTICLE_COUNT; i += 1) {
            const piece = document.createElement("span");
            piece.className = "rubble";
            fragment.appendChild(piece);

            const col = i % columns;
            const row = Math.floor(i / columns);
            const lane = (col + 0.5) / columns;
            const norm = (lane * 2) - 1;
            const moonHit = (i % 9 === 0) || (i % 13 === 0) || (i % 17 === 5);
            const baseX = moonHit
              ? (74 + ((i * 7) % 24) + (Math.sin((i + 3) * 0.41) * 1.4))
              : ((lane * 100) + (Math.sin((i + 1) * 1.07) * 1.4));
            const baseY = 101.5 + ((row % 3) * 1.1) + ((i % 3) * 0.3);
            const rise = moonHit
              ? (150 + (row * 11) + ((i % 5) * 8))
              : (92 + (row * 10) + ((i % 6) * 7));
            const drift = (norm * (20 + (row * 4))) + (Math.cos((i + 2) * 0.61) * 4.2);
            const fall = moonHit ? (84 + ((i % 4) * 10)) : (52 + ((i % 5) * 8));
            const spin = (norm >= 0 ? 1 : -1) * (210 + (row * 44) + ((i % 7) * 26));
            const duration = moonHit
              ? (2.35 + (row * 0.12) + ((i % 4) * 0.08))
              : (2.7 + (row * 0.15) + ((i % 5) * 0.07));
            const delay = (row * 0.03) + ((col % 5) * 0.025);
            const scale = 0.78 + (row * 0.08) + ((i % 4) * 0.08);
            const alpha = 0.52 + ((i % 5) * 0.1);
            const hitAt = moonHit ? (0.34 + ((i % 4) * 0.08)) : 1;
            const hitKick = moonHit ? (0.8 + ((i % 3) * 0.25)) : 0;
            const hitDir = i % 2 === 0 ? 1 : -1;

            rubbleParticles.push({
              element: piece,
              baseX,
              baseY,
              rise,
              drift,
              fall,
              spin,
              duration,
              delay,
              scale,
              alpha,
              moonHit,
              hitAt,
              hitKick,
              hitDir
            });
          }

          rubbleLayer.appendChild(fragment);
        }

        function hideRubbleParticles() {
          rootStyle.setProperty("--moon-hit-nudge", "0px");
          for (const piece of rubbleParticles) {
            piece.element.style.opacity = "0";
          }
        }

        function updateRubbleParticles(effectiveTime, timings, windowIndex, scenePower, groundBreak) {
          if (!rubbleParticles.length) {
            return;
          }

          if (!timings || windowIndex !== SECOND_BEAM_INDEX) {
            hideRubbleParticles();
            return;
          }

          const burstStart = timings.burst - 0.02;
          const fadeStart = timings.fadeEnd + 2.25;
          const fadeOut = 1 - clamp01((effectiveTime - fadeStart) / 2.05);
          const globalAlpha = clamp01(0.54 + (scenePower * 0.58)) * fadeOut * clamp01(0.34 + (groundBreak * 1.2));

          if (effectiveTime < burstStart - 0.01 || globalAlpha <= 0.001) {
            hideRubbleParticles();
            return;
          }

          let moonKick = 0;
          for (const piece of rubbleParticles) {
            const localTime = effectiveTime - burstStart - piece.delay;
            if (localTime <= 0) {
              piece.element.style.opacity = "0";
              continue;
            }

            const life = clamp01(localTime / piece.duration);
            const lift = easeOutQuad(life);
            const drop = Math.max(0, life - 0.48);
            let x = piece.baseX + (piece.drift * lift);
            let y = piece.baseY - (piece.rise * lift) + (piece.fall * drop * drop * 3.2);
            let rotate = piece.spin * life;

            if (piece.moonHit) {
              const impact = clamp01((life - piece.hitAt) / Math.max(0.001, 1 - piece.hitAt));
              if (impact > 0) {
                x += piece.hitDir * (22 * impact * piece.hitKick);
                y += 30 * impact * piece.hitKick;
                rotate += piece.hitDir * (170 * impact);
                moonKick += (1 - impact) * piece.hitKick * 1.05;
              }
            }

            const scale = piece.scale * (1 - (life * 0.22));
            const opacity = globalAlpha * (1 - (life * 0.62)) * piece.alpha;
            if (opacity <= 0.004) {
              piece.element.style.opacity = "0";
              continue;
            }

            piece.element.style.opacity = opacity.toFixed(3);
            piece.element.style.transform =
              `translate3d(${x.toFixed(2)}vw, ${y.toFixed(2)}vh, 0) rotate(${rotate.toFixed(2)}deg) scale(${scale.toFixed(3)})`;
          }

          const moonNudge = -Math.min(3.2, moonKick * 0.95);
          rootStyle.setProperty("--moon-hit-nudge", `${moonNudge.toFixed(2)}px`);
        }

        function updateBackdropVoid(effectiveTime) {
          const progress = clamp01((effectiveTime - BLACKOUT_START) / BLACKOUT_DURATION);
          rootStyle.setProperty("--void-progress", progress.toFixed(3));
        }

        function resetGoldenEffect() {
          rootStyle.setProperty("--beam-main-scale-x", "0.006");
          rootStyle.setProperty("--beam-core-scale-x", "0.004");
          rootStyle.setProperty("--golden-opacity", "0");
          rootStyle.setProperty("--golden-core-opacity", "0");
          rootStyle.setProperty("--golden-fill-opacity", "0");
          rootStyle.setProperty("--golden-blur", "58px");
          rootStyle.setProperty("--lyric-color", "#fff");
          rootStyle.setProperty("--night-haze", "0");
          rootStyle.setProperty("--star-intensity", "0.74");
          rootStyle.setProperty("--gold-stars-opacity", "0");
          rootStyle.setProperty("--moon-gold-progress", "0");
          rootStyle.setProperty("--safe-reflect", "0");
          rootStyle.setProperty("--moon-hit-nudge", "0px");
          rootStyle.setProperty("--shake-x", "0px");
          rootStyle.setProperty("--shake-y", "0px");
          hideDustParticles();
          hideRubbleParticles();
          hideFloatingTrees();
          hideSurgeDebris();
          hideGoldPetals();
          lastFxParticleUpdateMs = -Infinity;
          lastPetalUpdateMs = -Infinity;
        }

        function updateGoldenEffect(effectiveTime, activeIndex) {
          if (!Number.isFinite(effectiveTime)) {
            activeEffectWindowIndex = -1;
            resetGoldenEffect();
            return;
          }

          let nextWindowIndex = -1;
          for (let i = 0; i < effectWindows.length; i += 1) {
            const timings = effectWindows[i];
            const effectTailEnd = timings.fadeEnd + TREE_TAIL_DURATION;
            if (effectiveTime >= timings.start - 0.05 && effectiveTime <= effectTailEnd + 0.45) {
              nextWindowIndex = i;
              break;
            }
          }

          if (nextWindowIndex !== activeEffectWindowIndex) {
            activeEffectWindowIndex = nextWindowIndex;
          }

          if (activeEffectWindowIndex < 0) {
            resetGoldenEffect();
            return;
          }

          const timings = effectWindows[activeEffectWindowIndex];
          const { start, burst, fadeEnd } = timings;
          const shineSnapEnd = start + 0.42;
          const preSlowSpan = Math.max(0.001, burst - shineSnapEnd);
          const postSpan = Math.max(0.001, fadeEnd - burst);
          const snapProgress = clamp01((effectiveTime - start) / (shineSnapEnd - start));
          const slowProgress = clamp01((effectiveTime - shineSnapEnd) / preSlowSpan);
          const postProgress = clamp01((effectiveTime - burst) / postSpan);
          const verseProgress = getWindowVerseProgress(
            effectVerseStepTimes[activeEffectWindowIndex],
            start,
            fadeEnd,
            effectiveTime,
            activeIndex
          );
          const verseCurve = easeOutQuad(verseProgress);

          let mainScaleX = 0.006;
          let coreScaleX = 0.004;
          let opacity = 0;
          let coreOpacity = 0;
          let fillOpacity = 0;
          let blurPx = 58;
          let shakeStrength = 0;

          if (effectiveTime < shineSnapEnd) {
            const snap = easeOutQuad(snapProgress);
            mainScaleX = lerp(0.006, 0.92, snap);
            coreScaleX = lerp(0.004, 0.72, snap);
            opacity = lerp(0.03, 0.78, snap);
            coreOpacity = lerp(0.05, 0.82, snap);
            fillOpacity = lerp(0.03, 0.34, snap);
            blurPx = lerp(72, 34, snap);
            shakeStrength = lerp(1.2, 3.4, snap);
          } else if (effectiveTime < burst) {
            const slow = easeOutQuad(slowProgress);
            mainScaleX = lerp(0.92, 1.95, slow);
            coreScaleX = lerp(0.72, 1.62, slow);
            opacity = lerp(0.78, 0.88, slow);
            coreOpacity = lerp(0.82, 0.9, slow);
            fillOpacity = lerp(0.34, 0.68, slow);
            blurPx = lerp(34, 16, slow);
            shakeStrength = lerp(3.4, 5.6, slow);
          } else {
            const elapsedAfterBurst = Math.max(0, effectiveTime - burst);
            const popProgress = clamp01(elapsedAfterBurst / 0.58);
            const pop = 1 - easeOutQuad(popProgress);
            const fade = 1 - easeInCubic(postProgress);
            mainScaleX = (lerp(1.95, 1.52, postProgress) + (1.12 * pop)) * fade;
            coreScaleX = (lerp(1.62, 1.3, postProgress) + (0.9 * pop)) * fade;
            opacity = 0.9 * fade;
            coreOpacity = 0.92 * fade;
            fillOpacity = (0.68 + (0.14 * pop)) * fade;
            blurPx = lerp(18, 76, postProgress);
            shakeStrength = (6 + 8.4 * pop) * fade;
          }

          const verseOpacityBoost = 0.76 + (verseCurve * 0.4);
          const verseCoreBoost = 0.78 + (verseCurve * 0.42);
          const verseFillBoost = 0.72 + (verseCurve * 0.46);
          opacity *= verseOpacityBoost;
          coreOpacity *= verseCoreBoost;
          fillOpacity *= verseFillBoost;
          blurPx *= lerp(1.08, 0.84, verseCurve);
          shakeStrength *= 0.84 + (verseCurve * 0.28);

          const waveX = Math.sin(effectiveTime * 23.8) + Math.sin(effectiveTime * 16.9 + 1.2);
          const waveY = Math.cos(effectiveTime * 20.5 + 0.5) + Math.sin(effectiveTime * 15.4 + 2.4);
          const shakeX = waveX * 0.5 * shakeStrength;
          const shakeY = waveY * 0.5 * shakeStrength;

          const safeOpacity = clamp01(opacity);
          const safeCoreOpacity = clamp01(coreOpacity);
          const safeFillOpacity = clamp01(fillOpacity);
          const scenePower = clamp01((safeFillOpacity * 0.86) + (safeCoreOpacity * 0.3));
          const nightHaze = clamp01((scenePower * 0.8) + (safeFillOpacity * 0.18));
          const starIntensity = lerp(0.72, 0.95, scenePower);
          const secondBeamActive = activeEffectWindowIndex === SECOND_BEAM_INDEX;
          const breakIn = clamp01((effectiveTime - burst) / 0.36);
          const breakOut = 1 - clamp01((effectiveTime - (fadeEnd + 2.05)) / 1.95);
          const groundBreak = secondBeamActive ? (breakIn * breakOut) : 0;
          const safeReflect = clamp01((scenePower * 0.34) + (safeFillOpacity * 0.22));

          let lyricColor = "#fff";
          if (safeFillOpacity > 0.45) {
            lyricColor = "#050505";
          } else if (safeFillOpacity > 0.2) {
            lyricColor = "#181818";
          }

          rootStyle.setProperty("--beam-main-scale-x", mainScaleX.toFixed(3));
          rootStyle.setProperty("--beam-core-scale-x", coreScaleX.toFixed(3));
          rootStyle.setProperty("--golden-opacity", safeOpacity.toFixed(3));
          rootStyle.setProperty("--golden-core-opacity", safeCoreOpacity.toFixed(3));
          rootStyle.setProperty("--golden-fill-opacity", safeFillOpacity.toFixed(3));
          rootStyle.setProperty("--golden-blur", `${blurPx.toFixed(1)}px`);
          rootStyle.setProperty("--lyric-color", lyricColor);
          rootStyle.setProperty("--night-haze", nightHaze.toFixed(3));
          rootStyle.setProperty("--star-intensity", starIntensity.toFixed(3));
          rootStyle.setProperty("--safe-reflect", safeReflect.toFixed(3));
          rootStyle.setProperty("--shake-x", `${shakeX.toFixed(2)}px`);
          rootStyle.setProperty("--shake-y", `${shakeY.toFixed(2)}px`);

          const nowMs = performance.now();
          if ((nowMs - lastFxParticleUpdateMs) >= FX_PARTICLE_UPDATE_INTERVAL_MS) {
            lastFxParticleUpdateMs = nowMs;
            updateDustParticles(effectiveTime, scenePower, timings);
            updateRubbleParticles(effectiveTime, timings, activeEffectWindowIndex, scenePower, groundBreak);
            updateFloatingTrees(effectiveTime, timings, scenePower);
            updateSurgeDebris(effectiveTime, timings, activeEffectWindowIndex, scenePower, safeFillOpacity);
          }
        }

        function getEffectiveTime() {
          return audio.currentTime + (debugOffsetMs / 1000);
        }

        function clampTime(timeSeconds) {
          if (!Number.isFinite(timeSeconds)) {
            return 0;
          }
          if (Number.isFinite(audio.duration)) {
            return Math.min(audio.duration, Math.max(0, timeSeconds));
          }
          return Math.max(0, timeSeconds);
        }

        function findSegmentIndex(currentTime) {
          let low = 0;
          let high = lyricSegments.length - 1;
          let result = -1;

          while (low <= high) {
            const mid = Math.floor((low + high) / 2);
            if (lyricSegments[mid].time <= currentTime) {
              result = mid;
              low = mid + 1;
            } else {
              high = mid - 1;
            }
          }

          return result;
        }

        function renderSegment(index, force = false) {
          if (!force && index === activeSegmentIndex) {
            return;
          }

          activeSegmentIndex = index;

          if (index < 0 || index >= lyricSegments.length) {
            lyricEl.textContent = "";
            lyricEl.classList.add("is-empty");
            return;
          }

          const text = lyricSegments[index].text;
          if (isDotsOnly(text)) {
            lyricEl.textContent = "";
            lyricEl.classList.add("is-empty");
            return;
          }

          lyricEl.textContent = text;
          lyricEl.classList.remove("is-empty");
        }

        function updateDebugInfo(activeIndex, effectiveTime) {
          if (clockAudioEl) {
            clockAudioEl.textContent = formatTime(audio.currentTime);
          }
          if (clockSyncEl) {
            clockSyncEl.textContent = formatTime(effectiveTime);
          }

          if (debugCurrentEl) {
            if (activeIndex >= 0 && activeIndex < lyricSegments.length) {
              const current = lyricSegments[activeIndex];
              debugCurrentEl.textContent = `Linea actual: ${formatLrcTag(current.time)} ${current.text}`;
            } else {
              debugCurrentEl.textContent = "Linea actual: -";
            }
          }

          if (debugNextEl) {
            const nextIndex = activeIndex + 1;
            if (nextIndex >= 0 && nextIndex < lyricSegments.length) {
              const next = lyricSegments[nextIndex];
              debugNextEl.textContent = `Siguiente: ${formatLrcTag(next.time)} ${next.text}`;
            } else {
              debugNextEl.textContent = "Siguiente: -";
            }
          }
        }

        function updateLyrics(force = false) {
          const effectiveTime = getEffectiveTime();
          updateIntroReveal(effectiveTime);
          const nextIndex = findSegmentIndex(effectiveTime);
          renderSegment(nextIndex, force);
          updateDebugInfo(nextIndex, effectiveTime);
          updateBackdropVoid(effectiveTime);
          updateGoldenEffect(effectiveTime, nextIndex);
          updateGroundSmoke(effectiveTime);
          const voidProgress = clamp01((effectiveTime - BLACKOUT_START) / BLACKOUT_DURATION);
          const petalScenePower = 0.62 * (1 - (voidProgress * 0.5));
          const petalFill = 0.45 * (1 - (voidProgress * 0.6));
          const nowMs = performance.now();
          if ((nowMs - lastPetalUpdateMs) >= PETAL_UPDATE_INTERVAL_MS) {
            lastPetalUpdateMs = nowMs;
            updateGoldPetals(effectiveTime, petalScenePower, petalFill);
          }
          updateLoveSkyEffect(effectiveTime, nextIndex);
        }

        function stopSyncLoop() {
          if (rafId !== null) {
            cancelAnimationFrame(rafId);
            rafId = null;
          }
        }

        function syncLoop() {
          updateLyrics();
          rafId = requestAnimationFrame(syncLoop);
        }

        function startSyncLoop() {
          if (rafId === null) {
            rafId = requestAnimationFrame(syncLoop);
          }
        }

        function setDebugEnabled(enabled) {
          for (const control of debugControls) {
            control.disabled = !enabled;
          }
        }

        function refreshPlayPauseLabel() {
          if (playPauseBtn) {
            playPauseBtn.textContent = audio.paused ? "Play" : "Pause";
          }
        }

        async function startSequenceFromBeginning() {
          if (!isReady) {
            return false;
          }

          stopSyncLoop();
          activeEffectWindowIndex = -1;
          audio.currentTime = 0;
          activeSegmentIndex = -1;
          lastFxParticleUpdateMs = -Infinity;
          lastPetalUpdateMs = -Infinity;
          updateLyrics(true);

          try {
            await audio.play();
            setStatus("");
            hasSequenceStarted = true;
            updateStartButton();
            return true;
          } catch (error) {
            setStatus("No se pudo iniciar la secuencia.", true);
            console.error(error);
            return false;
          }
        }

        async function togglePlayback() {
          if (!isReady) {
            return;
          }

          try {
            if (audio.paused) {
              await audio.play();
            } else {
              audio.pause();
            }
          } catch (error) {
            setStatus("No se pudo cambiar play/pause.", true);
            console.error(error);
          }
        }

        function seekRelative(deltaSeconds) {
          if (!isReady) {
            return;
          }
          audio.currentTime = clampTime(audio.currentTime + deltaSeconds);
          updateLyrics(true);
        }

        function restartAtZero() {
          if (!isReady) {
            return;
          }
          activeEffectWindowIndex = -1;
          audio.currentTime = 0;
          activeSegmentIndex = -1;
          lastFxParticleUpdateMs = -Infinity;
          lastPetalUpdateMs = -Infinity;
          updateLyrics(true);
        }

        function applyPlaybackRateFromSelect() {
          if (!speedSelect) {
            audio.playbackRate = 1;
            return;
          }
          const speed = Number(speedSelect.value);
          if (!Number.isFinite(speed) || speed <= 0) {
            return;
          }
          audio.playbackRate = speed;
          updateLyrics(true);
        }

        function applyOffsetFromInput() {
          if (!offsetInput) {
            debugOffsetMs = 0;
            return;
          }
          const offset = Number(offsetInput.value);
          debugOffsetMs = Number.isFinite(offset) ? offset : 0;
          updateLyrics(true);
        }

        async function loadResources() {
          audio.src = encodeURI(AUDIO_PATH);

          const metadataPromise = new Promise((resolve, reject) => {
            if (audio.readyState >= 1 && Number.isFinite(audio.duration)) {
              resolve();
              return;
            }
            audio.addEventListener("loadedmetadata", resolve, { once: true });
            audio.addEventListener("error", () => reject(new Error("No se pudo cargar el audio.")), { once: true });
          });

          try {
            const lrcResponse = await fetch(encodeURI(LRC_PATH), { cache: "no-store" });
            if (!lrcResponse.ok) {
              throw new Error(`No se pudo leer ${LRC_PATH}`);
            }

            const rawLrc = await lrcResponse.text();
            await metadataPromise;
            lyricSegments = parseLrc(rawLrc);
            firstLyricStartTime = lyricSegments.length
              ? Math.max(2.5, lyricSegments[0].time)
              : 17.66;
            effectWindows = buildEffectWindows(lyricSegments);
            loveSkyWindows = buildLoveSkyWindows(lyricSegments);
            effectVerseStepTimes = buildWindowStepTimes(lyricSegments, effectWindows, "fadeEnd");
            loveSkyStepTimes = buildWindowStepTimes(lyricSegments, loveSkyWindows, "end");
            petalWindow = buildPetalWindow(lyricSegments);
            groundSmokeWindows = buildGroundSmokeWindows(lyricSegments);
            activeEffectWindowIndex = -1;
            lastFxParticleUpdateMs = -Infinity;
            lastPetalUpdateMs = -Infinity;

            if (!lyricSegments.length) {
              throw new Error("El archivo LRC no tiene timestamps validos.");
            }

            isReady = true;
            hasSequenceStarted = false;
            setDebugEnabled(true);
            applyPlaybackRateFromSelect();
            applyOffsetFromInput();
            updateStartButton();
            setStatus(`${lyricSegments.length} lineas cargadas.`);
            updateLyrics(true);
          } catch (error) {
            lyricEl.textContent = "Error";
            lyricEl.classList.remove("is-empty");
            setDebugEnabled(false);
            hasSequenceStarted = false;
            updateStartButton();
            setStatus("No se pudo cargar LRC/audio. Usa servidor local.", true);
            console.error(error);
          }
        }

        if (playPauseBtn) {
          playPauseBtn.addEventListener("click", async () => {
            await togglePlayback();
          });
        }

        if (restartBtn) {
          restartBtn.addEventListener("click", () => {
            restartAtZero();
          });
        }

        if (backBtn) {
          backBtn.addEventListener("click", () => {
            seekRelative(-SEEK_STEP_SECONDS);
          });
        }

        if (forwardBtn) {
          forwardBtn.addEventListener("click", () => {
            seekRelative(SEEK_STEP_SECONDS);
          });
        }

        if (speedSelect) {
          speedSelect.addEventListener("change", () => {
            applyPlaybackRateFromSelect();
          });
        }

        if (offsetInput) {
          offsetInput.addEventListener("input", () => {
            applyOffsetFromInput();
          });
        }

        if (startSequenceBtn) {
          startSequenceBtn.addEventListener("click", async () => {
            await startSequenceFromBeginning();
          });
        }

        audio.addEventListener("play", () => {
          startSyncLoop();
          refreshPlayPauseLabel();
        });

        audio.addEventListener("pause", () => {
          stopSyncLoop();
          refreshPlayPauseLabel();
          updateLyrics(true);
        });

        audio.addEventListener("ended", () => {
          stopSyncLoop();
          refreshPlayPauseLabel();
          updateLyrics(true);
          setStatus("");
        });

        audio.addEventListener("seeked", () => {
          activeEffectWindowIndex = -1;
          lastFxParticleUpdateMs = -Infinity;
          lastPetalUpdateMs = -Infinity;
          updateLyrics(true);
        });

        audio.addEventListener("loadedmetadata", () => {
          updateLyrics(true);
        });

        audio.playbackRate = 1;
        audio.volume = 1;
        setupDustParticles();
        setupRubbleParticles();
        setupFloatingTrees();
        setupSurgeDebris();
        setupGoldPetals();
        setupGroundSmokeParticles();
        setDebugEnabled(false);
        refreshPlayPauseLabel();
        updateStartButton();
        resetGoldenEffect();
        updateLyrics(true);
        loadResources();
      })();
    </script>
  </body>
</html>
