<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ferxxo 100 - Feid</title>
    <link rel="icon" href="media/audio-cover.jpg" type="image/jpeg">
    <link rel="apple-touch-icon" href="media/audio-cover.jpg">
    <style>
      :root {
        color-scheme: dark;
        --ink: #fffdf7;
        --muted: #9298aa;
        --outline: #090b10;
        --button-border: #383d49;
        --button-bg: rgba(10, 12, 18, 0.94);
        --aside-ink: #8dff65;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        background: #000;
        color: var(--ink);
        font-family: "Arial Black", "Impact", sans-serif;
      }

      .scene-frame {
        position: fixed;
        inset: 0;
        z-index: 0;
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
        opacity: 1;
        pointer-events: none;
        background: #000;
        will-change: opacity;
      }

      .stage {
        position: fixed;
        inset: 0;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end;
        gap: 1.1rem;
        padding:
          clamp(1rem, 3vw, 2rem)
          clamp(1rem, 4vw, 2.2rem)
          max(clamp(2.75rem, 8vw, 5rem), calc(env(safe-area-inset-bottom, 0px) + 2.75rem));
        text-align: center;
        pointer-events: none;
      }

      .stage::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(180deg, rgba(2, 5, 10, 0.24) 0%, rgba(2, 5, 10, 0.02) 30%, rgba(2, 5, 10, 0) 52%, rgba(2, 5, 10, 0.34) 72%, rgba(2, 5, 10, 0.86) 100%);
        pointer-events: none;
      }

      .button-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.8rem;
        width: min(92vw, 980px);
        position: relative;
        z-index: 1;
        pointer-events: auto;
      }

      .start-btn {
        font: inherit;
        font-size: 0.95rem;
        border: 1px solid var(--button-border);
        background: var(--button-bg);
        color: #fff;
        padding: 10px 18px;
        border-radius: 999px;
        backdrop-filter: blur(10px);
        touch-action: manipulation;
        cursor: pointer;
      }

      .start-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .button-status {
        margin: 0;
        min-height: 1rem;
        max-width: min(92vw, 980px);
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        font-size: 0.9rem;
        color: var(--muted);
        text-shadow: 0 0 12px rgba(0, 0, 0, 0.72);
        position: relative;
        z-index: 1;
      }

      .lyric {
        margin: 0;
        margin-inline: auto;
        min-height: 1.1em;
        width: min(72vw, 820px);
        max-width: min(72vw, 820px);
        font-family: "Impact", "Arial Black", sans-serif;
        font-size: clamp(1.55rem, 4.2vw, 3.1rem);
        font-weight: 900;
        line-height: 0.96;
        letter-spacing: 0.02em;
        color: var(--ink);
        text-align: center;
        text-wrap: balance;
        word-break: normal;
        -webkit-text-stroke: 1.8px var(--outline);
        paint-order: stroke fill;
        text-shadow: none;
        position: relative;
        z-index: 1;
      }

      .lyric-stack {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: min(92vw, 980px);
        text-align: center;
        position: relative;
        z-index: 1;
      }

      .aside-lyric {
        margin: 0;
        margin-top: 0.3rem;
        margin-inline: auto;
        width: min(68vw, 720px);
        max-width: min(68vw, 720px);
        min-height: 1.2em;
        font-family: "Trebuchet MS", "Segoe UI", "Arial Narrow", sans-serif;
        font-size: clamp(0.95rem, 2vw, 1.42rem);
        font-weight: 700;
        line-height: 1.08;
        letter-spacing: 0.03em;
        text-align: center;
        color: #7eff4c;
        text-shadow: none;
        opacity: 1;
        transition: opacity 160ms ease;
        z-index: 1;
        pointer-events: none;
      }

      .lyric.is-empty {
        opacity: 0;
        min-height: 0;
      }

      .aside-lyric.is-empty {
        opacity: 0;
      }

      .lyric.is-empty + .aside-lyric {
        margin-top: 0;
      }

      .sequence-started .button-container,
      .sequence-started #status {
        display: none !important;
      }

      audio {
        display: none;
      }

      @media (max-width: 720px) {
        .stage {
          align-items: center;
          justify-content: flex-end;
          padding:
            clamp(1rem, 5vw, 1.4rem)
            clamp(0.55rem, 3vw, 1rem)
            max(clamp(4.8rem, 18vw, 7rem), calc(env(safe-area-inset-bottom, 0px) + 4.8rem));
        }

        .lyric {
          width: 100%;
          max-width: none;
          padding-inline: 0.45rem;
          align-self: center;
          font-size: clamp(0.78rem, 3.6vw, 1.1rem);
          line-height: 1.02;
          letter-spacing: 0.01em;
          text-wrap: pretty;
          overflow-wrap: break-word;
        }

        .lyric-stack {
          width: min(100%, 24rem);
          max-width: 100%;
          align-self: center;
        }

        .aside-lyric {
          width: 100%;
          max-width: none;
          padding-inline: 0.65rem;
          font-size: clamp(0.75rem, 3.7vw, 1rem);
          line-height: 1.08;
          letter-spacing: 0.02em;
        }

        .button-status,
        .button-container {
          max-width: min(88vw, 28rem);
          align-self: center;
        }
      }
    </style>
  </head>
  <body>
    <iframe
      id="scene-frame"
      class="scene-frame"
      src="scenes/rooftop.html?embedded=1"
      title="Escenario azotea"
      aria-hidden="true"
    ></iframe>

    <main class="stage">
      <div class="button-container">
        <button id="start-btn" class="start-btn" disabled>Comenzar secuencia</button>
      </div>
      <div class="lyric-stack">
        <p id="lyric" class="lyric is-empty"></p>
        <p id="aside-lyric" class="aside-lyric is-empty"></p>
      </div>
      <p id="status" class="button-status">Cargando timestamps...</p>
      <audio id="audio" preload="auto" src="media/audio.mp3">
        Tu navegador no soporta audio HTML5.
      </audio>
    </main>

    <script>
      const LRC_PATH = "media/lyrics.lrc";
      const EFFECTS_PATH = "media/effects.lrc";
      const DEFAULT_SCENE_DURATION = 163.59;
      const SCENE_CONFIG_MESSAGE_TYPE = "scene:set-config";

      const audio = document.getElementById("audio");
      const sceneFrame = document.getElementById("scene-frame");
      const startBtn = document.getElementById("start-btn");
      const lyricEl = document.getElementById("lyric");
      const asideLyricEl = document.getElementById("aside-lyric");
      const statusText = document.getElementById("status");
      const queryParams = new URLSearchParams(window.location.search);
      const previewMode = queryParams.has("previewTime");
      const parsedPreviewTime = Number(queryParams.get("previewTime"));
      const previewTime = Number.isFinite(parsedPreviewTime) ? Math.max(0, parsedPreviewTime) : 12.2;

      let lyricWords = [];
      let effectCues = [];
      let lyricsLoaded = false;
      let effectsLoaded = false;
      let activeWordIndex = -1;
      let rafId = null;
      let sequenceLockedAfterEnding = false;
      let sequenceStarted = false;
      let sceneConfigSent = false;
      let lastSentSceneTime = Number.NaN;
      let sceneDuration = DEFAULT_SCENE_DURATION;
      let finalBlackoutWindow = { start: null, fullAt: null };

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function saturate(value) {
        return clamp(value, 0, 1);
      }

      function smoothstep(value) {
        const x = saturate(value);
        return x * x * (3 - 2 * x);
      }

      function parseTimestamp(min, sec, msRaw) {
        const ms = Number((msRaw || "0").padEnd(3, "0"));
        return Number(min) * 60 + Number(sec) + ms / 1000;
      }

      function cleanWord(text) {
        return String(text || "").replace(/\s+/g, " ").trim();
      }

      function parseLrc(rawText) {
        const cleaned = rawText
          .replace(/\r/g, "")
          .replace(/\\\[/g, "[")
          .replace(/\\\]/g, "]")
          .replace(/\u00a0/g, " ");

        const tokenPattern = /\[(\d{2}):(\d{2})(?:\.(\d{1,3}))?\]([^\[]*)/g;
        const words = [];
        let match = tokenPattern.exec(cleaned);

        while (match) {
          const text = cleanWord(match[4]);
          if (text) {
            words.push({
              time: parseTimestamp(match[1], match[2], match[3]),
              text
            });
          }
          match = tokenPattern.exec(cleaned);
        }

        return words.sort((a, b) => a.time - b.time);
      }

      function getLastTimestamp(entries) {
        return entries.length ? entries[entries.length - 1].time : 0;
      }

      function parseEffectCode(text) {
        const match = /\(([A-Z]+)\)/i.exec(String(text || ""));
        return match ? match[1].toUpperCase() : "";
      }

      function isTripleDotLyric(text) {
        return typeof text === "string" && text.replace(/\s+/g, "") === "...";
      }

      function buildLyricTimeline(entries) {
        return entries.map((entry) => {
          const value = cleanWord(entry.text);
          const asideStart = value.indexOf(" (");
          const hasInlineAside = asideStart !== -1;
          let mainText = "";
          let asideText = "";
          let asidePlacement = "none";

          if (value) {
            if (hasInlineAside) {
              mainText = cleanWord(value.slice(0, asideStart));
              asideText = cleanWord(value.slice(asideStart + 1));
              asidePlacement = "below";
            } else if (value.startsWith("(")) {
              asideText = value;
              asidePlacement = "below";
            } else {
              mainText = value;
            }
          }

          return {
            ...entry,
            mainText,
            asideText,
            asidePlacement
          };
        });
      }

      function extractFinalBlackoutWindow(entries) {
        let start = null;
        let fullAt = null;

        entries.forEach((entry) => {
          const code = parseEffectCode(entry.text);
          if (code === "IBOF") {
            start = entry.time;
          } else if (code === "FBOF") {
            fullAt = entry.time;
          }
        });

        return { start, fullAt };
      }

      function getFinalBlackoutMix(currentTime) {
        const { start, fullAt } = finalBlackoutWindow;
        if (!Number.isFinite(start)) {
          return 0;
        }

        if (currentTime <= start) {
          return 0;
        }

        if (!Number.isFinite(fullAt) || fullAt <= start) {
          return 1;
        }

        return smoothstep((currentTime - start) / (fullAt - start));
      }

      function applyLyricFade(currentTime) {
        const lyricOpacity = (1 - getFinalBlackoutMix(currentTime)).toFixed(3);
        lyricEl.style.opacity = lyricEl.classList.contains("is-empty") ? "0" : lyricOpacity;
        asideLyricEl.style.opacity = asideLyricEl.classList.contains("is-empty") ? "0" : lyricOpacity;
      }

      function setStatus(message, isError = false) {
        statusText.textContent = message;
        statusText.style.color = isError ? "#ff7c7c" : "#9298aa";
        statusText.style.opacity = message ? "1" : "0";
      }

      function updateReadyState() {
        if (sequenceLockedAfterEnding) {
          startBtn.hidden = true;
          startBtn.disabled = true;
          setStatus("Secuencia finalizada.");
          return;
        }

        if (lyricsLoaded && effectsLoaded) {
          startBtn.disabled = false;
          setStatus(`Listo. ${lyricWords.length} lineas y ${effectCues.length} cues cargados.`);
          return;
        }

        startBtn.disabled = true;
        setStatus("Cargando timestamps...");
      }

      function findWordIndex(currentTime) {
        let low = 0;
        let high = lyricWords.length - 1;
        let result = -1;

        while (low <= high) {
          const mid = Math.floor((low + high) / 2);
          if (lyricWords[mid].time <= currentTime) {
            result = mid;
            low = mid + 1;
          } else {
            high = mid - 1;
          }
        }

        return result;
      }

      function updateLyrics(currentTime, force = false) {
        if (!lyricWords.length) {
          return;
        }

        const nextIndex = findWordIndex(currentTime);
        if (!force && nextIndex === activeWordIndex) {
          return;
        }

        activeWordIndex = nextIndex;
        if (nextIndex < 0) {
          lyricEl.textContent = "";
          lyricEl.classList.add("is-empty");
          asideLyricEl.textContent = "";
          asideLyricEl.classList.add("is-empty");
          applyLyricFade(currentTime);
          return;
        }

        const { mainText, asideText } = lyricWords[nextIndex];
        const visibleMain = isTripleDotLyric(mainText) ? "" : mainText;
        const visibleAside = isTripleDotLyric(asideText) ? "" : asideText;

        lyricEl.textContent = visibleMain;
        lyricEl.classList.toggle("is-empty", !visibleMain);
        asideLyricEl.textContent = visibleAside;
        asideLyricEl.classList.toggle("is-empty", !visibleAside);
        applyLyricFade(currentTime);
      }

      function resetLyrics() {
        activeWordIndex = -1;
        lyricEl.textContent = "";
        lyricEl.classList.add("is-empty");
        lyricEl.style.opacity = "0";
        asideLyricEl.textContent = "";
        asideLyricEl.classList.add("is-empty");
        asideLyricEl.style.opacity = "0";
      }

      function getTimelineTime() {
        return previewMode ? previewTime : audio.currentTime;
      }

      function getSceneDuration() {
        const audioDuration = Number.isFinite(audio.duration) && audio.duration > 0 ? audio.duration : 0;
        return Math.max(sceneDuration, previewTime, audioDuration, 1);
      }

      function postSceneConfig(force = false) {
        if (!sceneFrame.contentWindow || !effectsLoaded) {
          return;
        }

        if (!force && sceneConfigSent) {
          return;
        }

        sceneConfigSent = true;
        sceneFrame.contentWindow.postMessage({
          type: SCENE_CONFIG_MESSAGE_TYPE,
          effects: effectCues
        }, "*");
      }

      function postSceneTime(currentTime, force = false) {
        if (!sceneFrame.contentWindow) {
          return;
        }

        if (!force && Number.isFinite(lastSentSceneTime) && Math.abs(lastSentSceneTime - currentTime) < 0.025) {
          return;
        }

        lastSentSceneTime = currentTime;
        sceneFrame.contentWindow.postMessage({
          type: "scene:set-time",
          currentTime,
          duration: getSceneDuration(),
          started: previewMode || sequenceStarted
        }, "*");
      }

      function stopSyncLoop() {
        if (rafId !== null) {
          cancelAnimationFrame(rafId);
          rafId = null;
        }
      }

      function syncLoop() {
        const currentTime = getTimelineTime();
        updateLyrics(currentTime);
        applyLyricFade(currentTime);
        postSceneTime(currentTime);
        rafId = requestAnimationFrame(syncLoop);
      }

      function startSyncLoop() {
        if (rafId === null) {
          rafId = requestAnimationFrame(syncLoop);
        }
      }

      async function startSequenceFromBeginning() {
        if (!lyricWords.length || sequenceLockedAfterEnding) {
          return;
        }

        sequenceLockedAfterEnding = false;
        sequenceStarted = true;
        resetLyrics();
        audio.currentTime = 0;
        updateLyrics(0, true);
        postSceneTime(0, true);

        try {
          await audio.play();
          startBtn.hidden = true;
          setStatus("");
          document.body.classList.add("sequence-started");
        } catch (error) {
          sequenceStarted = false;
          setStatus("No se pudo iniciar. Presiona de nuevo.", true);
          console.error(error);
        }
      }

      async function loadLyrics() {
        try {
          const [lyricsResponse, effectsResponse] = await Promise.all([
            fetch(encodeURI(LRC_PATH)),
            fetch(encodeURI(EFFECTS_PATH))
          ]);

          if (!lyricsResponse.ok) {
            throw new Error(`No se pudo cargar ${LRC_PATH}`);
          }

          if (!effectsResponse.ok) {
            throw new Error(`No se pudo cargar ${EFFECTS_PATH}`);
          }

          lyricWords = buildLyricTimeline(parseLrc(await lyricsResponse.text()));
          effectCues = parseLrc(await effectsResponse.text());

          if (!lyricWords.length) {
            throw new Error("El archivo LRC no tiene timestamps validos.");
          }

          if (!effectCues.length) {
            throw new Error("El archivo de efectos no tiene timestamps validos.");
          }

          lyricsLoaded = true;
          effectsLoaded = true;
          finalBlackoutWindow = extractFinalBlackoutWindow(effectCues);
          sceneDuration = Math.max(getLastTimestamp(lyricWords), getLastTimestamp(effectCues));
          updateReadyState();
          postSceneConfig(true);

          if (previewMode) {
            sequenceStarted = true;
            startBtn.hidden = true;
            setStatus("");
            document.body.classList.add("sequence-started");
            updateLyrics(previewTime, true);
            postSceneTime(previewTime, true);
          } else {
            postSceneTime(0, true);
          }
        } catch (error) {
          lyricsLoaded = false;
          effectsLoaded = false;
          startBtn.disabled = true;
          lyricEl.textContent = "Error";
          lyricEl.classList.remove("is-empty");
          asideLyricEl.textContent = "";
          asideLyricEl.classList.add("is-empty");
          setStatus("No se pudo cargar el LRC. Usa un servidor local.", true);
          console.error(error);
        }
      }

      sceneFrame.addEventListener("load", () => {
        sceneConfigSent = false;
        postSceneConfig(true);
        postSceneTime(getTimelineTime(), true);
      });

      startBtn.addEventListener("click", async () => {
        await startSequenceFromBeginning();
      });

      audio.addEventListener("play", () => {
        startSyncLoop();
      });

      audio.addEventListener("pause", () => {
        stopSyncLoop();
      });

      audio.addEventListener("seeked", () => {
        const currentTime = audio.currentTime;
        updateLyrics(currentTime, true);
        postSceneTime(currentTime, true);
      });

      audio.addEventListener("loadedmetadata", () => {
        if (Number.isFinite(audio.duration) && audio.duration > 0) {
          sceneDuration = Math.max(sceneDuration, audio.duration);
          postSceneTime(getTimelineTime(), true);
        }
      });

      audio.addEventListener("ended", () => {
        stopSyncLoop();
        resetLyrics();
        sequenceLockedAfterEnding = true;
        sequenceStarted = true;
        startBtn.hidden = true;
        startBtn.disabled = true;
        document.body.classList.add("sequence-started");
        postSceneTime(getSceneDuration(), true);
        updateReadyState();
      });

      updateReadyState();
      loadLyrics();
    </script>
  </body>
</html>
