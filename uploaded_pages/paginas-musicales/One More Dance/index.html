<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/jpeg" href="media/favicon.jpg">
    <title>One More Dance - d4vd</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        background: #000;
        color: #f4f4f4;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        --speed-decel-mult: 1;
      }

      .intro-blackout {
        position: fixed;
        inset: 0;
        z-index: 1;
        background: #000;
        opacity: 1;
        pointer-events: none;
        transition: opacity 900ms ease;
      }

      .intro-blackout.is-hidden {
        opacity: 0;
      }

      body:not(.scene-running) .scene,
      body:not(.scene-running) .scene *,
      body:not(.scene-running) .scene *::before,
      body:not(.scene-running) .scene *::after {
        animation-play-state: paused !important;
      }

      body.scene-fadeout .scene {
        opacity: 0;
      }

      .scene {
        position: fixed;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
        z-index: 0;
        opacity: 1;
        transition: opacity 1800ms ease;
        --road-height: 15.5vh;
        background:
          radial-gradient(
            ellipse at 50% 122%,
            rgba(28, 45, 78, 0.4) 0%,
            rgba(5, 9, 18, 0) 62%
          ),
          linear-gradient(
            180deg,
            #010206 0%,
            #071127 48%,
            #03060e 74%,
            #000 100%
          );
      }

      .stars {
        position: absolute;
        inset: -15%;
        opacity: 0.8;
        pointer-events: none;
        overflow: hidden;
        background:
          radial-gradient(circle at 6% 12%, rgba(255, 255, 255, 0.78) 0.08vmin, transparent 0.22vmin),
          radial-gradient(circle at 13% 28%, rgba(255, 255, 255, 0.7) 0.07vmin, transparent 0.2vmin),
          radial-gradient(circle at 23% 8%, rgba(255, 255, 255, 0.72) 0.07vmin, transparent 0.18vmin),
          radial-gradient(circle at 32% 22%, rgba(255, 255, 255, 0.7) 0.07vmin, transparent 0.18vmin),
          radial-gradient(circle at 44% 15%, rgba(255, 255, 255, 0.76) 0.08vmin, transparent 0.22vmin),
          radial-gradient(circle at 58% 9%, rgba(255, 255, 255, 0.74) 0.08vmin, transparent 0.2vmin),
          radial-gradient(circle at 69% 18%, rgba(255, 255, 255, 0.72) 0.07vmin, transparent 0.2vmin),
          radial-gradient(circle at 80% 11%, rgba(255, 255, 255, 0.78) 0.08vmin, transparent 0.22vmin),
          radial-gradient(circle at 92% 20%, rgba(255, 255, 255, 0.66) 0.06vmin, transparent 0.18vmin),
          radial-gradient(circle at 15% 42%, rgba(255, 255, 255, 0.64) 0.06vmin, transparent 0.16vmin),
          radial-gradient(circle at 36% 36%, rgba(255, 255, 255, 0.62) 0.06vmin, transparent 0.16vmin),
          radial-gradient(circle at 55% 30%, rgba(255, 255, 255, 0.68) 0.07vmin, transparent 0.17vmin),
          radial-gradient(circle at 74% 38%, rgba(255, 255, 255, 0.64) 0.06vmin, transparent 0.16vmin),
          radial-gradient(circle at 88% 32%, rgba(255, 255, 255, 0.62) 0.06vmin, transparent 0.16vmin);
        animation: stars-drift 90s linear infinite;
        transition:
          opacity 120ms linear,
          filter 120ms linear;
      }

      .stars::before,
      .stars::after {
        content: "";
        position: absolute;
        inset: -4%;
        opacity: 0;
        pointer-events: none;
        mix-blend-mode: screen;
        animation-play-state: paused;
      }

      .stars::before {
        background:
          radial-gradient(circle at 8% 16%, rgba(247, 252, 255, 0.98) 0 0.13vmin, transparent 0.28vmin),
          radial-gradient(circle at 19% 12%, rgba(234, 244, 255, 0.92) 0 0.11vmin, transparent 0.26vmin),
          radial-gradient(circle at 27% 20%, rgba(251, 253, 255, 0.98) 0 0.14vmin, transparent 0.3vmin),
          radial-gradient(circle at 36% 14%, rgba(236, 246, 255, 0.9) 0 0.12vmin, transparent 0.27vmin),
          radial-gradient(circle at 45% 24%, rgba(248, 252, 255, 0.96) 0 0.13vmin, transparent 0.29vmin),
          radial-gradient(circle at 54% 16%, rgba(229, 241, 255, 0.88) 0 0.11vmin, transparent 0.26vmin),
          radial-gradient(circle at 63% 22%, rgba(247, 252, 255, 0.96) 0 0.13vmin, transparent 0.28vmin),
          radial-gradient(circle at 72% 15%, rgba(235, 246, 255, 0.9) 0 0.12vmin, transparent 0.27vmin),
          radial-gradient(circle at 81% 23%, rgba(250, 253, 255, 0.98) 0 0.14vmin, transparent 0.3vmin),
          radial-gradient(circle at 91% 18%, rgba(228, 241, 255, 0.86) 0 0.11vmin, transparent 0.26vmin),
          radial-gradient(circle at 14% 36%, rgba(244, 250, 255, 0.9) 0 0.12vmin, transparent 0.27vmin),
          radial-gradient(circle at 32% 40%, rgba(232, 243, 255, 0.84) 0 0.1vmin, transparent 0.24vmin),
          radial-gradient(circle at 49% 35%, rgba(248, 252, 255, 0.92) 0 0.12vmin, transparent 0.27vmin),
          radial-gradient(circle at 68% 42%, rgba(233, 244, 255, 0.86) 0 0.1vmin, transparent 0.24vmin),
          radial-gradient(circle at 84% 38%, rgba(247, 252, 255, 0.92) 0 0.12vmin, transparent 0.27vmin);
        animation: star-twinkle-a 1.05s ease-in-out infinite;
      }

      .stars::after {
        background:
          radial-gradient(circle at 5% 10%, rgba(214, 236, 255, 0.88) 0 0.1vmin, transparent 0.24vmin),
          radial-gradient(circle at 16% 26%, rgba(242, 249, 255, 0.92) 0 0.11vmin, transparent 0.25vmin),
          radial-gradient(circle at 25% 9%, rgba(217, 237, 255, 0.86) 0 0.1vmin, transparent 0.24vmin),
          radial-gradient(circle at 38% 26%, rgba(244, 251, 255, 0.94) 0 0.11vmin, transparent 0.25vmin),
          radial-gradient(circle at 51% 12%, rgba(221, 239, 255, 0.88) 0 0.1vmin, transparent 0.24vmin),
          radial-gradient(circle at 62% 28%, rgba(241, 249, 255, 0.92) 0 0.11vmin, transparent 0.25vmin),
          radial-gradient(circle at 74% 10%, rgba(220, 238, 255, 0.86) 0 0.1vmin, transparent 0.24vmin),
          radial-gradient(circle at 85% 26%, rgba(243, 250, 255, 0.92) 0 0.11vmin, transparent 0.25vmin),
          radial-gradient(circle at 94% 12%, rgba(216, 236, 255, 0.84) 0 0.1vmin, transparent 0.24vmin),
          radial-gradient(circle at 20% 44%, rgba(237, 247, 255, 0.86) 0 0.1vmin, transparent 0.24vmin),
          radial-gradient(circle at 41% 49%, rgba(214, 236, 255, 0.82) 0 0.09vmin, transparent 0.22vmin),
          radial-gradient(circle at 58% 45%, rgba(239, 248, 255, 0.88) 0 0.1vmin, transparent 0.24vmin),
          radial-gradient(circle at 77% 50%, rgba(217, 237, 255, 0.82) 0 0.09vmin, transparent 0.22vmin),
          radial-gradient(circle at 92% 46%, rgba(238, 248, 255, 0.88) 0 0.1vmin, transparent 0.24vmin);
        animation: star-twinkle-b 0.9s ease-in-out infinite reverse;
      }

      .moon {
        position: absolute;
        top: 10vh;
        right: 10vw;
        z-index: 3;
        width: clamp(52px, 8vmin, 94px);
        aspect-ratio: 1;
        border-radius: 50%;
        background:
          radial-gradient(
            circle at 34% 32%,
            rgba(255, 252, 238, 0.98) 0%,
            rgba(212, 226, 255, 0.9) 40%,
            rgba(126, 149, 205, 0.36) 74%,
            rgba(0, 0, 0, 0) 100%
          );
        box-shadow:
          0 0 1.2vmin rgba(228, 240, 255, 0.38),
          0 0 4.4vmin rgba(117, 145, 215, 0.34);
      }

      .aurora-shader {
        position: absolute;
        width: 122%;
        left: -11%;
        right: auto;
        top: -6vh;
        top: -6dvh;
        height: 74vh;
        height: 74dvh;
        pointer-events: none;
        opacity: 0;
        z-index: 1;
        mix-blend-mode: screen;
        filter: saturate(1.08) brightness(0.98);
        transition: opacity 700ms cubic-bezier(0.22, 0.61, 0.36, 1);
      }

      .sky-events {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 2;
      }

      .comet {
        position: absolute;
        left: 112vw;
        width: clamp(120px, 15vw, 260px);
        height: clamp(2px, 0.24vmin, 4px);
        border-radius: 999px;
        opacity: 0;
        background:
          linear-gradient(
            90deg,
            rgba(0, 0, 0, 0) 0%,
            rgba(228, 240, 255, 0.98) 14%,
            rgba(134, 182, 255, 0.64) 28%,
            rgba(188, 214, 252, 0.26) 56%,
            rgba(165, 201, 255, 0.1) 78%,
            rgba(0, 0, 0, 0) 100%
          );
        filter:
          blur(0.1px)
          drop-shadow(0 0 0.55vmin rgba(182, 216, 255, 0.9));
        animation: comet-pass 32s linear infinite;
      }

      .comet::before {
        content: "";
        position: absolute;
        left: 10%;
        top: 50%;
        width: clamp(4px, 0.55vmin, 8px);
        aspect-ratio: 1;
        transform: translateY(-50%);
        border-radius: 50%;
        background:
          radial-gradient(circle, rgba(250, 252, 255, 0.98) 0%, rgba(170, 214, 255, 0.68) 72%, rgba(0, 0, 0, 0) 100%);
      }

      .comet-a {
        top: 13vh;
        animation-delay: -6s;
        animation-duration: 36s;
      }

      .comet-b {
        top: 24vh;
        animation-delay: -19s;
        animation-duration: 43s;
      }

      .plane {
        position: absolute;
        left: 110vw;
        width: clamp(18px, 2.2vw, 34px);
        height: clamp(5px, 0.7vw, 9px);
        border-radius: 999px;
        opacity: 0;
        background:
          linear-gradient(
            90deg,
            rgba(176, 194, 222, 0.85) 0%,
            rgba(118, 137, 168, 0.95) 50%,
            rgba(72, 89, 117, 0.84) 100%
          );
        filter: drop-shadow(0 0 0.3vmin rgba(180, 210, 255, 0.34));
        animation: plane-pass 54s linear infinite;
      }

      .plane::before,
      .plane::after {
        content: "";
        position: absolute;
        left: 44%;
        width: 48%;
        height: 34%;
        border-radius: 999px;
        background: rgba(166, 184, 210, 0.9);
      }

      .plane::before {
        top: -28%;
        transform: rotate(-17deg);
      }

      .plane::after {
        bottom: -28%;
        transform: rotate(17deg);
      }

      .plane-a {
        top: 16vh;
        animation-delay: -14s;
        animation-duration: 58s;
      }

      .plane-b {
        top: 28vh;
        animation-delay: -39s;
        animation-duration: 66s;
      }

      body.sky-bright-verse .stars {
        opacity: 1;
        filter:
          brightness(1.62)
          saturate(1.46)
          drop-shadow(0 0 0.85vmin rgba(180, 219, 255, 0.5));
      }

      body.sky-bright-verse .stars::before {
        opacity: 1;
        animation-duration: 0.62s;
        animation-timing-function: steps(2, end);
        animation-play-state: running;
      }

      body.sky-bright-verse .stars::after {
        opacity: 0.9;
        animation-duration: 0.5s;
        animation-timing-function: steps(2, end);
        animation-play-state: running;
      }

      body.sky-bright-verse .moon {
        box-shadow:
          0 0 2.1vmin rgba(243, 249, 255, 0.6),
          0 0 7.8vmin rgba(165, 197, 255, 0.66);
      }

      body.sky-bright-verse .aurora-shader {
        opacity: 0.46;
      }

      .hills-far,
      .hills-mid,
      .hills-near {
        position: absolute;
        left: 0;
        width: 200%;
        overflow: hidden;
        will-change: transform;
        transition: opacity 1.4s ease;
      }

      .hills-far::before,
      .hills-far::after,
      .hills-mid::before,
      .hills-mid::after,
      .hills-near::before,
      .hills-near::after {
        content: "";
        position: absolute;
        top: 0;
        width: calc(50% + 2px);
        height: 100%;
      }

      .hills-far::before,
      .hills-mid::before,
      .hills-near::before {
        left: -1px;
      }

      .hills-far::after,
      .hills-mid::after,
      .hills-near::after {
        left: calc(50% - 1px);
      }

      .hills-far {
        bottom: 24.4vh;
        height: 23vh;
        opacity: 0.38;
        animation: landscape-scroll-far 220s linear infinite;
      }

      .hills-far::before,
      .hills-far::after {
        background:
          linear-gradient(180deg, rgba(34, 52, 95, 0.55) 0%, rgba(8, 13, 24, 0.88) 100%);
        clip-path: polygon(
          0 100%,
          7% 78%,
          16% 61%,
          25% 66%,
          36% 48%,
          46% 58%,
          55% 43%,
          65% 59%,
          74% 49%,
          84% 63%,
          93% 52%,
          100% 100%
        );
      }

      .hills-mid {
        bottom: 21.1vh;
        height: 21vh;
        opacity: 0.52;
        animation: landscape-scroll-mid 155s linear infinite;
      }

      .hills-mid::before,
      .hills-mid::after {
        background:
          linear-gradient(180deg, rgba(30, 44, 80, 0.6) 0%, rgba(7, 10, 19, 0.92) 100%);
        clip-path: polygon(
          0 100%,
          6% 80%,
          14% 64%,
          23% 72%,
          33% 54%,
          43% 67%,
          53% 50%,
          63% 66%,
          73% 55%,
          83% 69%,
          92% 58%,
          100% 100%
        );
      }

      .hills-near {
        bottom: 18vh;
        height: 19vh;
        opacity: 0.66;
        animation: landscape-scroll-near 110s linear infinite;
      }

      .hills-near::before,
      .hills-near::after {
        background:
          linear-gradient(180deg, rgba(22, 31, 56, 0.7) 0%, rgba(4, 7, 12, 0.95) 100%);
        clip-path: polygon(
          0 100%,
          5% 82%,
          14% 66%,
          22% 75%,
          31% 57%,
          40% 71%,
          50% 48%,
          59% 68%,
          68% 54%,
          77% 70%,
          86% 61%,
          94% 78%,
          100% 100%
        );
      }

      .mountain-vista {
        position: absolute;
        left: 78%;
        right: -12%;
        bottom: var(--road-height);
        height: 50vh;
        opacity: 0;
        transform: translateX(6%);
        filter: saturate(1.06);
        pointer-events: none;
        z-index: 0;
        -webkit-mask-image: linear-gradient(90deg, rgba(0, 0, 0, 0) 0 16%, #000 34% 100%);
        mask-image: linear-gradient(90deg, rgba(0, 0, 0, 0) 0 16%, #000 34% 100%);
        transition:
          left 2.2s cubic-bezier(0.2, 0.62, 0.2, 1),
          opacity 2.2s ease,
          transform 2.2s cubic-bezier(0.2, 0.62, 0.2, 1);
      }

      .mountain-vista::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(
            180deg,
            rgba(72, 95, 138, 0.16) 0%,
            rgba(22, 37, 70, 0.4) 36%,
            rgba(5, 8, 15, 0.88) 100%
          );
        clip-path: polygon(
          0 100%,
          7% 78%,
          15% 52%,
          24% 70%,
          35% 38%,
          45% 66%,
          56% 42%,
          66% 74%,
          78% 48%,
          89% 69%,
          100% 56%,
          100% 100%
        );
      }

      .mountain-vista::after {
        content: "";
        position: absolute;
        left: 8%;
        right: -2%;
        bottom: 0;
        height: 78%;
        background:
          linear-gradient(
            180deg,
            rgba(58, 76, 112, 0.2) 0%,
            rgba(17, 27, 51, 0.48) 30%,
            rgba(4, 7, 13, 0.95) 100%
          );
        clip-path: polygon(
          0 100%,
          9% 74%,
          19% 58%,
          29% 70%,
          41% 46%,
          53% 64%,
          64% 50%,
          76% 72%,
          88% 57%,
          100% 74%,
          100% 100%
        );
        opacity: 0.88;
      }

      .road {
        position: absolute;
        left: -6%;
        right: -6%;
        bottom: 0;
        height: var(--road-height);
        border-radius: 0;
        overflow: hidden;
        background:
          linear-gradient(
            180deg,
            rgba(28, 31, 39, 0.9) 0%,
            rgba(13, 14, 18, 0.96) 35%,
            rgba(4, 4, 6, 1) 100%
          );
        box-shadow:
          inset 0 3px 0 rgba(255, 255, 255, 0.08),
          inset 0 -14px 26px rgba(0, 0, 0, 0.62),
          0 0 38px rgba(0, 0, 0, 0.56);
        transition:
          opacity 1.05s ease,
          transform 1.05s ease;
      }

      .road .lane-belt {
        position: absolute;
        left: 0;
        width: 200%;
        top: 48%;
        height: clamp(1px, 0.3vmin, 3px);
        display: flex;
        transform: translateY(-50%);
        will-change: transform;
        animation: lane-belt-scroll 5.2s linear infinite;
      }

      .road .lane-strip {
        flex: 0 0 50%;
        height: 100%;
        opacity: 0.64;
        filter: blur(0.2px);
        background:
          repeating-linear-gradient(
            90deg,
            rgba(0, 0, 0, 0) 0 50px,
            rgba(236, 231, 216, 0.55) 50px 76px,
            rgba(0, 0, 0, 0) 76px 164px
          );
      }

      .road::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(
            ellipse at 50% 10%,
            rgba(255, 255, 255, 0.05) 0%,
            rgba(0, 0, 0, 0) 58%
          );
      }

      .forest {
        position: absolute;
        left: 0;
        width: 100%;
        overflow: hidden;
        pointer-events: none;
        transition: opacity 1.1s ease;
      }

      .forest-far {
        bottom: 22vh;
        height: 15vh;
        opacity: 0.5;
        --tree-top: #2a5a3f;
        --tree-base: #142b20;
        --trunk: #2a2018;
      }

      .forest-near {
        bottom: 18.6vh;
        height: 19vh;
        opacity: 0.82;
        --tree-top: #214832;
        --tree-base: #0e2418;
        --trunk: #2e2318;
      }

      .forest-track {
        position: absolute;
        inset: 0 auto 0 0;
        width: 100%;
        height: 100%;
        will-change: transform;
      }

      .forest-track.clone {
        left: 100%;
      }

      .forest-far .forest-track {
        animation: trees-scroll-far 34s linear infinite;
      }

      .forest-near .forest-track {
        animation: trees-scroll-near 16s linear infinite;
      }

      .tree {
        position: absolute;
        bottom: 0;
        left: var(--x);
        width: calc(44px * var(--s));
        height: calc(100% * var(--h));
        transform: translateX(-50%);
      }

      .tree::before {
        content: "";
        position: absolute;
        left: 50%;
        bottom: 8%;
        width: 100%;
        height: 84%;
        transform: translateX(-50%);
        clip-path: polygon(
          50% 0,
          100% 40%,
          78% 40%,
          100% 72%,
          72% 72%,
          92% 100%,
          8% 100%,
          28% 72%,
          0 72%,
          22% 40%,
          0 40%
        );
        background:
          linear-gradient(
            180deg,
            var(--tree-top) 0%,
            var(--tree-base) 100%
          );
        filter: drop-shadow(0 0 0.35vmin rgba(0, 0, 0, 0.3));
      }

      .tree::after {
        content: "";
        position: absolute;
        left: 50%;
        bottom: 0;
        width: max(3px, 14%);
        height: 18%;
        transform: translateX(-50%);
        border-radius: 2px;
        background: var(--trunk);
      }

      .lane-glow {
        position: absolute;
        left: 10%;
        right: 10%;
        bottom: calc(var(--road-height) - 1.8vh);
        height: 8vh;
        background:
          radial-gradient(
            ellipse at 50% 50%,
            rgba(255, 222, 130, 0.2) 0%,
            rgba(255, 200, 84, 0.08) 28%,
            rgba(0, 0, 0, 0) 72%
          );
        animation: lane-glow-pulse 0.9s ease-in-out infinite;
        transition: opacity 1.05s ease;
      }

      .weather-layer {
        position: absolute;
        inset: -16% -8% -6%;
        pointer-events: none;
        opacity: 0;
        transition: none;
        z-index: 5;
      }

      .rain-layer,
      .snow-layer {
        overflow: hidden;
      }

      .rain-layer {
        mix-blend-mode: screen;
        filter: saturate(1.24) brightness(1.08);
      }

      .rain-drop {
        position: absolute;
        left: var(--x);
        top: -24vh;
        width: var(--w);
        height: var(--len);
        border-radius: 999px;
        opacity: var(--alpha);
        background: linear-gradient(
          180deg,
          rgba(208, 225, 251, 0) 0%,
          rgba(192, 214, 248, 0.95) 46%,
          rgba(151, 181, 229, 0.26) 100%
        );
        will-change: transform, opacity;
        animation-name: rain-fall;
        animation-duration: var(--dur);
        animation-timing-function: linear;
        animation-delay: var(--delay);
        animation-iteration-count: infinite;
      }

      .snow-layer {
        mix-blend-mode: screen;
        filter: saturate(1.02) brightness(1.02);
      }

      .snow-flake {
        position: absolute;
        left: var(--x);
        top: -22vh;
        width: var(--size);
        height: var(--size);
        border-radius: 50%;
        opacity: var(--alpha);
        background: rgba(247, 252, 255, 0.96);
        filter:
          blur(var(--blur))
          drop-shadow(0 0 5px rgba(228, 241, 255, 0.52));
        will-change: transform, opacity;
        animation-name: snow-fall;
        animation-duration: var(--dur);
        animation-timing-function: linear;
        animation-delay: var(--delay);
        animation-iteration-count: infinite;
      }

      body.weather-rain .rain-layer {
        opacity: 0.88;
      }

      body.weather-rain .snow-layer {
        opacity: 0;
      }

      body.weather-heavy-rain .rain-layer {
        opacity: 1;
        filter: saturate(1.4) brightness(1.2);
      }

      body.weather-heavy-rain .rain-drop {
        animation-duration: calc(var(--dur) * 0.58);
        filter: brightness(1.16);
      }

      body.weather-snow .snow-layer {
        opacity: 0.92;
      }

      body.weather-snow .rain-layer {
        opacity: 0;
      }

      body.speed-boost .hills-far {
        animation-duration: calc(48s * var(--speed-decel-mult, 1));
      }

      body.speed-boost .hills-mid {

      .wheel {
        position: absolute;
        top: 92.2%;
        width: 6%;
        aspect-ratio: 1;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        background:
          radial-gradient(circle, rgba(26, 30, 37, 0.95) 0 24%, rgba(101, 108, 120, 0.88) 24% 34%, rgba(10, 12, 16, 0.98) 34% 100%);

        content: "";

            rgba(64, 68, 80, 0.95) 12deg 30deg

      .wheel::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        width: 26%;
        aspect-ratio: 1;
        transform: translate(-50%, -50%);

          radial-gradient(circle, rgba(92, 99, 113, 0.98) 0%, rgba(37, 42, 51, 0.96) 65%, rgba(16, 18, 23, 0.98) 100%);

    <script>
      (() => {
        "use strict";

        const AUDIO_PATH = "media/onemoredance.mp3";
        const LRC_PATH = "media/onemoredance.lrc";
        const FALLBACK_SCENE_FADE_CUE_TIME = 152.75;
        const AURORA_RENDER_SCALE = 0.56;
        const AURORA_MAX_DPR = 1.1;
        const AURORA_FRAME_INTERVAL_MS = 1000 / 24;
        const DECEL_START_TIME = 166.9; // [02:46.90] Right foot
        const DECEL_END_TIME = 178.86; // [02:58.86] oh
        const DECEL_END_MULTIPLIER = 1.6;

        const audio = document.getElementById("audio");
        const lyricEl = document.getElementById("lyric");
        const statusText = document.getElementById("status");
        const startSequenceBtn = document.getElementById("start-sequence-btn");
        const introBlackout = document.getElementById("intro-blackout");
        const rainLayerEl = document.querySelector(".rain-layer");
        const snowLayerEl = document.querySelector(".snow-layer");
        const sceneEl = document.querySelector(".scene");
        const auroraShaderCanvasEl = document.getElementById("aurora-shader");

        let lyricSegments = [];
        let activeSegmentIndex = -1;
        let rafId = null;
        let isReady = false;
        let hasSequenceStarted = false;
        let introCueTime = 0;
        let introHasCue = false;
        let introReleased = false;
        let introHideTimeoutId = null;
        let sceneFadeCueTime = FALLBACK_SCENE_FADE_CUE_TIME;
        let isSceneFaded = false;
        let activeWeatherMode = "none";
        let isHeavyRainActive = false;
        let skyBrightWindows = [];
        let isSkyBrightActive = false;
        let auroraShaderCtx = null;
        let auroraShaderRafId = null;
        let auroraResizeRafId = null;
        let auroraResizeTimeoutId = null;
        let auroraLastFrameTime = 0;
        let auroraSampleXs = [];
        let auroraTopCurve = [];
        let activeSceneMotionRate = 1;
        const auroraSeed = Math.random() * 1000;

        function seedWeatherParticles() {
          if (rainLayerEl) {
            const rainFragment = document.createDocumentFragment();
            const rainCount = 170;

            for (let index = 0; index < rainCount; index += 1) {
              const drop = document.createElement("span");
              const x = -6 + (Math.random() * 112);
              const duration = 0.48 + (Math.random() * 0.62);
              const delay = -(Math.random() * 2.4);
              const length = 26 + (Math.random() * 40);
              const width = 1 + (Math.random() * 1.2);
              const alpha = 0.24 + (Math.random() * 0.56);

              drop.className = "rain-drop";
              drop.style.setProperty("--x", `${x.toFixed(2)}vw`);
              drop.style.setProperty("--dur", `${duration.toFixed(2)}s`);
              drop.style.setProperty("--delay", `${delay.toFixed(2)}s`);
              drop.style.setProperty("--len", `${length.toFixed(2)}px`);
              drop.style.setProperty("--w", `${width.toFixed(2)}px`);
              drop.style.setProperty("--alpha", alpha.toFixed(2));
              rainFragment.appendChild(drop);
            }

            rainLayerEl.replaceChildren(rainFragment);
          }

          if (snowLayerEl) {
            const snowFragment = document.createDocumentFragment();
            const snowCount = 96;

            for (let index = 0; index < snowCount; index += 1) {
              const flake = document.createElement("span");
              const x = -8 + (Math.random() * 116);
              const duration = 7.5 + (Math.random() * 7.5);
              const delay = -(Math.random() * 12);
              const size = 1 + (Math.random() * 3.8);
              const alpha = 0.42 + (Math.random() * 0.5);
              const blur = Math.random() * 0.75;

              flake.className = "snow-flake";
              flake.style.setProperty("--x", `${x.toFixed(2)}vw`);
              flake.style.setProperty("--dur", `${duration.toFixed(2)}s`);
              flake.style.setProperty("--delay", `${delay.toFixed(2)}s`);
              flake.style.setProperty("--size", `${size.toFixed(2)}px`);
              flake.style.setProperty("--alpha", alpha.toFixed(2));
              flake.style.setProperty("--blur", `${blur.toFixed(2)}px`);
              snowFragment.appendChild(flake);
            }

            snowLayerEl.replaceChildren(snowFragment);
          }
        }

        function ensureAuroraShaderContext() {
          if (!auroraShaderCanvasEl) {
            return null;
          }
          if (!auroraShaderCtx) {
            auroraShaderCtx = auroraShaderCanvasEl.getContext("2d", { alpha: true });
          }
          return auroraShaderCtx;
        }

        function resizeAuroraShaderCanvas() {
          const context = ensureAuroraShaderContext();
          if (!context || !auroraShaderCanvasEl) {
            return;
          }
          const rect = auroraShaderCanvasEl.getBoundingClientRect();
          const dpr = Math.min(window.devicePixelRatio || 1, AURORA_MAX_DPR);
          const width = Math.max(1, Math.round(rect.width * dpr * AURORA_RENDER_SCALE));
          const height = Math.max(1, Math.round(rect.height * dpr * AURORA_RENDER_SCALE));
          if (auroraShaderCanvasEl.width !== width || auroraShaderCanvasEl.height !== height) {
            auroraShaderCanvasEl.width = width;
            auroraShaderCanvasEl.height = height;
            rebuildAuroraSamples(width);
          }
        }

        function rebuildAuroraSamples(width) {
          const safeWidth = Math.max(1, width);
          const step = Math.max(12, Math.round(safeWidth / 74));
          const minX = -(safeWidth * 0.08);
          const maxX = safeWidth * 1.08;
          const samples = [];

          for (let x = minX; x <= maxX; x += step) {
            samples.push(x);
          }

          if (!samples.length || samples[samples.length - 1] < maxX) {
            samples.push(maxX);
          }

          auroraSampleXs = samples;
          auroraTopCurve = new Float32Array(samples.length);
        }

        function clearAuroraShaderCanvas() {
          if (!auroraShaderCtx || !auroraShaderCanvasEl) {
            return;
          }
          auroraShaderCtx.clearRect(0, 0, auroraShaderCanvasEl.width, auroraShaderCanvasEl.height);
        }

        function renderAuroraShader(timestampMs) {
          auroraShaderRafId = null;

          const shouldRenderAurora = isSkyBrightActive;
          if (!shouldRenderAurora) {
            return;
          }

          const context = ensureAuroraShaderContext();
          if (!context || !auroraShaderCanvasEl) {
            return;
          }

          const width = auroraShaderCanvasEl.width;
          const height = auroraShaderCanvasEl.height;
          if (!width || !height) {
            auroraShaderRafId = requestAnimationFrame(renderAuroraShader);
            return;
          }

          if (auroraLastFrameTime && (timestampMs - auroraLastFrameTime) < AURORA_FRAME_INTERVAL_MS) {
            auroraShaderRafId = requestAnimationFrame(renderAuroraShader);
            return;
          }
          auroraLastFrameTime = timestampMs;

          const time = timestampMs * 0.001;
          if (!auroraSampleXs.length) {
            rebuildAuroraSamples(width);
          }
          const sampleCount = auroraSampleXs.length;
          const topCurve = auroraTopCurve.length === sampleCount
            ? auroraTopCurve
            : new Float32Array(sampleCount);
          auroraTopCurve = topCurve;

          context.clearRect(0, 0, width, height);
          context.globalCompositeOperation = "lighter";
          context.globalAlpha = 0.72;

          function drawAuroraSet(config) {
            for (let band = 0; band < config.count; band += 1) {
              const baseY = height * (config.startY + (band * config.gap * config.direction));
              const thickness = height * (config.thicknessBase + (band * config.thicknessStep));
              const amplitudeA = height * (config.amplitudeBase + (band * config.amplitudeStep));
              const amplitudeB = height * ((config.amplitudeBase * 0.6) + (band * (config.amplitudeStep * 0.7)));
              const phase = auroraSeed + config.phaseOffset + (band * 1.71);
              const ribbonShift = Math.sin((time * 0.27) + (band * 1.34)) * (width * 0.018);
              const thicknessPulse = 1 + (Math.sin((time * 0.86) + (band * 1.12)) * 0.15);
              const dynamicThickness = thickness * thicknessPulse;

              context.beginPath();

              for (let index = 0; index < sampleCount; index += 1) {
                const x = auroraSampleXs[index];
                const nx = (x + ribbonShift) / width;
                const edgeDistance = Math.abs(nx - 0.5);
                const curve = Math.pow(edgeDistance, 1.18) * height * config.curveStrength;
                const curtain = Math.sin((nx * 47) + (time * (0.38 + (band * 0.07))) + (phase * 1.3)) * (height * 0.0048);
                const y = baseY + curve
                  + Math.sin((nx * 8.6) + (time * (0.44 + (band * 0.08))) + phase) * amplitudeA
                  + Math.cos((nx * 18.2) - (time * (0.76 + (band * 0.05))) + (phase * 0.74)) * amplitudeB
                  + Math.sin((nx * 31.2) + (time * 0.24) + (phase * 1.18)) * (height * 0.008)
                  + curtain;
                topCurve[index] = y;
                if (index === 0) {
                  context.moveTo(x, y);
                } else {
                  context.lineTo(x, y);
                }
              }

              for (let index = sampleCount - 1; index >= 0; index -= 1) {
                const x = auroraSampleXs[index];
                const nx = (x + ribbonShift) / width;
                const edgeDistance = Math.abs(nx - 0.5);
                const curve = Math.pow(edgeDistance, 1.18) * height * config.curveStrength;
                const curtain = Math.cos((nx * 39) - (time * (0.31 + (band * 0.06))) + (phase * 0.84)) * (height * 0.0036);
                const yBottom = baseY + curve + (dynamicThickness * config.direction)
                  + Math.sin((nx * 7.2) + (time * (0.35 + (band * 0.05))) + phase + 1.44) * (amplitudeA * 0.34)
                  + Math.cos((nx * 14.4) - (time * (0.49 + (band * 0.04))) + (phase * 0.57)) * (amplitudeB * 0.28)
                  + curtain;
                context.lineTo(x, yBottom);
              }

              context.closePath();

              const gradient = context.createLinearGradient(0, baseY - (dynamicThickness * 1.2), 0, baseY + (dynamicThickness * 1.2));
              gradient.addColorStop(0, "rgba(255, 130, 225, 0)");
              gradient.addColorStop(0.2, "rgba(255, 138, 226, 0.2)");
              gradient.addColorStop(0.46, "rgba(142, 185, 255, 0.3)");
              gradient.addColorStop(0.74, "rgba(255, 150, 228, 0.22)");
              gradient.addColorStop(1, "rgba(124, 168, 245, 0)");

              context.fillStyle = gradient;
              context.filter = `blur(${1.2 + (band * 0.22)}px) saturate(142%)`;
              context.fill();
            }
          }

          drawAuroraSet({
            startY: 0.42,
            gap: 0.072,
            direction: -1,
            count: 6,
            thicknessBase: 0.106,
            thicknessStep: 0.013,
            amplitudeBase: 0.03,
            amplitudeStep: 0.0044,
            curveStrength: 0.16,
            phaseOffset: 0
          });

          const upperGlow = context.createRadialGradient(
            width * 0.5,
            height * 0.28,
            height * 0.02,
            width * 0.5,
            height * 0.28,
            height * 0.36
          );
          upperGlow.addColorStop(0, "rgba(191, 190, 255, 0.08)");
          upperGlow.addColorStop(0.55, "rgba(255, 161, 231, 0.05)");
          upperGlow.addColorStop(1, "rgba(0, 0, 0, 0)");
          context.fillStyle = upperGlow;
          context.filter = "blur(0.6px)";
          context.beginPath();
          context.ellipse(
            width * 0.5,
            height * 0.28,
            width * 0.62,
            height * 0.27,
            0,
            0,
            Math.PI * 2
          );
          context.fill();

          context.filter = "none";
          context.globalCompositeOperation = "source-over";
          context.globalAlpha = 1;

          auroraShaderRafId = requestAnimationFrame(renderAuroraShader);
        }

        function startAuroraShader() {
          if (!auroraShaderCanvasEl) {
            return;
          }
          auroraLastFrameTime = 0;
          resizeAuroraShaderCanvas();
          if (auroraShaderRafId === null) {
            auroraShaderRafId = requestAnimationFrame(renderAuroraShader);
          }
        }

        function stopAuroraShader(keepLastFrame = false) {
          if (auroraShaderRafId !== null) {
            cancelAnimationFrame(auroraShaderRafId);
            auroraShaderRafId = null;
          }
          auroraLastFrameTime = 0;
          if (!keepLastFrame) {
            clearAuroraShaderCanvas();
          }
        }

        function runAuroraResizePass() {
          resizeAuroraShaderCanvas();
        }

        function scheduleAuroraResize() {
          if (auroraResizeRafId !== null) {
            cancelAnimationFrame(auroraResizeRafId);
          }

          auroraResizeRafId = requestAnimationFrame(() => {
            auroraResizeRafId = null;
            runAuroraResizePass();
          });

          if (auroraResizeTimeoutId !== null) {
            clearTimeout(auroraResizeTimeoutId);
          }
          auroraResizeTimeoutId = window.setTimeout(() => {
            auroraResizeTimeoutId = null;
            runAuroraResizePass();
          }, 140);
        }

        function parseTimestamp(min, sec, fracRaw) {
          const frac = (fracRaw || "0").padEnd(3, "0").slice(0, 3);
          return Number(min) * 60 + Number(sec) + Number(frac) / 1000;
        }

        function cleanLyric(text) {
          return text
            .replace(/\s+/g, " ")
            .replace(/\s+([,.;:!?])/g, "$1")
            .trim();
        }

        function parseLrc(rawText) {
          const entries = [];
          const lines = rawText
            .replace(/\r/g, "")
            .replace(/\u00a0/g, " ")
            .split("\n");

          for (const line of lines) {
            const tags = [...line.matchAll(/\[(\d{2}):(\d{2})(?:\.(\d{1,3}))?\]/g)];
            if (!tags.length) {
              continue;
            }

            const text = cleanLyric(line.replace(/\[[^\]]+\]/g, " "));
            if (!text) {
              continue;
            }

            for (const tag of tags) {
              const time = parseTimestamp(tag[1], tag[2], tag[3]);
              if (Number.isFinite(time)) {
                entries.push({ time, text });
              }
            }
          }

          return entries.sort((a, b) => a.time - b.time);
        }

        function isDotsOnly(text) {
          return /^\.+$/.test((text || "").trim());
        }

        function normalizeSegmentText(text) {
          return (text || "")
            .toLowerCase()
            .replace(/\s+/g, " ")
            .trim();
        }

        function setStatus(message, isError = false) {
          statusText.textContent = message;
          statusText.style.color = isError ? "#ff6a6a" : "#d0d0d0";
        }

        function resetIntroOverlay() {
          if (introHideTimeoutId !== null) {
            clearTimeout(introHideTimeoutId);
            introHideTimeoutId = null;
          }
          introReleased = false;
          document.body.classList.remove("scene-running");
          if (introBlackout) {
            introBlackout.hidden = false;
            introBlackout.classList.remove("is-hidden");
          }
        }

        function releaseIntroOverlay() {
          if (introReleased) {
            return;
          }
          introReleased = true;
          document.body.classList.add("scene-running");
          if (!introBlackout) {
            return;
          }
          introBlackout.classList.add("is-hidden");
          if (introHideTimeoutId !== null) {
            clearTimeout(introHideTimeoutId);
          }
          introHideTimeoutId = window.setTimeout(() => {
            introBlackout.hidden = true;
            introHideTimeoutId = null;
          }, 920);
        }

        function setSceneFadeOut(enabled) {
          if (isSceneFaded === enabled) {
            return;
          }
          isSceneFaded = enabled;
          document.body.classList.toggle("scene-fadeout", enabled);
        }

        function detectWeatherFromText(text) {
          const normalized = (text || "").toLowerCase();
          if (/\bsnow\b/.test(normalized)) {
            return { mode: "snow", heavyRain: false };
          }
          if (/\brain\b/.test(normalized)) {
            return { mode: "rain", heavyRain: normalized.includes("heavier the rain") };
          }
          return { mode: "none", heavyRain: false };
        }

        function setWeatherMode(mode, heavyRain = false) {
          const nextMode = mode === "snow" ? "snow" : mode === "rain" ? "rain" : "none";
          const nextHeavyRain = nextMode === "rain" && heavyRain;

          if (activeWeatherMode === nextMode && isHeavyRainActive === nextHeavyRain) {
            return;
          }

          activeWeatherMode = nextMode;
          isHeavyRainActive = nextHeavyRain;

          const isRain = nextMode === "rain";
          const isSnow = nextMode === "snow";

          document.body.classList.toggle("weather-rain", isRain);
          document.body.classList.toggle("weather-snow", isSnow);
          document.body.classList.toggle("weather-heavy-rain", nextHeavyRain);
        }

        function updateStartMenu() {
          startSequenceBtn.disabled = !isReady || hasSequenceStarted;
          startSequenceBtn.hidden = hasSequenceStarted;
          statusText.hidden = hasSequenceStarted;
        }

        function maybeReleaseIntroOverlay(effectiveTime) {
          if (!hasSequenceStarted || introReleased) {
            return;
          }
          if (!introHasCue || effectiveTime >= introCueTime) {
            releaseIntroOverlay();
          }
        }

        function syncSceneFadeMode(effectiveTime) {
          const shouldFade = hasSequenceStarted && effectiveTime >= sceneFadeCueTime;
          setSceneFadeOut(shouldFade);
        }

        function syncSkyBrightnessMode(effectiveTime) {
          const inWindow = skyBrightWindows.some(
            (windowRange) => effectiveTime >= windowRange.start && effectiveTime < windowRange.end
          );
          if (inWindow !== isSkyBrightActive) {
            isSkyBrightActive = inWindow;
            if (inWindow) {
              startAuroraShader();
            } else {
              stopAuroraShader(true);
            }
          }
          document.body.classList.toggle("sky-bright-verse", inWindow);
        }

        function setSceneMotionRate(rate) {
          const clamped = Math.min(1, Math.max(1 / DECEL_END_MULTIPLIER, Number.isFinite(rate) ? rate : 1));
          const quantized = Math.round(clamped * 50) / 50;
          if (Math.abs(quantized - activeSceneMotionRate) < 0.02) {
            return;
          }
          activeSceneMotionRate = quantized;

          let appliedViaAnimationApi = false;
          const animatedNodes = document.querySelectorAll(
            ".hills-far, .hills-mid, .hills-near, .forest-far .forest-track, .forest-near .forest-track"
          );

          for (const node of animatedNodes) {
            if (typeof node.getAnimations !== "function") {
              continue;
            }
            const animations = node.getAnimations();
            for (const animation of animations) {
              animation.playbackRate = quantized;
              appliedViaAnimationApi = true;
            }
          }

          // Fallback for environments without Web Animations API control.
          if (!appliedViaAnimationApi) {
            document.body.style.setProperty("--speed-decel-mult", (1 / quantized).toFixed(2));
          } else {
            document.body.style.setProperty("--speed-decel-mult", "1");
          }
        }

        function syncSpeedDecelerationMode(effectiveTime) {
          if (!hasSequenceStarted) {
            setSceneMotionRate(1);
            return;
          }

          if (effectiveTime < DECEL_START_TIME) {
            setSceneMotionRate(1);
            return;
          }

          if (effectiveTime >= DECEL_END_TIME) {
            setSceneMotionRate(1 / DECEL_END_MULTIPLIER);
            return;
          }

          const progress = Math.min(
            1,
            Math.max(0, (effectiveTime - DECEL_START_TIME) / (DECEL_END_TIME - DECEL_START_TIME))
          );
          const endSpeedFactor = 1 / DECEL_END_MULTIPLIER;
          const currentSpeedFactor = 1 - ((1 - endSpeedFactor) * progress);
          setSceneMotionRate(currentSpeedFactor);
        }

        function pad2(value) {
          return String(value).padStart(2, "0");
        }

        function formatLrcTag(seconds) {
          if (!Number.isFinite(seconds) || seconds < 0) {
            return "[00:00.00]";
          }
          const totalCs = Math.max(0, Math.round(seconds * 100));
          const minutes = Math.floor(totalCs / 6000);
          const secs = Math.floor((totalCs % 6000) / 100);
          const centis = totalCs % 100;
          return `[${pad2(minutes)}:${pad2(secs)}.${pad2(centis)}]`;
        }

        function getEffectiveTime() {
          return audio.currentTime;
        }

        function findSegmentIndex(currentTime) {
          let low = 0;
          let high = lyricSegments.length - 1;
          let result = -1;

          while (low <= high) {
            const mid = Math.floor((low + high) / 2);
            if (lyricSegments[mid].time <= currentTime) {
              result = mid;
              low = mid + 1;
            } else {
              high = mid - 1;
            }
          }

          return result;
        }

        function renderSegment(index, force = false) {
          if (!force && index === activeSegmentIndex) {
            return;
          }

          activeSegmentIndex = index;

          if (index < 0 || index >= lyricSegments.length) {
            lyricEl.textContent = "";
            lyricEl.classList.add("is-empty");
            setWeatherMode("none");
            return;
          }

          const text = lyricSegments[index].text;
          if (isDotsOnly(text)) {
            lyricEl.textContent = "";
            lyricEl.classList.add("is-empty");
            setWeatherMode("none");
            return;
          }

          const weather = detectWeatherFromText(text);
          setWeatherMode(weather.mode, weather.heavyRain);

          lyricEl.textContent = text;
          lyricEl.classList.remove("is-empty");

          const current = lyricSegments[index];
          console.debug(`[LRC] ${formatLrcTag(current.time)} ${current.text}`);
        }

        function updateLyrics(force = false) {
          const effectiveTime = getEffectiveTime();
          maybeReleaseIntroOverlay(effectiveTime);
          syncSceneFadeMode(effectiveTime);
          syncSkyBrightnessMode(effectiveTime);
          syncSpeedDecelerationMode(effectiveTime);
          const nextIndex = findSegmentIndex(effectiveTime);
          renderSegment(nextIndex, force);
        }

        function stopSyncLoop() {
          if (rafId !== null) {
            cancelAnimationFrame(rafId);
            rafId = null;
          }
        }

        function syncLoop() {
          updateLyrics();
          rafId = requestAnimationFrame(syncLoop);
        }

        function startSyncLoop() {
          if (rafId === null) {
            rafId = requestAnimationFrame(syncLoop);
          }
        }

        async function startSequenceFromBeginning() {
          if (!isReady) {
            return false;
          }

          stopSyncLoop();
          audio.currentTime = 0;
          activeSegmentIndex = -1;
          resetIntroOverlay();
          setSceneFadeOut(false);
          updateLyrics(true);

          try {
            await audio.play();
            hasSequenceStarted = true;
            updateStartMenu();
            setStatus("");
            return true;
          } catch (error) {
            setStatus("No se pudo iniciar la secuencia.", true);
            console.error(error);
            return false;
          }
        }


        async function loadResources() {
          audio.src = encodeURI(AUDIO_PATH);

          const metadataPromise = new Promise((resolve, reject) => {
            if (audio.readyState >= 1 && Number.isFinite(audio.duration)) {
              resolve();
              return;
            }
            audio.addEventListener("loadedmetadata", resolve, { once: true });
            audio.addEventListener("error", () => reject(new Error("No se pudo cargar el audio.")), { once: true });
          });

          try {
            const lrcResponse = await fetch(encodeURI(LRC_PATH), { cache: "no-store" });
            if (!lrcResponse.ok) {
              throw new Error(`No se pudo leer ${LRC_PATH}`);
            }

            const rawLrc = await lrcResponse.text();
            await metadataPromise;
            lyricSegments = parseLrc(rawLrc);
            const introCueSegment = lyricSegments.find((segment) => isDotsOnly(segment.text));
            introHasCue = Boolean(introCueSegment);
            introCueTime = introCueSegment ? introCueSegment.time : 0;
            let lastOhTime = -1;
            for (const segment of lyricSegments) {
              if (/\boh\b/i.test(segment.text)) {
                lastOhTime = segment.time;
              }
            }
            const dotsAfterLastOh = lyricSegments.find(
              (segment) => isDotsOnly(segment.text) && segment.time > lastOhTime
            );
            const lastDotsSegment = [...lyricSegments].reverse().find((segment) => isDotsOnly(segment.text));
            const sceneFadeCueSegment = dotsAfterLastOh || lastDotsSegment;
            sceneFadeCueTime = sceneFadeCueSegment ? sceneFadeCueSegment.time : FALLBACK_SCENE_FADE_CUE_TIME;

            skyBrightWindows = [];
            const danceStartIndices = [];
            for (let index = 0; index < lyricSegments.length - 1; index += 1) {
              const currentText = normalizeSegmentText(lyricSegments[index].text);
              const nextText = normalizeSegmentText(lyricSegments[index + 1].text);
              if (currentText === "dance" && nextText.startsWith("dance with")) {
                danceStartIndices.push(index);
              }
            }

            for (let windowIndex = 0; windowIndex < danceStartIndices.length; windowIndex += 1) {
              const startIndex = danceStartIndices[windowIndex];
              const nextStartIndex = danceStartIndices[windowIndex + 1] ?? lyricSegments.length;
              let endIndex = -1;

              for (let index = startIndex + 1; index < nextStartIndex; index += 1) {
                if (normalizeSegmentText(lyricSegments[index].text) === "one more dance") {
                  endIndex = index;
                  break;
                }
              }

              if (endIndex < 0) {
                continue;
              }

              const startTime = lyricSegments[startIndex].time;
              const afterEndSegment = lyricSegments[endIndex + 1];
              const endTime = afterEndSegment ? afterEndSegment.time : lyricSegments[endIndex].time + 0.001;
              skyBrightWindows.push({
                start: startTime,
                end: Math.max(endTime, startTime + 0.001)
              });
            }

            if (!lyricSegments.length) {
              throw new Error("El archivo LRC no tiene timestamps validos.");
            }

            isReady = true;
            hasSequenceStarted = false;
            updateStartMenu();
            setStatus(`${lyricSegments.length} lineas cargadas.`);
            updateLyrics(true);
            console.debug(`[LRC] ${lyricSegments.length} lineas cargadas.`);
          } catch (error) {
            lyricEl.textContent = "Error";
            lyricEl.classList.remove("is-empty");
            isReady = false;
            hasSequenceStarted = false;
            updateStartMenu();
            setStatus("No se pudo cargar LRC/audio. Usa servidor local.", true);
            console.error(error);
          }
        }

        startSequenceBtn.addEventListener("click", async () => {
          await startSequenceFromBeginning();
        });

        audio.addEventListener("play", () => {
          startSyncLoop();
        });

        audio.addEventListener("pause", () => {
          stopSyncLoop();
          updateLyrics(true);
        });

        audio.addEventListener("ended", () => {
          stopSyncLoop();
          updateLyrics(true);
        });

        audio.addEventListener("seeked", () => {
          updateLyrics(true);
        });

        audio.addEventListener("loadedmetadata", () => {
          updateLyrics(true);
        });

        window.addEventListener("resize", scheduleAuroraResize, { passive: true });
        window.addEventListener("orientationchange", scheduleAuroraResize, { passive: true });
        if (window.visualViewport) {
          window.visualViewport.addEventListener("resize", scheduleAuroraResize, { passive: true });
          window.visualViewport.addEventListener("scroll", scheduleAuroraResize, { passive: true });
        }

        if (typeof ResizeObserver === "function") {
          const auroraResizeObserver = new ResizeObserver(() => {
            scheduleAuroraResize();
          });
          if (sceneEl) {
            auroraResizeObserver.observe(sceneEl);
          }
          if (auroraShaderCanvasEl) {
            auroraResizeObserver.observe(auroraShaderCanvasEl);
          }
        }

        scheduleAuroraResize();
        seedWeatherParticles();
        audio.playbackRate = 1;
        audio.volume = 1;
        document.body.classList.add("speed-boost");
        resetIntroOverlay();
        setSceneFadeOut(false);
        updateStartMenu();
        updateLyrics(true);
        loadResources();
      })();
    </script>
  </body>
</html>
