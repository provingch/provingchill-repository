<!doctype html>
<html lang="es">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>consola - /</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="bloqconsola">
            <div id="consola-topbar">
                <span>consola</span>
                <span id="consola-status" data-status="connecting">connecting...</span>
            </div>
            <div id="consola-output"></div>
            <div id="consola-input-line">
                <span id="consola-prompt">user@console:~$ </span>
                <span id="consola-texto"></span>
                <span id="consola-cursor">_</span>
            </div>
            <input id="consola-input" type="text" autofocus>
        </div>
    </body>
    <script src="console.js"></script>
</html>
